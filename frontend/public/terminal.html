<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>PlutoTrader</title>
<link rel="icon" type="image/svg+xml" href="/img/favicon.svg?v=47">
<script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#06050a;--bg2:#0b0a12;--sf:#0f0e18;--sf2:#111020;--sf3:#161525;--sf4:#1a1828;
  --brd:rgba(255,255,255,.055);--brd2:rgba(255,255,255,.09);--brd3:rgba(255,255,255,.13);
  --ac:#7c3aed;--ac2:#a78bfa;--ac3:#6d28d9;--acbg:rgba(124,58,237,.1);--acgl:rgba(124,58,237,.25);
  --gr:#26d47e;--gr2:#16a34a;--grbg:rgba(38,212,126,.08);--grgl:rgba(38,212,126,.25);
  --rd:#f05b5b;--rd2:#dc2626;--rdbg:rgba(240,91,91,.08);--rdgl:rgba(240,91,91,.25);
  --am:#f59e0b;--ambg:rgba(245,158,11,.08);
  --bl:#60a5fa;--blbg:rgba(96,165,250,.08);
  --t1:#eeedf4;--t2:#8b87a0;--t3:#5a5672;--t4:#3d3955;
  --ff:'Manrope',sans-serif;--fm:'JetBrains Mono',monospace;
  --r:5px;--r2:8px;--r3:12px;
  --tb:42px;--mw:188px;--op:300px;--bot:220px;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--t1);font-family:var(--ff);-webkit-font-smoothing:antialiased;user-select:none}
input,select,button{font-family:inherit;font-size:inherit}

/* ── Layout ───────────────────────────────────────────────────────── */
.tb{position:fixed;top:0;left:0;right:0;height:var(--tb);background:var(--sf);border-bottom:1px solid var(--brd);z-index:100;display:flex;align-items:center;gap:8px;padding:0 10px}
.body-wrap{position:fixed;top:var(--tb);left:0;right:0;bottom:0;display:grid;grid-template-columns:var(--mw) 1fr var(--op);grid-template-rows:1fr var(--bot)}

/* ── Topbar ───────────────────────────────────────────────────────── */
.logo{display:flex;align-items:center;gap:7px;padding-right:12px;border-right:1px solid var(--brd)}
.logo-circle{width:24px;height:24px;background:var(--ac);border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:900;color:#fff;font-size:11px;flex-shrink:0}
.logo-txt{font-size:.75rem;font-weight:800;letter-spacing:-.01em}
.logo-txt span{color:var(--ac2)}
.sym-selector{display:flex;align-items:center;gap:6px;padding:4px 10px;background:var(--sf2);border:1px solid var(--brd2);border-radius:var(--r2);cursor:pointer;transition:.15s;min-width:180px}
.sym-selector:hover{border-color:var(--brd3)}
.sym-name{font-size:.88rem;font-weight:700;font-family:var(--fm)}
.sym-spread{font-size:.62rem;color:var(--t3);font-family:var(--fm)}
.sym-bid{font-size:1rem;font-weight:700;font-family:var(--fm);color:var(--t1)}
.sym-ask{font-size:1rem;font-weight:700;font-family:var(--fm);color:var(--t1)}
.sym-chg{font-size:.7rem;font-weight:700;font-family:var(--fm)}
.sym-chg.up{color:var(--gr)}.sym-chg.dn{color:var(--rd)}
.sym-hi,.sym-lo{font-size:.6rem;font-family:var(--fm)}
.sym-hi{color:var(--gr)}.sym-lo{color:var(--rd)}
.acct-btn{display:flex;align-items:center;gap:6px;padding:4px 10px;background:var(--sf2);border:1px solid var(--brd2);border-radius:var(--r2);cursor:pointer;transition:.15s;margin-left:auto}
.acct-btn:hover{border-color:var(--brd3)}
.acct-name{font-size:.72rem;font-weight:700}
.acct-bal{font-size:.7rem;font-family:var(--fm);color:var(--gr)}
.acct-eq{font-size:.7rem;font-family:var(--fm);color:var(--t2)}
.mkt-status{display:flex;align-items:center;gap:4px;font-size:.62rem;font-weight:700;color:var(--t2)}
.mkt-dot{width:6px;height:6px;border-radius:50%}
.mkt-dot.open{background:var(--gr);box-shadow:0 0 5px rgba(38,212,126,.6);animation:pulse 2s infinite}
.mkt-dot.closed{background:var(--rd)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.btn-tb{padding:4px 9px;background:transparent;border:1px solid var(--brd2);border-radius:var(--r);color:var(--t2);font-size:.65rem;font-weight:700;cursor:pointer;transition:.15s}
.btn-tb:hover{background:rgba(255,255,255,.05);color:var(--t1)}
.ws-dot{width:6px;height:6px;border-radius:50%;background:var(--rd);flex-shrink:0;transition:background .3s}
.ws-dot.connected{background:var(--gr)}
#tbTime{font-family:var(--fm);font-size:.62rem;color:var(--t3)}

/* ── Market Watch ─────────────────────────────────────────────────── */
.mw{grid-row:1/3;background:var(--sf);border-right:1px solid var(--brd);overflow-y:auto;display:flex;flex-direction:column}
.mw-head{padding:8px 10px;border-bottom:1px solid var(--brd);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.mw-title{font-size:.6rem;font-weight:800;text-transform:uppercase;letter-spacing:.12em;color:var(--t3)}
.mw-row{display:grid;grid-template-columns:1fr auto;align-items:center;padding:5px 9px;cursor:pointer;border-radius:4px;margin:1px 4px;transition:background .1s;border-left:2px solid transparent}
.mw-row:hover{background:rgba(255,255,255,.035)}
.mw-row.active{background:var(--acbg);border-left-color:var(--ac)}
.mw-sym{font-size:.72rem;font-weight:700}
.mw-name{font-size:.58rem;color:var(--t3)}
.mw-prices{text-align:right}
.mw-bid{font-family:var(--fm);font-size:.72rem;color:var(--rd);font-weight:600}
.mw-ask{font-family:var(--fm);font-size:.72rem;color:var(--gr);font-weight:600}
.mw-chg{font-family:var(--fm);font-size:.58rem;font-weight:700}
.up{color:var(--gr)}.dn{color:var(--rd)}.neu{color:var(--t3)}
.flash-up{animation:flashG .3s ease}
.flash-dn{animation:flashR .3s ease}
@keyframes flashG{0%{background:rgba(38,212,126,.18)}100%{background:transparent}}
@keyframes flashR{0%{background:rgba(240,91,91,.18)}100%{background:transparent}}
.mw-group{padding:3px 10px;font-size:.54rem;font-weight:800;text-transform:uppercase;letter-spacing:.12em;color:var(--t4);margin-top:3px}

/* ── Chart ────────────────────────────────────────────────────────── */
.chart-area{grid-row:1;background:var(--bg);position:relative;overflow:hidden;min-width:0}
#lwChart{position:absolute;inset:0}
.chart-toolbar{position:absolute;top:6px;left:6px;z-index:10;display:flex;gap:3px;flex-wrap:wrap}
.tf-btn{padding:3px 8px;background:rgba(0,0,0,.5);border:1px solid var(--brd);border-radius:4px;color:var(--t2);font-size:.62rem;font-weight:700;cursor:pointer;transition:.12s;font-family:var(--fm)}
.tf-btn:hover{background:rgba(255,255,255,.06);color:var(--t1)}
.tf-btn.active{background:var(--ac3);color:#fff;border-color:var(--ac)}
.ct-btn{padding:3px 8px;background:rgba(0,0,0,.5);border:1px solid var(--brd);border-radius:4px;color:var(--t2);font-size:.62rem;cursor:pointer;transition:.12s}
.ct-btn:hover{background:rgba(255,255,255,.06);color:var(--t1)}
.ct-btn.active{background:rgba(124,58,237,.3);color:var(--ac2)}
.chart-info{position:absolute;top:6px;right:6px;z-index:10;background:rgba(0,0,0,.5);border:1px solid var(--brd);border-radius:var(--r2);padding:5px 9px;font-family:var(--fm);font-size:.62rem;line-height:1.6;color:var(--t2)}
.ohlc-o{color:var(--t2)}.ohlc-h{color:var(--gr)}.ohlc-l{color:var(--rd)}.ohlc-c{color:var(--t1)}
.chart-crosshair-line{position:absolute;top:30px;left:50%;transform:translateX(-50%);z-index:5;background:rgba(0,0,0,.6);border:1px solid var(--brd2);border-radius:4px;padding:3px 8px;font-size:.62rem;font-family:var(--fm);color:var(--t2);pointer-events:none;white-space:nowrap;display:none}
.no-data-msg{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--t3);font-size:.82rem;pointer-events:none}

/* ── Order Panel ──────────────────────────────────────────────────── */
.op{grid-row:1;background:var(--sf);border-left:1px solid var(--brd);overflow-y:auto;display:flex;flex-direction:column}
.op-head{padding:8px 11px;border-bottom:1px solid var(--brd);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.op-title{font-size:.62rem;font-weight:800;text-transform:uppercase;letter-spacing:.12em;color:var(--t3)}
.op-sym{font-size:.82rem;font-weight:700;font-family:var(--fm)}
.op-body{padding:10px;display:flex;flex-direction:column;gap:8px;flex:1}
.dir-btns{display:grid;grid-template-columns:1fr 1fr;gap:4px}
.dir-btn{padding:10px 0;border:none;border-radius:var(--r2);cursor:pointer;font-weight:800;font-size:.88rem;transition:.15s;display:flex;flex-direction:column;align-items:center;gap:2px;font-family:var(--fm)}
.dir-btn.buy{background:var(--grbg);color:var(--gr);border:1.5px solid var(--grgl)}
.dir-btn.buy:hover,.dir-btn.buy.active{background:var(--gr);color:#fff;border-color:var(--gr)}
.dir-btn.sell{background:var(--rdbg);color:var(--rd);border:1.5px solid var(--rdgl)}
.dir-btn.sell:hover,.dir-btn.sell.active{background:var(--rd);color:#fff;border-color:var(--rd)}
.dir-sub{font-size:.62rem;font-weight:500;opacity:.8;font-family:var(--ff)}
.price-row{display:grid;grid-template-columns:1fr 1fr;gap:4px;text-align:center}
.price-box{background:var(--sf2);border:1px solid var(--brd);border-radius:var(--r2);padding:7px 4px}
.price-lbl{font-size:.54rem;color:var(--t3);font-weight:700;text-transform:uppercase;letter-spacing:.08em}
.price-val{font-size:1.15rem;font-weight:700;font-family:var(--fm);margin-top:2px}
.price-val.buy-p{color:var(--gr)}.price-val.sell-p{color:var(--rd)}
.spread-row{text-align:center;font-size:.6rem;color:var(--t3);font-family:var(--fm)}
.ot-tabs{display:flex;gap:2px;background:var(--sf2);border:1px solid var(--brd);border-radius:var(--r2);padding:2px}
.ot-tab{flex:1;padding:4px;border-radius:5px;cursor:pointer;font-size:.62rem;font-weight:700;text-align:center;color:var(--t2);transition:.12s}
.ot-tab.active{background:var(--ac3);color:#fff}
.ot-tab:hover:not(.active){background:rgba(255,255,255,.05);color:var(--t1)}
.form-row{display:flex;flex-direction:column;gap:2px}
.form-lbl{font-size:.58rem;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.09em}
.form-inp{background:var(--sf2);border:1.5px solid var(--brd2);border-radius:var(--r);padding:6px 8px;color:var(--t1);font-family:var(--fm);font-size:.8rem;outline:none;transition:border .15s;width:100%}
.form-inp:focus{border-color:var(--ac)}
.form-inp.has-val{border-color:rgba(162,118,250,.3)}
.form-sel{background:var(--sf2);border:1.5px solid var(--brd2);border-radius:var(--r);padding:6px 8px;color:var(--t1);font-size:.78rem;outline:none;cursor:pointer;width:100%}
.form-sel:focus{border-color:var(--ac)}
.form-sel option{background:var(--bg2)}
.vol-btns{display:flex;gap:3px;margin-top:3px}
.vol-btn{flex:1;padding:3px 0;background:var(--sf3);border:1px solid var(--brd);border-radius:4px;color:var(--t2);font-size:.6rem;font-weight:700;cursor:pointer;transition:.12s;font-family:var(--fm)}
.vol-btn:hover{background:rgba(255,255,255,.06);color:var(--t1)}
.rr-box{background:var(--sf2);border:1px solid var(--brd);border-radius:var(--r2);padding:7px 10px;font-size:.68rem}
.rr-row{display:flex;justify-content:space-between;margin-bottom:2px}
.rr-lbl{color:var(--t3)}.rr-val{font-family:var(--fm);font-weight:700}
.place-btn{width:100%;padding:12px;border:none;border-radius:var(--r2);cursor:pointer;font-weight:800;font-size:.88rem;letter-spacing:.02em;transition:.18s;font-family:var(--ff)}
.place-btn.buy-now{background:linear-gradient(135deg,var(--gr),var(--gr2));color:#fff;box-shadow:0 4px 14px rgba(38,212,126,.3)}
.place-btn.buy-now:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(38,212,126,.45)}
.place-btn.sell-now{background:linear-gradient(135deg,var(--rd),var(--rd2));color:#fff;box-shadow:0 4px 14px rgba(240,91,91,.3)}
.place-btn.sell-now:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(240,91,91,.45)}
.place-btn:active{transform:translateY(0)!important}
.place-btn:disabled{opacity:.5;cursor:not-allowed;transform:none!important;box-shadow:none!important}
.divider{height:1px;background:var(--brd);margin:0 -10px}

/* ── Bottom Panel ─────────────────────────────────────────────────── */
.bot{grid-column:2/4;background:var(--sf);border-top:1px solid var(--brd);display:flex;flex-direction:column;overflow:hidden}
.bot-tabs{display:flex;align-items:center;border-bottom:1px solid var(--brd);flex-shrink:0;padding:0 10px;gap:1px}
.bot-tab{padding:7px 13px;cursor:pointer;font-size:.68rem;font-weight:700;color:var(--t3);border-bottom:2px solid transparent;transition:.15s;white-space:nowrap}
.bot-tab:hover{color:var(--t2)}
.bot-tab.active{color:var(--ac2);border-bottom-color:var(--ac)}
.bot-count{display:inline-block;background:var(--acbg);color:var(--ac2);padding:1px 5px;border-radius:8px;font-size:.55rem;font-weight:800;margin-left:3px}
.bot-count.red{background:var(--rdbg);color:var(--rd)}
.bot-body{flex:1;overflow-y:auto}
.bot-summary{display:flex;align-items:center;gap:16px;padding:4px 10px;border-bottom:1px solid var(--brd);font-size:.65rem;flex-shrink:0;flex-wrap:wrap}
.bot-sum-item{display:flex;gap:5px;align-items:center}
.bs-lbl{color:var(--t3)}.bs-val{font-family:var(--fm);font-weight:700}
.pos-table{width:100%;border-collapse:collapse;font-size:.68rem}
.pos-table th{padding:4px 9px;text-align:left;font-size:.55rem;text-transform:uppercase;letter-spacing:.09em;color:var(--t3);background:var(--sf2);border-bottom:1px solid var(--brd);white-space:nowrap;position:sticky;top:0}
.pos-table td{padding:5px 9px;border-bottom:1px solid rgba(255,255,255,.02);font-family:var(--fm);white-space:nowrap}
.pos-table tr:hover td{background:rgba(255,255,255,.02)}
.pos-sym{font-weight:700;color:var(--t1);font-family:var(--ff)}
.pos-actions{display:flex;gap:3px}
.pa-btn{padding:2px 7px;border:none;border-radius:4px;cursor:pointer;font-size:.6rem;font-weight:700;transition:.12s;font-family:var(--ff)}
.pa-close{background:var(--rdbg);color:var(--rd);border:1px solid rgba(240,91,91,.18)}
.pa-close:hover{background:rgba(240,91,91,.2)}
.pa-edit{background:var(--blbg);color:var(--bl);border:1px solid rgba(96,165,250,.18)}
.pa-edit:hover{background:rgba(96,165,250,.2)}
.pa-rev{background:var(--ambg);color:var(--am);border:1px solid rgba(245,158,11,.18)}
.pa-rev:hover{background:rgba(245,158,11,.2)}
.pa-part{background:var(--acbg);color:var(--ac2);border:1px solid var(--acgl)}
.pa-part:hover{background:rgba(124,58,237,.2)}
.empty-bot{padding:30px;text-align:center;color:var(--t3);font-size:.75rem}

/* ── Dropdowns ────────────────────────────────────────────────────── */
.dropdown{position:fixed;z-index:200;background:var(--sf2);border:1px solid var(--brd2);border-radius:var(--r3);box-shadow:0 16px 50px rgba(0,0,0,.6);overflow:hidden;max-height:400px;overflow-y:auto}
.sym-drop{width:500px}
.sym-drop-search{padding:8px 10px;border-bottom:1px solid var(--brd);display:flex;align-items:center;gap:6px}
.sym-search-inp{flex:1;background:transparent;border:none;color:var(--t1);font-size:.78rem;outline:none}
.sym-drop-item{display:grid;grid-template-columns:100px 1fr auto;align-items:center;padding:6px 12px;cursor:pointer;transition:background .1s;gap:8px}
.sym-drop-item:hover{background:rgba(255,255,255,.04)}
.sym-drop-item.active{background:var(--acbg)}
.sym-drop-grp{padding:4px 12px;font-size:.54rem;font-weight:800;text-transform:uppercase;letter-spacing:.12em;color:var(--t4)}
.acct-drop{width:360px}
.acct-drop-item{padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--brd);transition:background .1s}
.acct-drop-item:last-child{border-bottom:none}
.acct-drop-item:hover{background:rgba(255,255,255,.03)}
.acct-drop-item.active{background:var(--acbg)}

/* ── Modal overlay ────────────────────────────────────────────────── */
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(8px);z-index:300;display:flex;align-items:center;justify-content:center}
.mbox{background:var(--sf2);border:1px solid var(--brd2);border-radius:var(--r3);padding:20px;min-width:300px;max-width:420px;width:calc(100% - 32px);box-shadow:0 20px 60px rgba(0,0,0,.5)}
.mbox h3{font-size:.88rem;font-weight:700;margin-bottom:14px}
.mbtns{display:flex;gap:8px;margin-top:14px;justify-content:flex-end}
.field{margin-bottom:9px}
.flbl{display:block;font-size:.57rem;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.09em;margin-bottom:3px}

/* ── Toasts ───────────────────────────────────────────────────────── */
#toasts{position:fixed;bottom:16px;right:16px;z-index:400;display:flex;flex-direction:column;gap:4px;pointer-events:none}
.ti{padding:7px 13px;border-radius:var(--r2);font-size:.72rem;font-weight:600;border:1px solid;animation:tslide .2s ease}
.t-ok{background:rgba(16,185,129,.12);border-color:rgba(38,212,126,.3);color:var(--gr)}
.t-err{background:rgba(240,91,91,.12);border-color:rgba(240,91,91,.3);color:var(--rd)}
.t-inf{background:rgba(124,58,237,.12);border-color:var(--acgl);color:var(--ac2)}
.t-warn{background:rgba(245,158,11,.12);border-color:rgba(245,158,11,.3);color:var(--am)}
@keyframes tslide{from{opacity:0;transform:translateX(10px)}to{opacity:1;transform:none}}

/* ── Scrollbars ───────────────────────────────────────────────────── */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--sf3);border-radius:2px}
::-webkit-scrollbar-thumb:hover{background:var(--sf4)}

/* ── Login overlay ────────────────────────────────────────────────── */
.lp{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:var(--bg);z-index:500}
.lc{background:var(--sf);border:1px solid var(--brd2);border-radius:var(--r3);padding:32px;width:350px;box-shadow:0 20px 60px rgba(0,0,0,.6)}
.lb{width:100%;background:linear-gradient(135deg,var(--ac),var(--ac3));border:none;border-radius:var(--r2);padding:11px;color:#fff;font-size:.85rem;font-weight:700;cursor:pointer;transition:.15s;letter-spacing:.02em}
.lb:hover{opacity:.9}
.le{display:none;background:var(--rdbg);border:1px solid rgba(240,91,91,.2);border-radius:var(--r);padding:8px 11px;color:var(--rd);font-size:.72rem;margin-bottom:11px}

/* Misc */
.btn-o{padding:4px 9px;background:transparent;border:1px solid var(--brd2);border-radius:var(--r);color:var(--t2);font-size:.65rem;font-weight:700;cursor:pointer;transition:.15s}
.btn-o:hover{background:rgba(255,255,255,.05);color:var(--t1)}
.btn-p{padding:4px 9px;background:var(--ac3);border:none;border-radius:var(--r);color:#fff;font-size:.65rem;font-weight:700;cursor:pointer;transition:.15s}
.btn-p:hover{background:var(--ac)}
.btn-d{padding:4px 9px;background:var(--rdbg);border:1px solid rgba(240,91,91,.18);border-radius:var(--r);color:var(--rd);font-size:.65rem;font-weight:700;cursor:pointer;transition:.15s}
.btn-d:hover{background:rgba(240,91,91,.2)}

.info-tag{display:inline-flex;align-items:center;gap:4px;padding:2px 7px;border-radius:var(--r);font-size:.6rem;font-weight:700;border:1px solid}
.it-buy{background:var(--grbg);color:var(--gr);border-color:var(--grgl)}
.it-sell{background:var(--rdbg);color:var(--rd);border-color:var(--rdgl)}

/* Resize handle */
.resize-handle{cursor:ns-resize;height:4px;background:transparent;flex-shrink:0;transition:.15s}
.resize-handle:hover{background:var(--ac3)}
</style>
</head>
<body>
<div id="toasts"></div>
<div id="mbg" style="display:none" class="mbg" onclick="if(event.target===this)closeMod()"><div class="mbox" id="mbox"></div></div>
<div id="symDrop" style="display:none" class="dropdown sym-drop"></div>
<div id="acctDrop" style="display:none" class="dropdown acct-drop"></div>
<div id="app"></div>
<script>
const RAILWAY = 'https://pluto-platform-production.up.railway.app';
const BE = location.hostname==='localhost'?'':RAILWAY;

// ── API ──────────────────────────────────────────────────────────────
async function api(path, opts={}) {
  const r = await fetch(BE+path,{...opts,headers:{'Content-Type':'application/json','Authorization':'Bearer '+(token||''),...(opts.headers||{})}});
  const d = await r.json().catch(()=>({}));
  if (r.status===401){logout();return;}
  if (!r.ok) throw new Error(d.error||`Error ${r.status}`);
  return d;
}

// ── Toast ─────────────────────────────────────────────────────────────
function toast(msg, type='inf', ms=3000) {
  const el = Object.assign(document.createElement('div'),{className:`ti t-${type}`,textContent:msg});
  document.getElementById('toasts').appendChild(el);
  setTimeout(()=>{el.style.opacity='0';el.style.transition='opacity .25s';setTimeout(()=>el.remove(),250)},ms);
}
const F=(n,d=2)=>'$'+Number(n||0).toLocaleString('en',{minimumFractionDigits:d,maximumFractionDigits:d});
const Fp=(n,d)=>Number(n||0).toFixed(d||2);

// ── INSTRUMENT HELPERS ────────────────────────────────────────────────
function getDigits(sym) {
  if (!sym) return 5;
  const inst = instruments[sym];
  if (inst?.digits) return inst.digits;
  if (['XAUUSD','XAGUSD'].includes(sym)) return 2;
  if (['US30','NAS100','US500','GER40','JP225'].includes(sym)) return 1;
  if (['USOIL','BRENT'].includes(sym)) return 2;
  if (sym.includes('JPY')) return 3;
  return 5;
}
function getPip(sym) {
  const inst = instruments[sym];
  if (inst?.pip) return inst.pip;
  if (['US30','NAS100','US500','GER40','JP225'].includes(sym)) return 1;
  if (['XAUUSD'].includes(sym)) return 0.1;
  if (sym.includes('JPY')) return 0.01;
  return 0.0001;
}
function getSpread(sym) {
  const p = prices[sym];
  if (p?.ask && p?.bid) return +(p.ask - p.bid).toFixed(getDigits(sym)+1);
  return instruments[sym]?.spread || 0;
}
function getSpreadPips(sym) {
  return +(getSpread(sym) / getPip(sym)).toFixed(1);
}

// ── Market Watch ──────────────────────────────────────────────────────
function renderMW() {
  const inst = instruments;
  const groups = {};
  Object.entries(inst).forEach(([sym, info]) => {
    const g = info.type || 'forex';
    if (!groups[g]) groups[g] = [];
    groups[g].push({ sym, ...info });
  });
  const order = ['forex','metals','indices','energies','crypto'];
  const labels = { forex:'Forex', metals:'Metals', indices:'Indices', energies:'Energies', crypto:'Crypto' };
  let html = '';
  order.forEach(g => {
    if (!groups[g]?.length) return;
    html += `<div class="mw-group">${labels[g]||g}</div>`;
    groups[g].forEach(({ sym, name }) => {
      const p = prices[sym] || {};
      const chg = p.change_pct || 0;
      const dg = getDigits(sym);
      html += `<div class="mw-row ${sym===curSym?'active':''}" id="mwr-${sym}" onclick="selectSym('${sym}')">
<div><div class="mw-sym">${sym}</div><div class="mw-name">${name||''}</div></div>
<div class="mw-prices">
  <div style="display:flex;gap:4px;justify-content:flex-end">
    <span class="mw-bid" id="mwb-${sym}">${Fp(p.bid||0,dg)}</span>
    <span class="mw-ask" id="mwa-${sym}">${Fp(p.ask||0,dg)}</span>
  </div>
  <div class="mw-chg ${chg>=0?'up':'dn'}" id="mwc-${sym}">${chg>=0?'+':''}${Fp(chg,2)}%</div>
</div>
</div>`;
    });
  });
  const el=$('mwList');if(el)el.innerHTML=html;
}

function updateMWPrice(sym, p) {
  const prev = prices[sym];
  prices[sym] = { ...prices[sym], ...p };
  const dg = getDigits(sym);
  const bidEl=$('mwb-'+sym), askEl=$('mwa-'+sym), chgEl=$('mwc-'+sym), rowEl=$('mwr-'+sym);
  if (bidEl) bidEl.textContent = Fp(p.bid||prices[sym].bid||0, dg);
  if (askEl) askEl.textContent = Fp(p.ask||prices[sym].ask||0, dg);
  if (chgEl) { const c=p.change_pct||prices[sym].change_pct||0; chgEl.textContent=(c>=0?'+':'')+Fp(c,2)+'%'; chgEl.className='mw-chg '+(c>=0?'up':'dn'); }
  if (rowEl && prev) {
    const dir = (p.bid||0)>(prev.bid||0)?'up':'dn';
    rowEl.classList.add('flash-'+dir);
    setTimeout(()=>rowEl.classList.remove('flash-up','flash-dn'),310);
  }
}

function selectSym(sym) {
  curSym = sym;
  closeAllDropdowns();
  const sel=$('curSym');if(sel)sel.textContent=sym;
  // Update active row in MW
  document.querySelectorAll('.mw-row').forEach(r=>r.classList.remove('active'));
  const ar=$('mwr-'+sym);if(ar)ar.classList.add('active');
  renderTopbar();
  updateOPHeader();
  loadCandles();
  renderPosLines();
}

async function switchAccount(id) {
  closeAllDropdowns();

  account = a;
  localStorage.setItem('pluto_last_account', id);
  updateOPHeader();
  await loadPositions();
  await loadPendingOrders();
  renderBotPanel();
  updateAcctDisplay();
  renderTopbar();
  toast(`Switched to ${F(a.account_size)} account`, 'inf');
}

// ── Chart ─────────────────────────────────────────────────────────────
const TF_MAP = {
  '1m':'1min','5m':'5min','15m':'15min','30m':'30min',
  '1h':'1h','4h':'4h','1d':'1day'
};

function initChart() {
  const container=$('lwChart');
  if(!container)return;
  chart = LightweightCharts.createChart(container, {
    layout:{ background:{type:LightweightCharts.ColorType.Solid,color:'#06050a'}, textColor:'#5a5672' },
    grid:{ vertLines:{color:'rgba(255,255,255,.028)'}, horzLines:{color:'rgba(255,255,255,.028)'} },
    crosshair:{ mode:LightweightCharts.CrosshairMode.Normal, vertLine:{color:'rgba(255,255,255,.2)'}, horzLine:{color:'rgba(255,255,255,.2)'} },
    rightPriceScale:{ borderColor:'rgba(255,255,255,.055)', textColor:'#5a5672' },
    timeScale:{ borderColor:'rgba(255,255,255,.055)', timeVisible:true, secondsVisible:false, tickMarkFormatter:t=>{const d=new Date(t*1000);return d.toLocaleDateString('en',{month:'short',day:'numeric'})} },
    handleScroll:{ vertTouchDrag:true },
    handleScale:{ axisPressedMouseMove:{ time:true, price:true } },
    width:container.offsetWidth, height:container.offsetHeight,
  });
  candleSeries = chart.addCandlestickSeries({
    upColor:'#26d47e', downColor:'#f05b5b',
    borderUpColor:'#26d47e', borderDownColor:'#f05b5b',
    wickUpColor:'#26d47e', wickDownColor:'#f05b5b',
  });
  chart.subscribeCrosshairMove(param=>{
    if (!param.seriesData) return;
    const d = param.seriesData.get(candleSeries);
    if (!d) return;
    const el=$('ohlcInfo');
    if(el) el.innerHTML=`<span class="ohlc-o">O: ${d.open}</span> <span class="ohlc-h">H: ${d.high}</span> <span class="ohlc-l">L: ${d.low}</span> <span class="ohlc-c">C: ${d.close}</span>`;
  });
  // Resize observer
  const ro = new ResizeObserver(()=>{
    if(chart) chart.resize(container.offsetWidth, container.offsetHeight);
  });
  ro.observe(container);
}

async function loadCandles() {
  if (!chart) return;
  const tf = TF_MAP[curTF]||'5min';
  try {
    const data = await api(`/api/trading/candles?symbol=${curSym}&timeframe=${tf}&count=200`);
    if (!data?.length) { $('noDataMsg')&&($('noDataMsg').style.display='flex'); return; }
    $('noDataMsg')&&($('noDataMsg').style.display='none');
    candleData = data.map(c=>({ time:Math.floor(new Date(c.time||c.t).getTime()/1000), open:+c.open, high:+c.high, low:+c.low, close:+c.close }))
      .sort((a,b)=>a.time-b.time);
    candleSeries.setData(candleData);
    chart.timeScale().fitContent();
    renderPosLines();
  } catch(e) { console.warn('Candles:', e.message); }
}

function appendCandle(sym, price) {
  if (sym !== curSym || !candleSeries) return;
  const tf = TF_MAP[curTF]||'5min';
  const ms = { '1min':60,'5min':300,'15min':900,'30min':1800,'1h':3600,'4h':14400,'1day':86400 };
  const secPerBar = ms[tf]||300;
  const now = Math.floor(Date.now()/1000);
  const barTime = now - (now % secPerBar);
  const last = candleData[candleData.length-1];
  const mid = (price.bid + price.ask) / 2;
  if (last && last.time === barTime) {
    last.close = mid;
    last.high = Math.max(last.high, mid);
    last.low  = Math.min(last.low, mid);
    candleSeries.update(last);
  } else if (last && barTime > last.time) {
    const newBar = { time:barTime, open:mid, high:mid, low:mid, close:mid };
    candleData.push(newBar);
    if (candleData.length > 500) candleData.shift();
    candleSeries.update(newBar);
  }
}

function renderPosLines() {
  if (!candleSeries) return;
  // Remove old markers and price lines
  candleSeries.setMarkers([]);
  positions.filter(p=>p.symbol===curSym).forEach(p=>{
    try {
      chart.addPriceLine?.({ price:p.open_price, color:'rgba(162,118,250,.6)', lineWidth:1, lineStyle:LightweightCharts.LineStyle.Dashed, axisLabelVisible:true, title:`${p.direction.toUpperCase()} ${p.volume}` });
      if (p.stop_loss) chart.addPriceLine?.({ price:p.stop_loss, color:'rgba(240,91,91,.6)', lineWidth:1, lineStyle:LightweightCharts.LineStyle.Dotted, axisLabelVisible:true, title:'SL' });
      if (p.take_profit) chart.addPriceLine?.({ price:p.take_profit, color:'rgba(38,212,126,.6)', lineWidth:1, lineStyle:LightweightCharts.LineStyle.Dotted, axisLabelVisible:true, title:'TP' });
    } catch(_) {}
  });
}

  const exp=$('expiryRow');if(exp)exp.style.display=market?'none':'';

function updatePlaceBtn() {
  const btn=$('placeBtn');if(!btn)return;
  const p = prices[curSym]||{};
  const px = curDir==='buy'?(p.ask||0):(p.bid||0);
  const dg = getDigits(curSym);
  const sym = instruments[curSym];
  const isOpen = isMarketOpen() && (sym?.trading_enabled !== 0);

  // Account status checks
  if (!account) {
    btn.textContent='No Account Selected'; btn.className='place-btn buy-now'; btn.disabled=true; return;
  }
  if (account.status === 'failed' || account.status === 'breached') {
    btn.textContent='❌ Account Breached — Trading Disabled'; btn.className='place-btn sell-now'; btn.disabled=true; return;
  }
  if (account.status === 'passed') {
    btn.textContent='✓ Evaluation Passed — Awaiting Funded Account'; btn.className='place-btn buy-now'; btn.disabled=true; return;
  }
  if (account.status === 'pending_payment') {
    btn.textContent='⏳ Awaiting Payment Confirmation'; btn.className='place-btn buy-now'; btn.disabled=true; return;
  }
  if (!isOpen) {
    btn.textContent='Markets Closed'; btn.className='place-btn buy-now'; btn.disabled=true; return;
  }

  btn.textContent = curDir==='buy'
    ? `BUY ${curSym} @ ${Fp(px,dg)}`
    : `SELL ${curSym} @ ${Fp(px,dg)}`;
  btn.className = `place-btn ${curDir==='buy'?'buy-now':'sell-now'}`;
  btn.disabled = false;
}

function setVol(v) { const inp=$('volInput');if(inp)inp.value=v; calcRR(); }

function calcRR() {
  const vol = parseFloat($('volInput')?.value)||0.01;
  const sl = parseFloat($('slInput')?.value)||0;
  const tp = parseFloat($('tpInput')?.value)||0;
  const p = prices[curSym]||{};
  const entPx = curDir==='buy'?(p.ask||0):(p.bid||0);
  const pip = getPip(curSym);
  let risk=0, reward=0, rr=0;
  const pointVal = 10 * vol; // simplified
  if (sl && entPx) {
    const slPips = Math.abs(entPx - sl) / pip;
    risk = slPips * pip * pointVal / pip;
  }
  if (tp && entPx) {
    const tpPips = Math.abs(tp - entPx) / pip;
    reward = tpPips * pip * pointVal / pip;
  }
  if (risk > 0 && reward > 0) rr = +(reward/risk).toFixed(2);
  const rrEl=$('rrBox');
  if(rrEl) rrEl.innerHTML=`<div class="rr-row"><span class="rr-lbl">Volume</span><span class="rr-val">${Fp(vol,2)} lots</span></div>
<div class="rr-row"><span class="rr-lbl">Risk</span><span class="rr-val ${risk>0?'':'neu'}" style="color:${risk>0?'var(--rd)':'var(--t3)'}">${risk?F(risk):'—'}</span></div>
<div class="rr-row"><span class="rr-lbl">Reward</span><span class="rr-val ${reward>0?'':'neu'}" style="color:${reward>0?'var(--gr)':'var(--t3)'}">${reward?F(reward):'—'}</span></div>
<div class="rr-row"><span class="rr-lbl">R:R</span><span class="rr-val" style="color:${rr>=1.5?'var(--gr)':rr>0?'var(--am)':'var(--t3)'}">${rr?'1:'+rr:'—'}</span></div>`;
}

async function placeOrder() {
  if (!account) return toast('Select an account first','err');
  const vol = parseFloat($('volInput')?.value)||0;
  if (!vol||vol<0.01) return toast('Enter valid volume (min 0.01 lots)','err');
  const p = prices[curSym]||{};
  if (!p.bid || !p.ask) return toast('No price available for '+curSym,'err');
  const sl = parseFloat($('slInput')?.value)||null;
  const tp = parseFloat($('tpInput')?.value)||null;
  const tsp = parseFloat($('tspInput')?.value)||null;
  const comment = $('cmtInput')?.value||null;
  const isFunded = account.challenge_type === 'funded';
  const body = {
    symbol: curSym, direction: curDir, volume: vol,
    stop_loss: sl, take_profit: tp, trailing_stop_pips: tsp, comment,
    ...(isFunded ? { funded_account_id: account.id } : { challenge_id: account.id }),
  };
  if (curOT !== 'market') {
    const ep = parseFloat($('entryPriceInput')?.value)||0;
    if (!ep) return toast('Enter entry price for pending order','err');
    body.order_type = curOT;
    body.entry_price = ep;
    const exp = $('expiryInput')?.value;
    if (exp) body.expiry = exp;
  }
  const btn=$('placeBtn');
  btn.disabled=true; btn.textContent='Processing…';
  try {
    if (curOT === 'market') {
      await api('/api/trading/order', { method:'POST', body:JSON.stringify(body) });
      toast(`${curDir.toUpperCase()} ${vol} ${curSym} placed`,'ok');
    } else {
      await api('/api/trading/pending-order', { method:'POST', body:JSON.stringify(body) });
      toast(`${curOT} order placed: ${curDir.toUpperCase()} ${vol} ${curSym}`,'inf');
    }
    // Reset SL/TP fields
    if($('slInput'))$('slInput').value='';
    if($('tpInput'))$('tpInput').value='';
    await loadPositions();
    await loadPendingOrders();
    renderBotPanel();
    renderPosLines();
  } catch(e) { toast(e.message,'err'); }
  finally { updatePlaceBtn(); }
}

// Live P&L update without full re-render
function livePnLUpdate() {
  positions.forEach(p => {
    const el=$('pnl-'+p.id);
    if (!el) return;
    const px=prices[p.symbol];
    if (!px) return;
    const cur=p.direction==='buy'?px.bid:px.ask;
    const pip=getPip(p.symbol);
    const pnl = (p.direction==='buy'?cur-p.open_price:p.open_price-cur) / pip * pip * 10 * p.volume;
    p.profit = +pnl.toFixed(2);
    el.textContent=(pnl>=0?'+':'')+F(pnl);
    el.className=pnl>=0?'up':'dn';
  });
}

// ── WebSocket ─────────────────────────────────────────────────────────
function connectWS() {
  if (ws) { try{ws.close()}catch(_){} }
  ws = new WebSocket(WS);
  ws.onopen = () => {
    wsConnected=true;
    const dot=$('wsDot');if(dot){dot.className='ws-dot connected';dot.title='Connected';}
    clearTimeout(wsReconnectTimer);
  };
  ws.onmessage = e => {
    try {
      const msg = JSON.parse(e.data);
      if (msg.type==='prices' && msg.data) {
        Object.entries(msg.data).forEach(([sym,p])=>{
          updateMWPrice(sym, p);
          appendCandle(sym, p);
          if (sym===curSym) renderTopbar();
        });
        livePnLUpdate();
        updateAcctDisplay();
      }
    } catch(_) {}
  };
  ws.onclose = () => {
    wsConnected=false;
    const dot=$('wsDot');if(dot){dot.className='ws-dot';dot.title='Disconnected';}
    wsReconnectTimer=setTimeout(connectWS, 3000);
  };
  ws.onerror = () => ws.close();
}

// ── Market open ───────────────────────────────────────────────────────
function isMarketOpen() {
  const d=new Date(),day=d.getUTCDay(),h=d.getUTCHours();
  return !(day===6||(day===0&&h<22)||(day===5&&h>=22));
}
function updateMarketStatus() {
  const open=isMarketOpen();
  const dot=$('mktDot');const lbl=$('mktLbl');
  if(dot)dot.className='mkt-dot '+(open?'open':'closed');
  if(lbl)lbl.textContent=open?'Open':'Closed';
  if(!open) toast('Markets closed — Fri 22:00 to Sun 22:00 UTC','warn');
}
function elapsedStr(t) {
  const ms=Date.now()-new Date(t).getTime();
  const m=Math.floor(ms/60000);
  if(m<60)return m+'m';
  if(m<1440)return Math.floor(m/60)+'h '+m%60+'m';
  return Math.floor(m/1440)+'d';
}

          <span class="form-lbl" style="color:var(--rd)">Stop Loss</span>
          <input type="number" id="slInput" class="form-inp" placeholder="0.00000" step="0.00001" oninput="calcRR()">
        </div>
        <div class="form-row">
          <span class="form-lbl" style="color:var(--gr)">Take Profit</span>
          <input type="number" id="tpInput" class="form-inp" placeholder="0.00000" step="0.00001" oninput="calcRR()">
        </div>
      </div>
      <!-- Trailing Stop -->
      <div class="form-row">
        <span class="form-lbl">Trailing Stop (pips, 0=off)</span>
        <input type="number" id="tspInput" class="form-inp" placeholder="0" step="1" min="0">
      </div>
      <!-- Expiry (for pending) -->
      <div id="expiryRow" style="display:none" class="form-row">
        <span class="form-lbl">Expiry (optional)</span>
        <input type="datetime-local" id="expiryInput" class="form-inp">
      </div>
      <!-- Comment -->
      <div class="form-row">
        <span class="form-lbl">Comment (optional)</span>
        <input type="text" id="cmtInput" class="form-inp" placeholder="Trade note…" maxlength="50">
      </div>
      <!-- R:R Box -->
      <div class="rr-box" id="rrBox"></div>
      <div class="divider"></div>
      <!-- Place button -->
      <button id="placeBtn" class="place-btn buy-now" onclick="placeOrder()" disabled>Loading…</button>
      <!-- Risk summary -->
      ${account?'':'<div style="font-size:.7rem;color:var(--am);text-align:center;margin-top:4px">⚠ No active account — select from the top bar</div>'}
    </div>
  </div>
  <!-- Bottom panel -->
  <div class="bot">
    <div class="bot-tabs">
      <div class="bot-tab active" id="btt-positions" onclick="setBotTab('positions')">Positions <span class="bot-count red" id="btt-positions-count">0</span></div>
      <div class="bot-tab" id="btt-orders" onclick="setBotTab('orders')">Pending Orders <span class="bot-count" id="btt-orders-count">0</span></div>
      <div class="bot-tab" id="btt-history" onclick="setBotTab('history')">History <span class="bot-count" id="btt-history-count">0</span></div>
      <div style="margin-left:auto;display:flex;align-items:center;gap:6px;padding:0 6px">
        <button class="btn-tb" onclick="closeAllPositions()" style="font-size:.6rem;padding:2px 7px;color:var(--rd);border-color:rgba(240,91,91,.25)">Close All</button>
      </div>
    </div>
    <div id="botSum" class="bot-summary"></div>
    <div id="botBody" class="bot-body"><div class="empty-bot">Loading…</div></div>
  </div>
</div>`;
  setTimeout(()=>{
    initChart();
    renderMW();
    updateOTInputs();
    calcRR();
    updateMarketStatus();
    selectSym(curSym);
    updateAcctDisplay();
    loadHistory().then(()=>renderBotPanel());
    refreshLoop();
  }, 50);
}

async function closeAllPositions() {
  if (!positions.length) return toast('No open positions','inf');
  if (!confirm(`Close all ${positions.length} open positions?`)) return;
  let closed=0, errs=0;
  for (const p of [...positions]) {
    try { await api('/api/trading/close',{method:'POST',body:JSON.stringify({position_id:p.id})}); closed++; }
    catch(_) { errs++; }
  }
  toast(`Closed ${closed} positions${errs?`, ${errs} errors`:''}`, closed>0?'ok':'err');
  await loadPositions(); renderBotPanel(); renderPosLines();
}

function switchTF(tf) {
  curTF=tf;
  document.querySelectorAll('.tf-btn').forEach(b=>{b.classList.remove('active');if(b.textContent===tf)b.classList.add('active')});
  loadCandles();
}
function switchCT(ct) {
  document.querySelectorAll('.ct-btn').forEach(b=>b.classList.remove('active'));
  $('ct-'+ct)?.classList.add('active');
  if(!chart||!candleSeries)return;
  // Toggle series type
  chart.removeSeries(candleSeries);
  if(ct==='line'){
    candleSeries=chart.addLineSeries({color:'#7c3aed',lineWidth:2});
  } else {
    candleSeries=chart.addCandlestickSeries({upColor:'#26d47e',downColor:'#f05b5b',borderUpColor:'#26d47e',borderDownColor:'#f05b5b',wickUpColor:'#26d47e',wickDownColor:'#f05b5b'});
  }
  if(ct==='line'){
    const lineData=candleData.map(c=>({time:c.time,value:c.close}));
    candleSeries.setData(lineData);
  } else {
    candleSeries.setData(candleData);
  }
}

function logout(){localStorage.removeItem('pcf_token');localStorage.removeItem('pcf_user');location.href='/'}

// ── LOGIN ─────────────────────────────────────────────────────────────
function showLogin() {
  $('app').innerHTML=`<div class="lp"><div class="lc">
<div style="display:flex;align-items:center;gap:10px;margin-bottom:22px">
  <div class="logo-circle" style="width:42px;height:42px;font-size:17px;background:linear-gradient(135deg,#7c3aed,#6d28d9)">P</div>
  <div><div style="font-size:.95rem;font-weight:800">PlutoTrader</div><div style="font-size:.7rem;color:var(--t2)">Professional Trading Terminal</div></div>
</div>
<div class="le" id="lErr"></div>
<div class="field"><label class="flbl">Email</label><input type="email" id="lEm" class="form-inp" placeholder="your@email.com" autofocus></div>
<div class="field"><label class="flbl">Password</label><input type="password" id="lPw" class="form-inp" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"></div>
<button class="lb" onclick="doLogin()">Launch Terminal</button>
<div style="text-align:center;margin-top:12px;font-size:.7rem;color:var(--t3)">
No account? <a href="/" style="color:var(--ac2)">Get Funded →</a>
</div></div></div>`;
}

async function doLogin(){
  const em=$('lEm')?.value.trim(), pw=$('lPw')?.value;
  const err=$('lErr');
  if(!em||!pw){err.style.display='block';err.textContent='Enter email and password';return}
  const btn=document.querySelector('.lb');btn.textContent='Connecting…';btn.disabled=true;
  try{
    const r=await fetch(BE+'/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:em,password:pw})});
    const d=await r.json();
    if(!r.ok)throw new Error(d.error||'Login failed');
    localStorage.setItem('pcf_token',d.token);localStorage.setItem('pcf_user',JSON.stringify(d.user));
    token=d.token;boot();
  }catch(e){err.style.display='block';err.textContent=e.message;btn.textContent='Launch Terminal';btn.disabled=false}
}

// ── BOOT ──────────────────────────────────────────────────────────────
async function boot() {
  if (!token) { showLogin(); return; }
  try {
    const [instList, acctList] = await Promise.all([
      api('/api/trading/instruments'),
      api('/api/trading/accounts'),
    ]);
    instList.forEach(i=>{ instruments[i.symbol]=i; prices[i.symbol]={bid:i.last_price||0,ask:(i.last_price||0)+i.spread,change_pct:0}; });
    accounts = acctList.filter(a=>a.status==='active'||a.status==='funded');
    // Select last used or first active account
    const lastId = localStorage.getItem('pluto_last_account');
    account = accounts.find(a=>a.id===lastId) || accounts[0] || null;
    renderApp();
    connectWS();
    setInterval(updateClock,1000);
    setInterval(updateMarketStatus,60000);
    updateClock();
  } catch(e) {
    if (e.message.includes('401')||e.message.includes('Unauthorized')) { localStorage.removeItem('pcf_token'); showLogin(); }
    else { $('app').innerHTML=`<div class="lp"><div class="lc"><div style="color:var(--rd);margin-bottom:12px">⚠ Connection failed: ${e.message}</div><button class="lb" onclick="boot()">Retry</button></div></div>`; }
  }
}

boot();
</script>
</body>
</html>
