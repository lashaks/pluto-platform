<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=IBM+Plex+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ─── RESET ─────────────────────────────────────────────────────────── */
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#080c12;
  --bg2:#0c1018;
  --p1:#0f141c;
  --p2:#141a24;
  --p3:#1a2130;
  --p4:#212838;
  --wire:rgba(255,255,255,.045);
  --wire2:rgba(255,255,255,.08);
  --wire3:rgba(255,255,255,.13);
  --ink1:#e8edf5;
  --ink2:#7a869a;
  --ink3:#4a5568;
  --ink4:#2d3748;
  --teal:#00d4c8;
  --teal2:#00a89e;
  --tealb:rgba(0,212,200,.08);
  --tealg:rgba(0,212,200,.25);
  --grn:#00e676;
  --grn2:#00c160;
  --grnb:rgba(0,230,118,.07);
  --grngl:rgba(0,230,118,.3);
  --red:#ff4757;
  --red2:#cc3a47;
  --redb:rgba(255,71,87,.07);
  --redgl:rgba(255,71,87,.3);
  --amb:#ffb300;
  --ambb:rgba(255,179,0,.08);
  --blu:#448aff;
  --blub:rgba(68,138,255,.08);
  --ff:'Outfit',sans-serif;
  --fm:'IBM Plex Mono',monospace;
  --r:5px;--r2:7px;--r3:11px;
  --tb:46px;--mw:210px;--rp:276px;--bot:200px;--ab:30px;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--ink1);font-family:var(--ff);font-size:13px;-webkit-font-smoothing:antialiased;user-select:none}
input,select,button,textarea{font-family:inherit;font-size:inherit}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--p4);border-radius:2px}

/* ─── GRID ───────────────────────────────────────────────────────────── */
#tb{position:fixed;top:0;left:0;right:0;height:var(--tb);background:var(--bg2);border-bottom:1px solid var(--wire);z-index:200;display:flex;align-items:stretch}
#body{position:fixed;top:var(--tb);left:0;right:0;bottom:calc(var(--bot)+var(--ab));display:grid;grid-template-columns:var(--mw) 1fr var(--rp)}
#botArea{position:fixed;bottom:var(--ab);left:0;right:0;height:var(--bot);background:var(--p1);border-top:1px solid var(--wire);display:flex;flex-direction:column}
#ab{position:fixed;bottom:0;left:0;right:0;height:var(--ab);background:var(--bg);border-top:1px solid var(--wire);display:flex;align-items:center;padding:0 8px;gap:0;overflow:hidden}

/* ─── TOPBAR ─────────────────────────────────────────────────────────── */
.tb-logo{display:flex;align-items:center;gap:8px;padding:0 14px;border-right:1px solid var(--wire);flex-shrink:0;cursor:pointer}
.tb-mark{width:26px;height:26px;background:var(--teal);border-radius:5px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.tb-mark svg{display:block}
.tb-wordmark{font-size:.82rem;font-weight:800;letter-spacing:.04em;color:var(--ink1)}
.tb-wordmark em{font-style:normal;color:var(--teal)}

.tb-sym-btn{display:flex;align-items:center;gap:8px;padding:0 12px;border-right:1px solid var(--wire);cursor:pointer;min-width:170px;transition:.15s}
.tb-sym-btn:hover{background:rgba(255,255,255,.02)}
.tb-sym-name{font-size:.88rem;font-weight:700;font-family:var(--fm);color:var(--ink1);letter-spacing:.02em}
.tb-sym-spread{font-size:.57rem;color:var(--ink3);font-family:var(--fm)}
.tb-prices{display:flex;flex-direction:column;align-items:flex-end;padding:0 2px}
.tb-bid{font-size:.75rem;font-weight:600;font-family:var(--fm);color:var(--red);line-height:1.1}
.tb-ask{font-size:.75rem;font-weight:600;font-family:var(--fm);color:var(--grn);line-height:1.1}
.tb-chg{font-size:.64rem;font-family:var(--fm);font-weight:600}

/* TF strip */
.tf-strip{display:flex;align-items:center;gap:0;padding:0 6px;border-right:1px solid var(--wire);height:100%}
.tf{padding:3px 7px;background:transparent;border:none;color:var(--ink3);font-size:.66rem;font-weight:700;cursor:pointer;border-radius:var(--r);font-family:var(--fm);transition:.12s;letter-spacing:.03em}
.tf:hover{color:var(--ink2);background:rgba(255,255,255,.03)}
.tf.on{background:var(--tealb);color:var(--teal);border:1px solid var(--tealg)}

/* Draw strip */
.draw-strip{display:flex;align-items:center;gap:1px;padding:0 6px;border-right:1px solid var(--wire);height:100%}
.db{width:26px;height:26px;display:flex;align-items:center;justify-content:center;background:transparent;border:1px solid transparent;border-radius:var(--r);color:var(--ink3);cursor:pointer;transition:.12s;font-size:10px}
.db:hover{background:rgba(255,255,255,.04);color:var(--ink2);border-color:var(--wire2)}
.db.on{background:var(--tealb);color:var(--teal);border-color:var(--tealg)}
.db.danger{color:var(--red) !important}

/* Right TB */
.tb-r{margin-left:auto;display:flex;align-items:center;gap:6px;padding:0 10px}
.tb-rbtn{padding:3px 9px;background:transparent;border:1px solid var(--wire2);border-radius:var(--r);color:var(--ink2);font-size:.6rem;font-weight:700;cursor:pointer;transition:.12s;font-family:var(--ff)}
.tb-rbtn:hover{border-color:var(--wire3);color:var(--ink1)}
.tb-acct-pill{display:flex;align-items:center;gap:6px;padding:4px 10px;background:var(--p2);border:1px solid var(--wire2);border-radius:var(--r2);cursor:pointer;transition:.12s}
.tb-acct-pill:hover{border-color:var(--tealg)}
.wsdot{width:6px;height:6px;border-radius:50%;background:var(--red);flex-shrink:0;transition:.3s}
.wsdot.on{background:var(--grn);box-shadow:0 0 5px rgba(0,230,118,.5);animation:blink 2.5s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}
#tbClock{font-family:var(--fm);font-size:.58rem;color:var(--ink3);padding:0 6px;border-left:1px solid var(--wire)}

/* ─── MARKET WATCH ───────────────────────────────────────────────────── */
#mw{background:var(--p1);border-right:1px solid var(--wire);display:flex;flex-direction:column;overflow:hidden}
.mw-top{padding:6px 8px 4px;border-bottom:1px solid var(--wire);flex-shrink:0;display:flex;align-items:center;justify-content:space-between}
.mw-ttl{font-size:.55rem;font-weight:800;text-transform:uppercase;letter-spacing:.14em;color:var(--ink3)}
.mw-search{padding:4px 6px;flex-shrink:0;border-bottom:1px solid var(--wire)}
.mw-si{width:100%;background:var(--p2);border:1px solid var(--wire);border-radius:var(--r);padding:3px 7px;color:var(--ink1);font-size:.68rem;outline:none;font-family:var(--ff)}
.mw-si:focus{border-color:var(--tealg)}
.mw-hdr{display:grid;grid-template-columns:1fr 52px 42px;padding:2px 6px;background:var(--p2);border-bottom:1px solid var(--wire);flex-shrink:0}
.mw-hdr span{font-size:.5rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--ink4)}
.mw-scroll{flex:1;overflow-y:auto}
.mw-grp{padding:5px 6px 2px;font-size:.5rem;font-weight:800;text-transform:uppercase;letter-spacing:.14em;color:var(--ink4);background:var(--p2)}
.mw-row{display:grid;grid-template-columns:1fr 56px 44px;align-items:center;padding:5px 7px;cursor:pointer;border-left:2px solid transparent;transition:.08s;position:relative}
.mw-row:hover{background:rgba(255,255,255,.025)}
.mw-row.on{background:rgba(0,212,200,.05);border-left-color:var(--teal)}
.mw-row:hover .mw-qt{display:flex}
.mw-s{font-size:.74rem;font-weight:700;font-family:var(--fm);color:var(--ink1);letter-spacing:.01em}
.mw-n{font-size:.57rem;color:var(--ink3)}
.mw-b{font-family:var(--fm);font-size:.68rem;font-weight:600;color:var(--red);text-align:right}
.mw-a{font-family:var(--fm);font-size:.68rem;font-weight:600;color:var(--grn);text-align:right}
.mw-c{font-size:.6rem;font-weight:700;font-family:var(--fm);text-align:right}
.up{color:var(--grn)}.dn{color:var(--red)}
.fu{animation:fu .35s ease}
.fd{animation:fd .35s ease}
@keyframes fu{0%{background:rgba(0,230,118,.12)}100%{background:transparent}}
@keyframes fd{0%{background:rgba(255,71,87,.12)}100%{background:transparent}}
.mw-qt{display:none;position:absolute;right:3px;top:50%;transform:translateY(-50%);gap:2px;z-index:2}
.mw-qt button{padding:1px 6px;border:none;border-radius:3px;font-size:.55rem;font-weight:700;cursor:pointer;font-family:var(--ff)}
.mw-qs{background:var(--red);color:#fff}
.mw-qb{background:var(--grn);color:#000}

/* ─── CHART ──────────────────────────────────────────────────────────── */
#ca{position:relative;overflow:hidden;background:#131722;display:flex;flex-direction:column}
#lwc{position:absolute;inset:0}
#dc{position:absolute;inset:0;pointer-events:none;z-index:5}
.ca-ohlc{position:absolute;top:4px;left:6px;z-index:6;font-family:var(--fm);font-size:.62rem;color:#787b86;pointer-events:none;line-height:1.8;background:rgba(19,23,34,.85);border:1px solid #2a2e39;border-radius:var(--r);padding:4px 9px}
.ca-crosshair-price{position:absolute;right:0;background:var(--p3);border:1px solid var(--wire2);padding:1px 5px;font-family:var(--fm);font-size:.6rem;color:var(--ink1);pointer-events:none;z-index:7;transform:translateY(-50%)}
.ca-sym-badge{position:absolute;top:4px;right:8px;z-index:6;background:rgba(8,12,18,.75);border:1px solid var(--wire);border-radius:var(--r);padding:3px 8px;font-family:var(--fm);font-size:.65rem;font-weight:700;color:var(--teal);pointer-events:none}

/* ─── ORDER PANEL (right) ────────────────────────────────────────────── */
#rp{background:var(--p1);border-left:1px solid var(--wire);display:flex;flex-direction:column;overflow:hidden}

/* Symbol header */
.rp-sym-hd{padding:8px 10px 6px;border-bottom:1px solid var(--wire);flex-shrink:0}
.rp-sym-row{display:flex;align-items:center;justify-content:space-between}
.rp-sym{font-size:.88rem;font-weight:700;font-family:var(--fm);color:var(--ink1);letter-spacing:.03em}
.rp-desc{font-size:.58rem;color:var(--ink3);margin-top:1px}

/* Big bid/ask buttons */
.bs-grid{display:grid;grid-template-columns:1fr 1fr;gap:2px;padding:6px 8px;flex-shrink:0}
.bs-btn{padding:10px 4px;border:1px solid;border-radius:var(--r2);cursor:pointer;text-align:center;transition:.12s;display:flex;flex-direction:column;align-items:center;gap:1px;font-family:var(--fm)}
.bs-sell{background:var(--redb);border-color:var(--redgl);color:var(--red)}
.bs-sell:hover,.bs-sell.sel{background:var(--red);color:#fff;border-color:var(--red)}
.bs-buy{background:var(--grnb);border-color:var(--grngl);color:var(--grn)}
.bs-buy:hover,.bs-buy.sel{background:var(--grn);color:#000;border-color:var(--grn)}
.bs-lbl{font-size:.66rem;font-weight:800;letter-spacing:.06em}
.bs-px{font-size:.9rem;font-weight:700}
.bs-sub{font-size:.52rem;opacity:.65;font-family:var(--ff)}
.spr-line{text-align:center;font-size:.56rem;color:var(--ink3);font-family:var(--fm);padding:0 8px 2px;flex-shrink:0}

/* OT tabs */
.ot-bar{display:flex;gap:1px;padding:4px 8px;flex-shrink:0}
.ot-tab{flex:1;padding:5px 2px;background:var(--p2);border:1px solid var(--wire);border-radius:var(--r);cursor:pointer;font-size:.62rem;font-weight:700;text-align:center;color:var(--ink3);transition:.12s;letter-spacing:.04em;text-transform:uppercase}
.ot-tab.on{background:var(--tealb);color:var(--teal);border-color:var(--tealg)}

/* Panel body */
.rp-body{flex:1;overflow-y:auto;padding:6px 8px;display:flex;flex-direction:column;gap:5px}

/* Field */
.f{display:flex;flex-direction:column;gap:1px}
.fl{font-size:.58rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--ink3)}
.fi{background:var(--p2);border:1px solid var(--wire);border-radius:var(--r);padding:5px 7px;color:var(--ink1);font-family:var(--fm);font-size:.78rem;outline:none;width:100%;transition:.12s}
.fi:focus{border-color:var(--tealg)}
.fs{background:var(--p2);border:1px solid var(--wire);border-radius:var(--r);padding:4px 6px;color:var(--ink1);font-size:.7rem;outline:none;cursor:pointer;width:100%}
.fs option{background:var(--p1)}

/* Vol quick */
.vq{display:flex;gap:1px;margin-top:2px}
.vqb{flex:1;padding:3px 0;background:var(--p3);border:1px solid var(--wire);border-radius:3px;color:var(--ink3);font-size:.6rem;font-weight:700;cursor:pointer;font-family:var(--fm);transition:.1s;text-align:center}
.vqb:hover{background:var(--p4);color:var(--ink2)}

/* SL/TP */
.sltp{background:var(--p2);border:1px solid var(--wire);border-radius:var(--r2);padding:6px 7px}
.sltp-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.sltp-ttl{font-size:.62rem;font-weight:800;text-transform:uppercase;letter-spacing:.1em}
.sl-ttl{color:var(--red)}.tp-ttl{color:var(--grn)}
.sltp-modes{display:flex;gap:1px}
.slm{padding:1px 5px;border-radius:3px;font-size:.52rem;font-weight:700;cursor:pointer;color:var(--ink3);transition:.1s}
.slm.on{background:var(--p4);color:var(--ink1)}
.sltp-body{display:grid;grid-template-columns:1fr 1fr;gap:3px}
.sfld{display:flex;flex-direction:column;gap:1px}
.sfl{font-size:.56rem;color:var(--ink3);font-weight:600;letter-spacing:.06em;text-transform:uppercase}
.si{background:var(--p3);border:1px solid var(--wire);border-radius:3px;padding:4px 6px;color:var(--ink1);font-family:var(--fm);font-size:.74rem;outline:none;width:100%;transition:.12s}
.si:focus{border-color:var(--tealg)}
.si:disabled{opacity:.3}

/* Toggles */
.tgl-r{display:flex;align-items:center;justify-content:space-between;font-size:.65rem}
.tgl-l{color:var(--ink2);font-weight:500}
.tgl{position:relative;display:inline-block;width:28px;height:14px;flex-shrink:0}
.tgl input{opacity:0;width:0;height:0}
.tgl-s{position:absolute;cursor:pointer;inset:0;background:var(--p3);border-radius:7px;transition:.18s;border:1px solid var(--wire)}
.tgl-s::before{content:'';position:absolute;width:8px;height:8px;left:2px;bottom:2px;background:var(--ink3);border-radius:50%;transition:.18s}
.tgl input:checked+.tgl-s{background:var(--teal);border-color:var(--teal)}
.tgl input:checked+.tgl-s::before{transform:translateX(14px);background:#000}

/* Calc strip */
.calc-s{display:flex;justify-content:space-between;background:var(--p3);border:1px solid var(--wire);border-radius:var(--r);padding:4px 8px;font-size:.64rem}
.cs-l{color:var(--ink3)}.cs-v{font-family:var(--fm);font-weight:700;color:var(--ink2)}
.rr-val{font-family:var(--fm);font-weight:700;font-size:.58rem}

/* Market closed */
.mkt-warn{background:rgba(255,71,87,.06);border:1px solid rgba(255,71,87,.2);border-radius:var(--r2);padding:5px 8px;font-size:.65rem;color:var(--red);text-align:center;line-height:1.4;flex-shrink:0;margin:0 8px}

/* Place btn */
.place{width:100%;padding:11px;border:none;border-radius:var(--r2);cursor:pointer;font-weight:800;font-size:.82rem;letter-spacing:.04em;transition:.15s;font-family:var(--ff);flex-shrink:0}
.place-b{background:linear-gradient(135deg,var(--grn),var(--grn2));color:#000;box-shadow:0 3px 12px rgba(0,230,118,.2)}
.place-b:hover{transform:translateY(-1px);box-shadow:0 5px 18px rgba(0,230,118,.35)}
.place-s{background:linear-gradient(135deg,var(--red),var(--red2));color:#fff;box-shadow:0 3px 12px rgba(255,71,87,.2)}
.place-s:hover{transform:translateY(-1px);box-shadow:0 5px 18px rgba(255,71,87,.35)}
.place:active{transform:translateY(0)!important;box-shadow:none!important}
.place:disabled{opacity:.4;cursor:not-allowed;transform:none!important}

/* ─── BOTTOM PANEL ───────────────────────────────────────────────────── */
.bot-tabs{display:flex;align-items:center;border-bottom:1px solid var(--wire);flex-shrink:0;padding:0 6px;height:32px;gap:0;overflow-x:auto}
.bt{padding:4px 12px;cursor:pointer;font-size:.65rem;font-weight:700;color:var(--ink3);border-bottom:2px solid transparent;transition:.12s;white-space:nowrap;height:28px;display:flex;align-items:center;gap:3px;letter-spacing:.04em;text-transform:uppercase}
.bt:hover{color:var(--ink2)}
.bt.on{color:var(--teal);border-bottom-color:var(--teal);height:32px}
.bc{display:inline-block;background:var(--redb);color:var(--red);padding:0 4px;border-radius:6px;font-size:.5rem;font-weight:800;min-width:13px;text-align:center}
.bc.neu{background:var(--tealb);color:var(--teal)}
.bot-summary{display:flex;gap:0;border-bottom:1px solid var(--wire);flex-shrink:0;overflow-x:auto}
.bsi{display:flex;gap:5px;align-items:center;padding:3px 10px;border-right:1px solid var(--wire);font-size:.58rem;white-space:nowrap}
.bsl{color:var(--ink3)}.bsv{font-family:var(--fm);font-weight:700}
.bot-scroll{flex:1;overflow-y:auto}

/* Tables */
.tbl{width:100%;border-collapse:collapse;font-size:.7rem}
.tbl th{padding:5px 8px;text-align:left;font-size:.56rem;text-transform:uppercase;letter-spacing:.1em;color:var(--ink3);background:var(--p2);border-bottom:1px solid var(--wire);white-space:nowrap;position:sticky;top:0;z-index:1;font-weight:700}
.tbl td{padding:5px 8px;border-bottom:1px solid rgba(255,255,255,.018);font-family:var(--fm);white-space:nowrap;vertical-align:middle}
.tbl tr:hover td{background:rgba(255,255,255,.018)}
.tsym{font-weight:700;color:var(--ink1);font-family:var(--ff);font-size:.66rem}
.empt{padding:28px;text-align:center;color:var(--ink3);font-size:.7rem}
.pa-row{display:flex;gap:2px}
.pa{padding:1px 5px;border:1px solid;border-radius:3px;cursor:pointer;font-size:.54rem;font-weight:700;font-family:var(--ff);transition:.1s}
.pa-x{background:var(--redb);color:var(--red);border-color:var(--redgl)}
.pa-x:hover{background:rgba(255,71,87,.2)}
.pa-m{background:var(--blub);color:var(--blu);border-color:rgba(68,138,255,.3)}
.pa-p{background:var(--tealb);color:var(--teal);border-color:var(--tealg)}
.pa-rev{background:var(--ambb);color:var(--amb);border-color:rgba(255,179,0,.3)}

/* ─── ACCOUNT BAR ────────────────────────────────────────────────────── */
.ab-itm{display:flex;gap:5px;align-items:center;padding:0 10px;border-right:1px solid var(--wire);font-size:.62rem;white-space:nowrap}
.ab-l{color:var(--ink3)}.ab-v{font-family:var(--fm);font-weight:700}

/* ─── DROPDOWNS ──────────────────────────────────────────────────────── */
.drop{position:fixed;z-index:500;background:var(--p2);border:1px solid var(--wire3);border-radius:var(--r3);box-shadow:0 14px 44px rgba(0,0,0,.7);overflow:hidden;max-height:440px;overflow-y:auto}
.drop-sym{width:460px}
.dss{padding:7px 9px;border-bottom:1px solid var(--wire);display:flex;gap:6px;align-items:center}
.dss-i{flex:1;background:transparent;border:none;color:var(--ink1);font-size:.72rem;outline:none;font-family:var(--ff)}
.ds-grp{padding:3px 10px;font-size:.5rem;font-weight:800;text-transform:uppercase;letter-spacing:.12em;color:var(--ink4);background:var(--p3)}
.ds-row{display:grid;grid-template-columns:80px 1fr auto;align-items:center;padding:5px 10px;cursor:pointer;gap:8px;transition:.1s}
.ds-row:hover{background:rgba(255,255,255,.04)}
.ds-row.on{background:rgba(0,212,200,.06)}
.drop-acct{width:320px}
.da-row{padding:9px 12px;cursor:pointer;border-bottom:1px solid var(--wire);transition:.1s}
.da-row:last-child{border-bottom:none}
.da-row:hover{background:rgba(255,255,255,.025)}
.da-row.on{background:rgba(0,212,200,.05)}

/* ─── MODAL ──────────────────────────────────────────────────────────── */
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(10px);z-index:600;display:flex;align-items:center;justify-content:center}
.mbox{background:var(--p2);border:1px solid var(--wire2);border-radius:var(--r3);padding:18px;min-width:290px;max-width:400px;width:calc(100%-24px);max-height:90vh;overflow-y:auto;box-shadow:0 18px 56px rgba(0,0,0,.6)}
.mbox h3{font-size:.8rem;font-weight:700;margin-bottom:10px;color:var(--ink1)}
.mbtns{display:flex;gap:6px;justify-content:flex-end;margin-top:10px}
.mfd{display:flex;flex-direction:column;gap:1px;margin-bottom:8px}
.mfl{display:block;font-size:.52rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--ink3);margin-bottom:2px}
.bo{padding:3px 9px;background:transparent;border:1px solid var(--wire2);border-radius:var(--r);color:var(--ink2);font-size:.62rem;font-weight:700;cursor:pointer;transition:.12s}
.bo:hover{border-color:var(--wire3);color:var(--ink1)}
.bp{padding:3px 9px;background:var(--teal);border:none;border-radius:var(--r);color:#000;font-size:.62rem;font-weight:800;cursor:pointer;transition:.12s}
.bp:hover{opacity:.9}
.bd{padding:3px 9px;background:var(--redb);border:1px solid var(--redgl);border-radius:var(--r);color:var(--red);font-size:.62rem;font-weight:700;cursor:pointer}

/* ─── TOASTS ─────────────────────────────────────────────────────────── */
#toasts{position:fixed;bottom:36px;right:12px;z-index:900;display:flex;flex-direction:column;gap:3px;pointer-events:none}
.ti{padding:6px 11px;border-radius:var(--r2);font-size:.66rem;font-weight:600;border:1px solid;animation:tin .18s ease}
.tok{background:rgba(0,230,118,.08);border-color:rgba(0,230,118,.25);color:var(--grn)}
.terr{background:rgba(255,71,87,.08);border-color:rgba(255,71,87,.25);color:var(--red)}
.tinf{background:rgba(0,212,200,.08);border-color:var(--tealg);color:var(--teal)}
.twrn{background:rgba(255,179,0,.08);border-color:rgba(255,179,0,.3);color:var(--amb)}
@keyframes tin{from{opacity:0;transform:translateX(8px)}to{opacity:1;transform:none}}

/* ─── LOGIN ──────────────────────────────────────────────────────────── */
.lp{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:var(--bg);z-index:999;background-image:radial-gradient(ellipse at 30% 40%,rgba(0,212,200,.04) 0%,transparent 60%),radial-gradient(ellipse at 70% 60%,rgba(0,230,118,.03) 0%,transparent 50%)}
.lc{background:var(--p1);border:1px solid var(--wire2);border-radius:var(--r3);padding:28px;width:340px;box-shadow:0 18px 56px rgba(0,0,0,.6)}
.lhead{display:flex;align-items:center;gap:10px;margin-bottom:20px}
.lmark{width:38px;height:38px;background:var(--teal);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.lb{width:100%;background:var(--teal);border:none;border-radius:var(--r2);padding:10px;color:#000;font-size:.8rem;font-weight:800;cursor:pointer;transition:.15s;font-family:var(--ff);letter-spacing:.02em}
.lb:hover{background:var(--teal2);transform:translateY(-1px)}
.le{display:none;background:var(--redb);border:1px solid var(--redgl);border-radius:var(--r);padding:5px 8px;color:var(--red);font-size:.66rem;margin-bottom:8px}
</style>
</head>
<body>
<div id="toasts"></div>
<div id="mbg2" style="display:none" class="mbg" onclick="if(event.target===this)cMod()"><div class="mbox" id="mbox2"></div></div>
<div id="sdrop" style="display:none" class="drop drop-sym"></div>
<div id="adrop" style="display:none" class="drop drop-acct"></div>
<div id="app"></div>

<script>
// ══════════════════════════════════════════════════════════════════════
// PlutoTrader v3 — Industrial Dark  |  Outfit + IBM Plex Mono
// ══════════════════════════════════════════════════════════════════════
const BE  = location.hostname==='localhost' ? '' : 'https://pluto-platform-production.up.railway.app';
const WSU = BE.replace('https','wss').replace('http','ws') + '/ws/prices';
let token = localStorage.getItem('pcf_token');

// ── API ──────────────────────────────────────────────────────────────
async function api(path, o={}) {
  const r = await fetch(BE+path, {...o, headers: {'Content-Type':'application/json','Authorization':'Bearer '+(token||''), ...(o.headers||{})}});
  const d = await r.json().catch(()=>({}));
  if (r.status===401) { logout(); return; }
  if (!r.ok) throw new Error(d.error||`HTTP ${r.status}`);
  return d;
}

// ── Toast ────────────────────────────────────────────────────────────
function toast(msg, t='inf', ms=3200) {
  const el = Object.assign(document.createElement('div'), {className:`ti t${t}`, textContent:msg});
  $('toasts').appendChild(el);
  setTimeout(()=>{ el.style.transition='opacity .2s'; el.style.opacity='0'; setTimeout(()=>el.remove(),220); }, ms);
}

// ── Helpers ──────────────────────────────────────────────────────────
const $  = id => document.getElementById(id);
const F  = (n,d=2) => '$'+Number(n||0).toLocaleString('en',{minimumFractionDigits:d,maximumFractionDigits:d});
const Fp = (n,d) => Number(n||0).toFixed(d!=null?d:5);
const elapsed = t => { const m=Math.floor((Date.now()-new Date(t))/60000); return m<60?m+'m':Math.floor(m/60)+'h'+(m%60)+'m'; };

// ── State ────────────────────────────────────────────────────────────
let inst={}, px={}, accounts=[], acct=null;
let pos=[], pend=[], hist=[], alerts=[], journal=[];
let sym='EURUSD', dir='buy', ot='market', tf='5m';
let chart=null, cSeries=null, vSeries=null, candles=[];
let ws=null, wsOn=false, botTab='pos';
let drawTool=null, drawings=[], drawPt=null;
let slOn=false, tpOn=false, trOn=false, slMode='pips', tpMode='pips';
let showGrid=true, refreshT=null;

// ── Instrument helpers ────────────────────────────────────────────────
function digs(s){ const i=inst[s]; if(i?.digits)return i.digits; if(['XAUUSD','XAGUSD'].includes(s))return 2; if(['US30','NAS100','US500','GER40','UK100'].includes(s))return 1; if(s?.includes('JPY'))return 3; return 5; }
function pip(s){ const i=inst[s]; if(i?.pip)return i.pip; if(['US30','NAS100','US500','GER40','UK100'].includes(s))return 1; if(['XAUUSD','XAGUSD'].includes(s))return 0.1; if(s?.includes('JPY'))return 0.01; return 0.0001; }
function spr(s){ const p=px[s]; if(p?.ask&&p?.bid)return +(p.ask-p.bid).toFixed(digs(s)+1); return inst[s]?.spread||0; }
function sprPips(s){ return +(spr(s)/pip(s)).toFixed(1); }
function pipVal(s,v){ const i=inst[s]; if(i?.pipValue)return +(i.pipValue*v).toFixed(2); return +(pip(s)*v*100000/px[s]?.ask||1).toFixed(2)||+(v*pip(s)*10).toFixed(2); }
function margin(s,v){ const p=px[s]||{}; const ep=dir==='buy'?(p.ask||1):(p.bid||1); const lev=acct?.leverage?.replace('1:','')||30; return +(ep*v*(inst[s]?.contract_size||100000)/lev).toFixed(2); }

// ── Modals ────────────────────────────────────────────────────────────
function showMod(h){$('mbg2').style.display='flex';$('mbox2').innerHTML=h;}
function cMod(){$('mbg2').style.display='none';}

// ── Dropdowns ────────────────────────────────────────────────────────
document.addEventListener('click', e=>{
  if(!e.target.closest('#sdrop')&&!e.target.closest('#tbSym')&&!e.target.closest('#adrop')&&!e.target.closest('#tbAcct'))
    closeDrops();
});
function closeDrops(){$('sdrop').style.display='none';$('adrop').style.display='none';}

function logout(){localStorage.removeItem('pcf_token');localStorage.removeItem('pcf_user');location.href='/';}

// ══════════════════════════════════════════════════════════════════════
//  TOPBAR
// ══════════════════════════════════════════════════════════════════════
function renderTB(){
  const p=px[sym]||{}, dg=digs(sym), sp=sprPips(sym), chg=p.change_pct||0;
  const si=$('tbSI');
  if(si) si.innerHTML=`
<div class="tb-prices"><div class="tb-bid">${Fp(p.bid||0,dg)}</div><div class="tb-ask">${Fp(p.ask||0,dg)}</div></div>
<div style="display:flex;flex-direction:column;padding:0 4px">
  <div class="tb-chg ${chg>=0?'up':'dn'}">${chg>=0?'+':''}${Fp(chg,2)}%</div>
  <div class="tb-sym-spread">Spr ${sp}</div>
</div>`;
  // Update order panel
  const bs=$('bSell'); if(bs){bs.querySelector('.bs-px').textContent=Fp(p.bid||0,dg);}
  const bb=$('bBuy');  if(bb){bb.querySelector('.bs-px').textContent=Fp(p.ask||0,dg);}
  const sl=$('sprLine'); if(sl) sl.textContent=`Spread ${sp}pts · H:${Fp(p.high||0,dg)} · L:${Fp(p.low||0,dg)}`;
  updatePlaceBtn(); calcUpdate(); updateAB();
}

function updateAB(){
  if(!acct)return;
  const fp=pos.reduce((s,p)=>s+(p.profit||0),0);
  const bal=acct.current_balance||0, eq=bal+fp;
  const mu=pos.reduce((s,p)=>s+margin(p.symbol,p.volume),0);
  const fm=Math.max(0,bal-mu);
  const ml=mu>0?+(eq/mu*100).toFixed(1):0;
  const ab=$('ab');
  if(!ab)return;
  ab.innerHTML=`
<div class="ab-itm"><span class="ab-l">Balance</span><span class="ab-v">${F(bal)}</span></div>
<div class="ab-itm"><span class="ab-l">Equity</span><span class="ab-v" style="color:${eq>=bal?'var(--grn)':'var(--red)'}">${F(eq)}</span></div>
<div class="ab-itm"><span class="ab-l">Float P&L</span><span class="ab-v" style="color:${fp>=0?'var(--grn)':'var(--red)'}">${fp>=0?'+':''}${F(fp)}</span></div>
<div class="ab-itm"><span class="ab-l">Margin</span><span class="ab-v">${F(mu)}</span></div>
<div class="ab-itm"><span class="ab-l">Free Margin</span><span class="ab-v">${F(fm)}</span></div>
<div class="ab-itm"><span class="ab-l">Margin Lvl</span><span class="ab-v" style="color:${ml>200?'var(--grn)':ml>100?'var(--amb)':'var(--red)'}">${ml?ml+'%':'N/A'}</span></div>
${acct.profit_target_pct?`<div class="ab-itm"><span class="ab-l">Target</span><span class="ab-v" style="color:var(--amb)">${acct.profit_target_pct}%</span></div>`:''}
<div class="ab-itm"><span class="ab-l">DD Floor</span><span class="ab-v" style="color:var(--red)">${F((acct.starting_balance||0)*(1-(acct.max_total_loss_pct||8)/100))}</span></div>
<div style="margin-left:auto;display:flex;align-items:center;gap:6px;padding:0 8px">
  <div class="wsdot ${wsOn?'on':''}" id="wsDot"></div>
  <span style="font-size:.55rem;color:var(--ink3)">${wsOn?'LIVE':'OFFLINE'}</span>
  <span id="abClock" style="font-family:var(--fm);font-size:.55rem;color:var(--ink3)"></span>
</div>`;
}

// ══════════════════════════════════════════════════════════════════════
//  MARKET WATCH
// ══════════════════════════════════════════════════════════════════════
function renderMW(q=''){
  const groups={};
  Object.entries(inst).forEach(([s,i])=>{
    if(q&&!s.toLowerCase().includes(q.toLowerCase())&&!(i.name||'').toLowerCase().includes(q.toLowerCase()))return;
    const g=i.type||'forex';
    if(!groups[g])groups[g]=[];
    groups[g].push([s,i]);
  });
  const order=['forex','metals','indices','energies','crypto'];
  const labels={forex:'Forex',metals:'Metals',indices:'Indices',energies:'Energy',crypto:'Crypto'};
  let h='';
  order.forEach(g=>{
    if(!groups[g]?.length)return;
    h+=`<div class="mw-grp">${labels[g]||g}</div>`;
    groups[g].forEach(([s,i])=>{
      const p=px[s]||{}, dg=digs(s), chg=p.change_pct||0;
      h+=`<div class="mw-row ${s===sym?'on':''}" id="mr${s}" onclick="pickSym('${s}')">
<div><div class="mw-s">${s}</div><div class="mw-n">${i.name||''}</div></div>
<div style="text-align:right"><div class="mw-b" id="mb${s}">${Fp(p.bid||0,dg)}</div><div class="mw-a" id="ma${s}">${Fp(p.ask||0,dg)}</div></div>
<div style="text-align:right"><div class="mw-c ${chg>=0?'up':'dn'}" id="mc${s}">${chg>=0?'+':''}${Fp(chg,2)}%</div></div>
<div class="mw-qt"><button class="mw-qs" onclick="event.stopPropagation();qTrade('${s}','sell')">S</button><button class="mw-qb" onclick="event.stopPropagation();qTrade('${s}','buy')">B</button></div>
</div>`;
    });
  });
  const el=$('mwL'); if(el)el.innerHTML=h||'<div class="empt">No results</div>';
}

function tickMW(s,p){
  const prev=px[s]||{};
  px[s]={...px[s],...p};
  const dg=digs(s);
  const b=$('mb'+s),a=$('ma'+s),c=$('mc'+s),row=$('mr'+s);
  if(b)b.textContent=Fp(p.bid||px[s].bid||0,dg);
  if(a)a.textContent=Fp(p.ask||px[s].ask||0,dg);
  if(c){const ch=p.change_pct||px[s].change_pct||0;c.textContent=(ch>=0?'+':'')+Fp(ch,2)+'%';c.className='mw-c '+(ch>=0?'up':'dn');}
  if(row&&prev.bid){const dir=(p.bid||0)>(prev.bid||0);row.classList.remove('fu','fd');void row.offsetWidth;row.classList.add(dir?'fu':'fd');setTimeout(()=>row.classList.remove('fu','fd'),360);}
}

async function qTrade(s,d){
  if(s!==sym)pickSym(s);
  dir=d; setDir(d);
  const v=parseFloat($('volI')?.value)||0.01;
  const iF=acct?.challenge_type==='funded';
  const body={symbol:s,direction:d,volume:v,...(iF?{funded_account_id:acct.id}:{challenge_id:acct.id})};
  try{await api('/api/trading/order',{method:'POST',body:JSON.stringify(body)});toast(`${d.toUpperCase()} ${v} ${s}`,'ok');await loadPos();botRender();renderTB();}
  catch(e){toast(e.message,'err');}
}

function pickSym(s){
  sym=s; closeDrops();
  document.querySelectorAll('.mw-row').forEach(r=>r.classList.remove('on'));
  $('mr'+s)?.classList.add('on');
  $('tbSymN') && ($('tbSymN').textContent=s);
  $('rpSym') && ($('rpSym').textContent=s);
  $('rpDesc') && ($('rpDesc').textContent=inst[s]?.name||'');
  $('caBadge') && ($('caBadge').textContent=s);
  renderTB(); loadCandles(); reDraw();
}

// ══════════════════════════════════════════════════════════════════════
//  CHART + DRAWING TOOLS
// ══════════════════════════════════════════════════════════════════════
const TF={'1m':'1min','3m':'3min','5m':'5min','15m':'15min','30m':'30min','1h':'1h','4h':'4h','1d':'1day','1w':'1week'};

function initChart(){
  const el=$('lwc'); if(!el||chart)return;
  chart=LightweightCharts.createChart(el,{
    layout:{background:{type:LightweightCharts.ColorType.Solid,color:'#131722'},textColor:'#787b86'},
    grid:{vertLines:{color:showGrid?'#1e222d':'transparent'},horzLines:{color:showGrid?'#1e222d':'transparent'}},
    crosshair:{
      mode:LightweightCharts.CrosshairMode.Normal,
      vertLine:{color:'rgba(42,46,57,.9)',width:1,style:0,labelBackgroundColor:'#2a2e39'},
      horzLine:{color:'rgba(42,46,57,.9)',width:1,style:0,labelBackgroundColor:'#2a2e39'}
    },
    rightPriceScale:{borderColor:'#2a2e39',textColor:'#787b86',scaleMargins:{top:0.1,bottom:0.15}},
    timeScale:{borderColor:'#2a2e39',timeVisible:true,secondsVisible:false,barSpacing:6,rightOffset:5},
    width:el.offsetWidth,height:el.offsetHeight,
    handleScroll:{mouseWheel:true,pressedMouseMove:true},
    handleScale:{mouseWheel:true,pinch:true,axisPressedMouseMove:true},
  });
  cSeries=chart.addCandlestickSeries({
    upColor:'#26a69a',downColor:'#ef5350',
    borderUpColor:'#26a69a',borderDownColor:'#ef5350',
    wickUpColor:'#26a69a',wickDownColor:'#ef5350',
    priceLineVisible:true,priceLineColor:'#787b86',priceLineWidth:1,priceLineStyle:2,
  });
  vSeries=chart.addHistogramSeries({priceFormat:{type:'volume'},priceScaleId:'vol',scaleMargins:{top:.85,bottom:0}});
  chart.priceScale('vol').applyOptions({scaleMargins:{top:.85,bottom:0}});

  // OHLC on crosshair
  chart.subscribeCrosshairMove(p=>{
    if(!p?.seriesData)return;
    const d=p.seriesData.get(cSeries);
    if(!d)return;
    const e=$('caOHLC');
    if(e)e.innerHTML=`<span style="color:var(--ink3)">O:</span>${d.open} <span style="color:var(--grn)">H:</span>${d.high} <span style="color:var(--red)">L:</span>${d.low} <span style="color:var(--ink1)">C:</span><strong>${d.close}</strong>`;
  });

  // Redraw drawings on zoom/pan
  chart.timeScale().subscribeVisibleLogicalRangeChange(()=>reDraw());
  chart.timeScale().subscribeVisibleTimeRangeChange(()=>reDraw());

  // Init drawing canvas
  // Pre-size the drawing canvas to match chart container
  setTimeout(()=>{syncCanvas();initDC();},100);

  // Resize observer
  const ro=new ResizeObserver(()=>{
    if(chart) chart.resize(el.offsetWidth,el.offsetHeight);
    syncCanvas();
    setTimeout(reDraw,20);
  });
  ro.observe(el);
}

function toggleGrid(){
  showGrid=!showGrid;
  if(chart)chart.applyOptions({grid:{vertLines:{color:showGrid?'#1e222d':'transparent'},horzLines:{color:showGrid?'#1e222d':'transparent'}}});
  $('gridBtn')?.classList.toggle('on',showGrid);
}

async function loadCandles(){
  if(!chart)return;
  try{
    const data=await api(`/api/trading/candles?symbol=${sym}&timeframe=${TF[tf]||'5min'}&count=300`);
    if(!data?.length)return;
    candles=data.map(c=>({time:Math.floor(new Date(c.time||c.t).getTime()/1000),open:+c.open,high:+c.high,low:+c.low,close:+c.close,volume:+c.volume||0})).sort((a,b)=>a.time-b.time);
    cSeries.setData(candles);
    vSeries.setData(candles.map(c=>({time:c.time,value:c.volume||0,color:c.close>=c.open?'rgba(0,230,118,.18)':'rgba(255,71,87,.18)'})));
    chart.timeScale().fitContent();
    setTimeout(()=>{reDraw();addPosLines();},50);
  }catch(e){console.warn('candles:',e.message);}
}

function tickChart(s,p){
  if(s!==sym||!cSeries)return;
  const tsec={'1min':60,'3min':180,'5min':300,'15min':900,'30min':1800,'1h':3600,'4h':14400,'1day':86400};
  const sec=tsec[TF[tf]]||300;
  const now=Math.floor(Date.now()/1000), barT=now-(now%sec);
  const mid=+(p.bid*0.5+p.ask*0.5);
  const last=candles[candles.length-1];
  if(last?.time===barT){last.close=mid;last.high=Math.max(last.high,mid);last.low=Math.min(last.low,mid);cSeries.update(last);vSeries.update({time:barT,value:(last.volume||0)+1,color:last.close>=last.open?'rgba(0,230,118,.18)':'rgba(255,71,87,.18)'});}
  else if(barT>=(last?.time||0)){const nb={time:barT,open:mid,high:mid,low:mid,close:mid,volume:1};candles.push(nb);if(candles.length>500)candles.shift();cSeries.update(nb);}
}

function switchTF(t){
  tf=t;
  document.querySelectorAll('.tf').forEach(b=>b.classList.toggle('on',b.dataset.tf===t));
  loadCandles();
}

function addPosLines(){
  pos.filter(p=>p.symbol===sym).forEach(p=>{
    try{
      cSeries.createPriceLine({price:p.open_price,color:'rgba(0,212,200,.5)',lineWidth:1,lineStyle:LightweightCharts.LineStyle.Dashed,axisLabelVisible:true,title:`${p.direction.toUpperCase()} ${p.volume}`});
      if(p.stop_loss)cSeries.createPriceLine({price:p.stop_loss,color:'rgba(255,71,87,.6)',lineWidth:1,lineStyle:LightweightCharts.LineStyle.Dotted,axisLabelVisible:true,title:'SL'});
      if(p.take_profit)cSeries.createPriceLine({price:p.take_profit,color:'rgba(0,230,118,.6)',lineWidth:1,lineStyle:LightweightCharts.LineStyle.Dotted,axisLabelVisible:true,title:'TP'});
    }catch(_){}
  });
}

// ─── DRAWING CANVAS ───────────────────────────────────────────────────
// Drawings stored by price/time so they persist across zoom and pan
function initDC(){
  const cv=$('dc'); if(!cv)return;

  // Get coordinates relative to chart container (same origin as LightweightCharts)
  function coords(e){
    syncCanvas();  // ensure canvas is right size before reading coords
    const r=$('lwc').getBoundingClientRect();
    return {x:e.clientX-r.left, y:e.clientY-r.top};
  }
  function toChart(x,y){
    // coordinateToTime/Price can return null outside visible range — fall back to raw pixel
    const ts  = chart.timeScale().coordinateToTime(x);
    const price = chart.priceScale('right').coordinateToPrice(y);
    return {ts, price, x, y};
  }

  cv.addEventListener('mousedown',e=>{
    if(!drawTool)return;
    const {x,y}=coords(e);
    const {ts,price}=toChart(x,y);
    if(drawTool==='hline'){
      if(price==null)return;
      drawings.push({type:'hline',sym,price,color:'#00d4c8',w:1});
      setTool(null);reDraw();
    } else if(drawTool==='vline'){
      drawings.push({type:'vline',sym,ts,x,color:'#448aff',w:1});
      setTool(null);reDraw();
    } else {
      drawPt={type:drawTool,sym,x1:x,y1:y,ts1:ts,p1:price??0,x2:x,y2:y,ts2:ts,p2:price??0};
    }
  });

  cv.addEventListener('mousemove',e=>{
    if(!drawPt)return;
    const {x,y}=coords(e);
    const {ts,price}=toChart(x,y);
    drawPt.x2=x; drawPt.y2=y;
    if(ts!=null)   drawPt.ts2=ts;
    if(price!=null) drawPt.p2=price;
    reDraw();
  });

  cv.addEventListener('mouseup',e=>{
    if(!drawPt)return;
    const {x,y}=coords(e);
    const {ts,price}=toChart(x,y);
    drawPt.x2=x; drawPt.y2=y;
    if(ts!=null)   drawPt.ts2=ts;
    if(price!=null) drawPt.p2=price;
    if(drawTool==='line'||drawTool==='ray'){
      drawings.push({...drawPt,color:'#a855f7',w:1.5});
    } else if(drawTool==='rect'){
      drawings.push({...drawPt,color:'rgba(168,85,247,.12)',borderColor:'#a855f7',w:1});
    } else if(drawTool==='fib'){
      drawings.push({...drawPt,color:'#ffb300',w:1});
    }
    drawPt=null; setTool(null); reDraw();
  });

  cv.addEventListener('mouseleave',()=>{
    if(drawPt){ drawPt=null; reDraw(); }
  });
}

function syncCanvas(){
  const cv=$('dc'),el=$('lwc');
  if(!cv||!el)return;
  const W=el.offsetWidth,H=el.offsetHeight;
  if(cv.width!==W||cv.height!==H){
    cv.width=W; cv.height=H;
  }
}
function reDraw(){
  const cv=$('dc'); if(!cv||!chart)return;
  const W=cv.width, H=cv.height;
  if(!W||!H)return;
  const ctx=cv.getContext('2d');
  ctx.clearRect(0,0,W,H);
  const all=[...drawings,...(drawPt?[drawPt]:[])];
  all.filter(d=>d.sym===sym).forEach(d=>{
    ctx.save();
    if(d.type==='hline'){
      const y=chart.priceScale('right').priceToCoordinate(d.price);
      if(y==null)return ctx.restore();
      ctx.strokeStyle=d.color;ctx.lineWidth=d.w||1;ctx.setLineDash([5,3]);ctx.globalAlpha=.8;
      ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();
      ctx.setLineDash([]);ctx.fillStyle=d.color;ctx.font='600 9px IBM Plex Mono';ctx.globalAlpha=.9;
      ctx.fillText(Fp(d.price,digs(sym)),W-68,y-2);
    } else if(d.type==='vline'){
      // vline stored with ts OR raw x fallback
      let x=null;
      if(d.ts) x=chart.timeScale().timeToCoordinate(d.ts);
      if(x==null) x=d.x; // use raw pixel if ts out of view
      if(x==null)return ctx.restore();
      ctx.strokeStyle=d.color;ctx.lineWidth=d.w||1;ctx.setLineDash([4,3]);ctx.globalAlpha=.7;
      ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();ctx.setLineDash([]);
    } else if(d.type==='line'||d.type==='ray'){
      // Convert stored price/time to current pixel coords
      let x1,y1,x2,y2;
      if(d.ts1&&d.p1){
        x1=chart.timeScale().timeToCoordinate(d.ts1)??d.x1;
        y1=chart.priceScale('right').priceToCoordinate(d.p1)??d.y1;
        x2=chart.timeScale().timeToCoordinate(d.ts2)??d.x2;
        y2=chart.priceScale('right').priceToCoordinate(d.p2)??d.y2;
      } else {x1=d.x1;y1=d.y1;x2=d.x2;y2=d.y2;}
      ctx.strokeStyle=d.color||'#a855f7';ctx.lineWidth=d.w||1.5;ctx.globalAlpha=.85;
      ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
      if(d.type==='ray'){
        const dx=x2-x1,dy=y2-y1,len=Math.sqrt(dx*dx+dy*dy)||1,sc=W*3/len;
        ctx.setLineDash([4,3]);ctx.globalAlpha=.4;
        ctx.beginPath();ctx.moveTo(x2,y2);ctx.lineTo(x2+dx*sc,y2+dy*sc);ctx.stroke();
        ctx.setLineDash([]);
      }
    } else if(d.type==='rect'){
      let x1,y1,x2,y2;
      if(d.ts1&&d.p1){
        x1=chart.timeScale().timeToCoordinate(d.ts1)??d.x1;
        y1=chart.priceScale('right').priceToCoordinate(d.p1)??d.y1;
        x2=chart.timeScale().timeToCoordinate(d.ts2)??d.x2;
        y2=chart.priceScale('right').priceToCoordinate(d.p2)??d.y2;
      } else {x1=d.x1;y1=d.y1;x2=d.x2;y2=d.y2;}
      const rx=Math.min(x1,x2),ry=Math.min(y1,y2),rw=Math.abs(x2-x1),rh=Math.abs(y2-y1);
      ctx.fillStyle=d.color||'rgba(168,85,247,.1)';ctx.globalAlpha=.8;ctx.fillRect(rx,ry,rw,rh);
      ctx.strokeStyle=d.borderColor||'#a855f7';ctx.lineWidth=1;ctx.globalAlpha=.7;ctx.strokeRect(rx,ry,rw,rh);
    } else if(d.type==='fib'){
      const fibs=[0,.236,.382,.5,.618,.786,1];
      const cols=['#ff4757','#ffb300','#448aff','#a855f7','#00e676','#ffb300','#ff4757'];
      let y1,y2;
      if(d.p1&&d.p2){
        y1=chart.priceScale('right').priceToCoordinate(d.p1)??d.y1;
        y2=chart.priceScale('right').priceToCoordinate(d.p2)??d.y2;
      } else {y1=d.y1;y2=d.y2;}
      fibs.forEach((f,i)=>{
        const yf=y1+(y2-y1)*f;
        ctx.strokeStyle=cols[i];ctx.lineWidth=.8;ctx.setLineDash([3,3]);ctx.globalAlpha=.7;
        ctx.beginPath();ctx.moveTo(0,yf);ctx.lineTo(W,yf);ctx.stroke();
        ctx.setLineDash([]);ctx.fillStyle=cols[i];ctx.font='500 8px IBM Plex Mono';ctx.globalAlpha=.85;
        const price=d.p1&&d.p2?+(d.p1+(d.p2-d.p1)*f).toFixed(digs(sym)):'';
        ctx.fillText(`${(f*100).toFixed(1)}%${price?' '+price:''}`,3,yf-2);
      });
    }
    ctx.restore();
  });
}

function calcUpdate(){
  const v=parseFloat($('volI')?.value)||0.01;
  const mg=margin(sym,v), pv=pipVal(sym,v);
  const mEl=$('cMargin');if(mEl)mEl.textContent=F(mg);
  const pEl=$('cPipVal');if(pEl)pEl.textContent='$'+pv;
  // RR
  const sl=parseFloat($('slI')?.value)||0;
  const tp=parseFloat($('tpI')?.value)||0;
  const rr=sl>0&&tp>0?+(tp/sl).toFixed(2):0;
  const rrEl=$('rrV');if(rrEl){rrEl.textContent=rr?'1:'+rr:'—';rrEl.style.color=rr>=2?'var(--grn)':rr>=1?'var(--amb)':'var(--ink3)';}
}

function setSLMode(m){slMode=m;document.querySelectorAll('#slMs .slm').forEach(b=>b.classList.toggle('on',b.dataset.m===m));$('slLbl')&&($('slLbl').textContent=m==='pips'?'Pips':m==='price'?'Price':'% Bal');}
function setTPMode(m){tpMode=m;document.querySelectorAll('#tpMs .slm').forEach(b=>b.classList.toggle('on',b.dataset.m===m));$('tpLbl')&&($('tpLbl').textContent=m==='pips'?'Pips':'Price');}

function togTP(v){tpOn=v;const b=$('tpBody');if(b)b.style.opacity=v?'1':'.35';const i=$('tpI');if(i)i.disabled=!v;calcUpdate();}
function togTR(v){trOn=v;const r=$('trRow');if(r)r.style.display=v?'':'none';}

function slToPx(val,mode){
  const p=px[sym]||{};const ppp=pip(sym);const ep=dir==='buy'?(p.ask||0):(p.bid||0);
  if(mode==='price')return +parseFloat(val).toFixed(digs(sym));
  if(mode==='pips')return dir==='buy'?+(ep-val*ppp).toFixed(digs(sym)):+(ep+val*ppp).toFixed(digs(sym));
  return null;
}
function tpToPx(val,mode){
  const p=px[sym]||{};const ppp=pip(sym);const ep=dir==='buy'?(p.ask||0):(p.bid||0);
  if(mode==='price')return +parseFloat(val).toFixed(digs(sym));
  if(mode==='pips')return dir==='buy'?+(ep+val*ppp).toFixed(digs(sym)):+(ep-val*ppp).toFixed(digs(sym));
  return null;
}

function mktOpen(){const d=new Date(),day=d.getUTCDay(),h=d.getUTCHours();return!(day===6||(day===0&&h<22)||(day===5&&h>=22));}

function updatePlaceBtn(){
  const btn=$('placeBtn');if(!btn)return;
  const p=px[sym]||{},dg=digs(sym);
  const ep=dir==='buy'?(p.ask||0):(p.bid||0);
  const isP=ot!=='market';
  const open=mktOpen();
  btn.textContent=isP?`Place ${ot.toUpperCase()} Order`:`${dir==='buy'?'BUY':'SELL'} ${sym} @ ${Fp(ep,dg)}`;
  btn.className=`place ${dir==='buy'?'place-b':'place-s'}`;
  btn.disabled=(!open&&!isP)||!acct;
  const mw=$('mktW');if(mw)mw.style.display=(!open&&!isP)?'':'none';
}

async function placeOrder(){
  if(!acct)return toast('Select an account','err');
  const v=parseFloat($('volI')?.value)||0;
  if(!v||v<0.01)return toast('Min 0.01 lots','err');
  const p=px[sym]||{};
  if(!p.bid||!p.ask)return toast('No price data','err');
  const sl=slOn&&parseFloat($('slI')?.value)?slToPx(parseFloat($('slI').value),slMode):null;
  const tp=tpOn&&parseFloat($('tpI')?.value)?tpToPx(parseFloat($('tpI').value),tpMode):null;
  const tr=trOn&&parseFloat($('trI')?.value)?parseFloat($('trI').value):0;
  const cmt=$('cmtI')?.value||null;
  const iF=acct.challenge_type==='funded';
  const base={symbol:sym,direction:dir,volume:v,stop_loss:sl,take_profit:tp,trailing_stop_pips:tr,comment:cmt,...(iF?{funded_account_id:acct.id}:{challenge_id:acct.id})};
  const btn=$('placeBtn');btn.disabled=true;btn.textContent='Sending…';
  try{
    if(ot==='market'){
      await api('/api/trading/order',{method:'POST',body:JSON.stringify(base)});
      toast(`${dir.toUpperCase()} ${v} ${sym} placed`,'ok');
    } else {
      const ep=parseFloat($('entPxI')?.value)||0;
      if(!ep)return toast('Enter entry price','err');
      const exp=$('expI')?.value||null;
      await api('/api/trading/pending-order',{method:'POST',body:JSON.stringify({...base,order_type:ot,entry_price:ep,expiry:exp})});
      toast(`${ot.toUpperCase()} ${dir.toUpperCase()} ${v} ${sym} @ ${ep}`,'inf');
    }
    if($('slI'))$('slI').value=''; if($('tpI'))$('tpI').value='';
    await loadPos();await loadPend();botRender();renderTB();addPosLines();
  }catch(e){toast(e.message,'err');}
  finally{updatePlaceBtn();}
}

// ── Live P&L ──────────────────────────────────────────────────────────
function livePnL(){
  pos.forEach(p=>{
    const el=$('pnl'+p.id);if(!el)return;
    const cp=px[p.symbol];if(!cp)return;
    const cur=p.direction==='buy'?cp.bid:cp.ask;
    const diff=p.direction==='buy'?cur-p.open_price:p.open_price-cur;
    const pnl=+(diff/pip(p.symbol)*pipVal(p.symbol,p.volume)*pip(p.symbol)).toFixed(2);
    p.profit=pnl;el.textContent=(pnl>=0?'+':'')+F(pnl);el.style.color=pnl>=0?'var(--grn)':'var(--red)';
  });
  updateAB();
}

let wsRC=null;
function connectWS(){
  if(ws)try{ws.close();}catch(_){}
  ws=new WebSocket(WSU);
  ws.onopen=()=>{wsOn=true;clearTimeout(wsRC);const d=$('wsDot');if(d)d.className='wsdot on';};
  ws.onmessage=e=>{
    try{
      const m=JSON.parse(e.data);
      if(m.type==='prices'&&m.data){
        Object.entries(m.data).forEach(([s,p])=>{tickMW(s,p);tickChart(s,p);if(s===sym)renderTB();});
        livePnL();chkAlerts();
      }
    }catch(_){}
  };
  ws.onclose=()=>{wsOn=false;const d=$('wsDot');if(d)d.className='wsdot';wsRC=setTimeout(connectWS,3500);};
  ws.onerror=()=>ws.close();
}

function showAcctDrop(e){
  e.stopPropagation();
  const dd=$('adrop'),r=e.currentTarget.getBoundingClientRect();
  dd.style.top=(r.bottom+4)+'px';dd.style.right=(window.innerWidth-r.right)+'px';dd.style.left='auto';
  let h='';
  if(!accounts.length){h='<div style="padding:12px;font-size:.7rem;color:var(--ink3);text-align:center">No active accounts<br><a href="/" style="color:var(--teal)">Buy challenge →</a></div>';}
  else accounts.forEach(a=>{
    const fp=pos.filter(p=>(p.challenge_id||p.funded_account_id)===a.id).reduce((s,p)=>s+(p.profit||0),0);
    const eq=(a.current_balance||0)+fp;
    h+=`<div class="da-row ${a.id===acct?.id?'on':''}" onclick="switchAcct('${a.id}')">
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:2px">
<span style="font-size:.72rem;font-weight:700">${F(a.account_size)} ${a.challenge_type==='funded'?'Funded':a.challenge_type==='two_step'?'2-Step':a.challenge_type==='rapid'?'Rapid':'1-Step'}</span>
${a.id===acct?.id?`<span style="font-size:.55rem;color:var(--teal);font-weight:700">● ACTIVE</span>`:''}
</div>
<div style="font-size:.6rem;color:var(--ink3);font-family:var(--fm)">${a.id.slice(0,8)} · ${a.status}</div>
<div style="display:flex;gap:8px;margin-top:3px;font-size:.58rem;font-family:var(--fm)">
<span style="color:var(--ink2)">Bal <span style="color:var(--ink1)">${F(a.current_balance)}</span></span>

  dd.innerHTML=h;dd.style.display='block';
}

async function switchAcct(id){
  closeDrops();
  const a=accounts.find(x=>x.id===id);if(!a)return;
  acct=a;localStorage.setItem('pluto_last_account',id);
  $('tbAcctName') && ($('tbAcctName').textContent=F(a.account_size)+' '+(a.challenge_type==='funded'?'Funded':a.challenge_type==='rapid'?'Rapid':a.challenge_type==='two_step'?'2-Step':'1-Step'));
  $('tbAcctBal') && ($('tbAcctBal').textContent=F(a.current_balance));
  renderTB();await loadPos();await loadPend();botRender();addPosLines();toast(`Switched to ${F(a.account_size)}`,'inf');
}

function showSymDrop(e){
  e.stopPropagation();
  const dd=$('sdrop'),r=e.currentTarget.getBoundingClientRect();
  dd.style.top=(r.bottom+4)+'px';dd.style.left=r.left+'px';
  renderSymDrop('');dd.style.display='block';
  setTimeout(()=>dd.querySelector('.dss-i')?.focus(),30);
}
function renderSymDrop(q){
  const order=['forex','metals','indices','energies','crypto'];
  const labels={forex:'Forex',metals:'Metals',indices:'Indices',energies:'Energy',crypto:'Crypto'};
  const groups={};
  Object.entries(inst).filter(([s,i])=>!q||s.toLowerCase().includes(q)||i.name?.toLowerCase().includes(q)).forEach(([s,i])=>{const g=i.type||'forex';if(!groups[g])groups[g]=[];groups[g].push([s,i]);});
  let h=`<div class="dss"><span style="color:var(--ink3);font-size:.72rem">⌕</span><input class="dss-i" placeholder="Search symbol…" oninput="renderSymDrop(this.value.toLowerCase())" value="${q}"></div>`;
  order.forEach(g=>{
    if(!groups[g]?.length)return;
    h+=`<div class="ds-grp">${labels[g]||g}</div>`;
    groups[g].forEach(([s,i])=>{
      const p=px[s]||{},dg=digs(s);
      h+=`<div class="ds-row ${s===sym?'on':''}" onclick="pickSym('${s}');$('sdrop').style.display='none'">
<div><div style="font-size:.72rem;font-weight:700;font-family:var(--fm)">${s}</div><div style="font-size:.55rem;color:var(--ink3)">${i.name||''}</div></div>
<div style="text-align:right"><div style="font-size:.66rem;font-family:var(--fm)">${Fp(p.bid||0,dg)}</div><div style="font-size:.56rem;color:var(--ink3)">${Fp(p.ask||0,dg)}</div></div>
<div style="text-align:right"><div style="font-size:.6rem;font-family:var(--fm);color:${(p.change_pct||0)>=0?'var(--grn)':'var(--red)'}">${(p.change_pct||0)>=0?'+':''}${Fp(p.change_pct||0,2)}%</div><div style="font-size:.54rem;color:var(--ink3)">${sprPips(s)} pts</div></div>
</div>`;
    });
  });
  $('sdrop').innerHTML=h;
}

      <div class="sltp">
        <div class="sltp-hd">
          <label style="display:flex;align-items:center;gap:4px;cursor:pointer">
            <input type="checkbox" id="tpChk" ${tpOn?'checked':''} onchange="togTP(this.checked)" style="accent-color:var(--grn)">
            <span class="sltp-ttl tp-ttl">Take Profit</span>
          </label>
          <div class="sltp-modes" id="tpMs">
            ${['pips','price'].map(m=>`<span class="slm ${tpMode===m?'on':''}" data-m="${m}" onclick="setTPMode('${m}')">${m}</span>`).join('')}
          </div>
        </div>
        <div class="sltp-body" id="tpBody" style="opacity:${tpOn?1:.35}">
          <div class="sfld"><span class="sfl" id="tpLbl">${tpMode==='pips'?'Pips':'Price'}</span><input type="number" id="tpI" class="si" placeholder="0" step="1" oninput="calcUpdate()" ${!tpOn?'disabled':''}></div>
          <div class="sfld"><span class="sfl">R:R</span><span class="rr-val" id="rrV">—</span></div>
        </div>
      </div>

      <!-- Trailing -->
      <div class="tgl-r">
        <span class="tgl-l">Trailing Stop</span>
        <label class="tgl"><input type="checkbox" id="trChk" onchange="togTR(this.checked)"><span class="tgl-s"></span></label>
      </div>
      <div id="trRow" style="display:none" class="f"><span class="fl">Distance (pips)</span><input type="number" id="trI" class="fi" value="10" step="1" min="1"></div>

      <!-- Expiry -->
      <div id="expRow" style="display:none" class="f"><span class="fl">Expiry</span><input type="datetime-local" id="expI" class="fi"></div>

      <!-- Comment -->
      <div class="f"><span class="fl">Comment</span><input type="text" id="cmtI" class="fi" placeholder="Note…" maxlength="50"></div>

      <!-- Calc strip -->
      <div class="calc-s">
        <span class="cs-l">Margin</span><span class="cs-v" id="cMargin">—</span>
        <span class="cs-l" style="margin-left:6px">Pip Value</span><span class="cs-v" id="cPipVal">—</span>
      </div>

      <div class="mkt-warn" id="mktW" style="display:none">🔴 Market closed · Pending orders available</div>
    </div>

    <!-- Place btn (outside scroll) -->
    <div style="padding:6px 8px;flex-shrink:0">
      <button id="placeBtn" class="place place-b" onclick="placeOrder()" disabled>Loading…</button>
    </div>
  </div>
</div>

<!-- BOTTOM PANEL -->
<div id="botArea">
  <div class="bot-tabs">
    <div class="bt on" data-bt="pos" onclick="setBotTab('pos')">Positions <span class="bc" id="posC">0</span></div>
    <div class="bt" data-bt="ord" onclick="setBotTab('ord')">Orders <span class="bc neu" id="ordC">0</span></div>
    <div class="bt" data-bt="hist" onclick="setBotTab('hist')">History <span class="bc neu" id="histC">0</span></div>
    <div class="bt" data-bt="alerts" onclick="setBotTab('alerts')">Alerts</div>
    <div class="bt" data-bt="journal" onclick="setBotTab('journal')">Journal</div>
  </div>
  <div id="botSum" class="bot-summary"></div>
  <div id="botScroll" class="bot-scroll"><div class="empt">Loading…</div></div>
</div>

<!-- ACCOUNT BAR -->
<div id="ab"></div>`;

  setTimeout(()=>{
    initChart();
    renderMW();
    $('rpDesc').textContent=inst[sym]?.name||'';
    calcUpdate();
    pickSym(sym);
    updateAB();
    loadHist().then(()=>botRender());
    // Refresh loop
    async function refresh(){await loadPos();await loadPend();botRender();addPosLines();refreshT=setTimeout(refresh,4500);}
    refresh();
    setInterval(updateClock,1000);
    setInterval(()=>{const open=mktOpen();const d=$('mktDot');if(d)d.className='wsdot '+(open?'on':'');updatePlaceBtn();},30000);
    updateClock();
  },80);
}

function updateClock(){
  const el=$('abClock')||$('tbClock');if(!el)return;
  el.textContent=new Date().toUTCString().slice(17,25)+' UTC';
}

// ══════════════════════════════════════════════════════════════════════
//  LOGIN
// ══════════════════════════════════════════════════════════════════════
function showLogin(){
  $('app').innerHTML=`<div class="lp"><div class="lc">
<div class="lhead">
  <div class="lmark"><svg width="20" height="20" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="7" stroke="#000" stroke-width="2"/><path d="M7 10h6M10 7v6" stroke="#000" stroke-width="2" stroke-linecap="round"/></svg></div>
  <div><div style="font-size:.88rem;font-weight:800;letter-spacing:.01em">PlutoTrader</div><div style="font-size:.62rem;color:var(--ink3)">Professional Terminal</div></div>
</div>
<div class="le" id="lErr"></div>
<div style="margin-bottom:8px"><label style="display:block;font-size:.52rem;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:3px">Email</label><input type="email" id="lEm" class="fi" placeholder="trader@email.com" autofocus></div>
<div style="margin-bottom:16px"><label style="display:block;font-size:.52rem;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:3px">Password</label><input type="password" id="lPw" class="fi" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"></div>
<button class="lb" onclick="doLogin()">Launch Terminal</button>
<div style="text-align:center;margin-top:10px;font-size:.65rem;color:var(--ink3)">No account? <a href="/" style="color:var(--teal)">Get funded →</a></div>
</div></div>`;
}

async function doLogin(){
  const em=$('lEm')?.value.trim(), pw=$('lPw')?.value;
  const err=$('lErr');
  if(!em||!pw){err.style.display='block';err.textContent='Enter email and password';return;}
  const btn=document.querySelector('.lb');btn.textContent='Connecting…';btn.disabled=true;
  try{
    const r=await fetch(BE+'/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:em,password:pw})});
    const d=await r.json();
    if(!r.ok)throw new Error(d.error||'Login failed');
    localStorage.setItem('pcf_token',d.token);
    localStorage.setItem('pcf_user',JSON.stringify(d.user));
    token=d.token;boot();
  }catch(e){err.style.display='block';err.textContent=e.message;btn.textContent='Launch Terminal';btn.disabled=false;}
}

// ══════════════════════════════════════════════════════════════════════
//  BOOT
// ══════════════════════════════════════════════════════════════════════
async function boot(){
  if(!token){showLogin();return;}
  try{
    const[instList,acctList]=await Promise.all([api('/api/trading/instruments'),api('/api/trading/accounts')]);
    instList.forEach(i=>{inst[i.symbol]=i;px[i.symbol]={bid:i.last_price||0,ask:(i.last_price||0)+(i.spread||0),change_pct:0,high:i.last_price||0,low:i.last_price||0};});
    accounts=acctList.filter(a=>a.status==='active'||a.challenge_type==='funded');
    const last=localStorage.getItem('pluto_last_account');
    acct=accounts.find(a=>a.id===last)||accounts[0]||null;
    renderApp();
    connectWS();
  }catch(e){
    if(e.message?.includes('401')){localStorage.removeItem('pcf_token');showLogin();}
    else{$('app').innerHTML=`<div class="lp"><div class="lc"><div style="color:var(--red);margin-bottom:12px;font-size:.75rem">⚠ ${e.message}</div><button class="lb" onclick="boot()">Retry</button></div></div>`;}
  }
}

boot();
</script>
</body>
</html>
