<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#131722;--bg2:#1e222d;--p1:#161a25;--p2:#1e222d;--p3:#262b3d;--p4:#2a2e39;
--wire:#2a2e39;--wire2:#363a45;--wire3:#434651;
--ink1:#d1d4dc;--ink2:#787b86;--ink3:#4c525e;--ink4:#363a45;
--teal:#2962ff;--teal2:#1e53e5;--tealb:rgba(41,98,255,.1);--tealg:rgba(41,98,255,.3);
--grn:#26a69a;--grn2:#1e8e83;--grnb:rgba(38,166,154,.07);--grngl:rgba(38,166,154,.3);
--red:#ef5350;--red2:#d32f2f;--redb:rgba(239,83,80,.07);--redgl:rgba(239,83,80,.3);
--amb:#ff9800;--ambb:rgba(255,152,0,.07);--blu:#2962ff;--blub:rgba(41,98,255,.07);
--ff:-apple-system,BlinkMacSystemFont,'Trebuchet MS',Roboto,Ubuntu,sans-serif;
--fm:Menlo,Monaco,Consolas,'Liberation Mono',monospace;
--r:2px;--r2:3px;--r3:4px;
--tb:38px;--mw:220px;--rp:264px;--bot:180px;--ab:24px;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--ink1);font-family:var(--ff);font-size:11px;-webkit-font-smoothing:antialiased;user-select:none;letter-spacing:0}
input,select,button,textarea{font-family:inherit;font-size:inherit}
::-webkit-scrollbar{width:3px;height:3px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#363a45;border-radius:1px}

#tb{position:fixed;top:0;left:0;right:0;height:var(--tb);background:var(--bg2);border-bottom:1px solid var(--wire);z-index:200;display:flex;align-items:stretch}
#body{position:fixed;top:var(--tb);left:0;right:0;bottom:calc(var(--bot) + var(--ab));display:grid;grid-template-columns:var(--mw) 1fr var(--rp)}
#botArea{position:fixed;bottom:var(--ab);left:0;right:0;height:var(--bot);background:var(--p1);border-top:1px solid var(--wire);display:flex;flex-direction:column}
#ab{position:fixed;bottom:0;left:0;right:0;height:var(--ab);background:var(--bg);border-top:1px solid var(--wire);display:flex;align-items:center;padding:0 6px;gap:0;overflow:hidden}

.tb-logo{display:flex;align-items:center;gap:6px;padding:0 10px;border-right:1px solid var(--wire);flex-shrink:0;cursor:pointer}
.tb-mark{width:20px;height:20px;background:linear-gradient(135deg,#6d28d9,#4c1d95);border-radius:3px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.tb-mark svg{display:block}
.tb-wordmark{font-size:11px;font-weight:700;color:var(--ink1)}
.tb-wordmark em{font-style:normal;color:#a78bfa}
.tb-sym-btn{display:flex;align-items:center;gap:6px;padding:0 10px;border-right:1px solid var(--wire);cursor:pointer;min-width:140px;transition:.08s}
.tb-sym-btn:hover{background:rgba(255,255,255,.02)}
.tb-sym-name{font-size:12px;font-weight:700;font-family:var(--fm);color:var(--ink1)}
.tb-sym-spread{font-size:9px;color:var(--ink3);font-family:var(--fm)}
.tb-prices{display:flex;flex-direction:column;align-items:flex-end;gap:0}
.tb-bid{font-size:10px;font-weight:600;font-family:var(--fm);color:var(--red);line-height:1.1}
.tb-ask{font-size:10px;font-weight:600;font-family:var(--fm);color:var(--grn);line-height:1.1}
.tb-chg{font-size:9px;font-family:var(--fm);font-weight:600}
.tf-strip{display:flex;align-items:center;gap:0;padding:0 3px;border-right:1px solid var(--wire);height:100%}
.tf{padding:2px 5px;background:none;border:none;color:var(--ink3);font-size:10px;font-weight:500;cursor:pointer;border-radius:2px;font-family:var(--fm);transition:.06s}
.tf:hover{color:var(--ink1);background:rgba(255,255,255,.04)}
.tf.on{color:var(--teal);background:var(--tealb)}
.draw-strip{display:flex;align-items:center;gap:0;padding:0 3px;border-right:1px solid var(--wire);height:100%}
.db{width:24px;height:24px;display:flex;align-items:center;justify-content:center;background:none;border:none;border-radius:2px;color:var(--ink3);cursor:pointer;transition:.06s}
.db:hover{color:var(--ink1);background:rgba(255,255,255,.04)}
.db.on{color:var(--teal);background:var(--tealb)}
.db.danger{color:var(--red)!important}
.tb-r{margin-left:auto;display:flex;align-items:center;gap:4px;padding:0 6px}
.tb-rbtn{padding:1px 6px;background:none;border:1px solid var(--wire);border-radius:2px;color:var(--ink2);font-size:10px;font-weight:500;cursor:pointer;transition:.06s;text-decoration:none}
.tb-rbtn:hover{color:var(--ink1);border-color:var(--wire3)}
.tb-acct-pill{display:flex;align-items:center;gap:4px;padding:2px 6px;background:var(--p1);border:1px solid var(--wire);border-radius:2px;cursor:pointer;transition:.06s}
.tb-acct-pill:hover{border-color:var(--teal)}
.wsdot{width:4px;height:4px;border-radius:50%;background:var(--red);flex-shrink:0}
.wsdot.on{background:var(--grn);box-shadow:0 0 3px rgba(38,166,154,.5);animation:blink 2s infinite}
@keyframes blink{50%{opacity:.3}}
#tbClock{font-family:var(--fm);font-size:9px;color:var(--ink3);padding:0 4px;border-left:1px solid var(--wire)}

#mw{background:var(--p1);border-right:1px solid var(--wire);display:flex;flex-direction:column;overflow:hidden}
.mw-top{padding:4px 6px;border-bottom:1px solid var(--wire);flex-shrink:0;display:flex;align-items:center;justify-content:space-between}
.mw-ttl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--ink3)}
.mw-search{padding:2px 4px;flex-shrink:0;border-bottom:1px solid var(--wire)}
.mw-si{width:100%;background:var(--bg);border:1px solid var(--wire);border-radius:2px;padding:3px 5px;color:var(--ink1);font-size:10px;outline:none}
.mw-si:focus{border-color:var(--teal)}
.mw-hdr{display:grid;grid-template-columns:1fr 50px 38px;padding:1px 6px;background:var(--bg);border-bottom:1px solid var(--wire);flex-shrink:0}
.mw-hdr span{font-size:8px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;color:var(--ink4)}
.mw-scroll{flex:1;overflow-y:auto}
.mw-grp{padding:3px 6px 1px;font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--ink4);background:var(--bg)}
.mw-row{display:grid;grid-template-columns:1fr 50px 38px;align-items:center;padding:2px 6px;cursor:pointer;border-left:2px solid transparent;transition:.04s;position:relative}
.mw-row:hover{background:rgba(255,255,255,.02)}
.mw-row.on{background:rgba(41,98,255,.05);border-left-color:var(--teal)}
.mw-row:hover .mw-qt{display:flex}
.mw-s{font-size:10px;font-weight:600;font-family:var(--fm);color:var(--ink1)}
.mw-n{font-size:8px;color:var(--ink3)}
.mw-b{font-family:var(--fm);font-size:9px;font-weight:500;color:var(--red);text-align:right}
.mw-a{font-family:var(--fm);font-size:9px;font-weight:500;color:var(--grn);text-align:right}
.mw-c{font-size:9px;font-weight:500;font-family:var(--fm);text-align:right}
.up{color:var(--grn)}.dn{color:var(--red)}
.fu{animation:fu .2s}.fd{animation:fd .2s}
@keyframes fu{from{background:rgba(38,166,154,.1)}to{background:transparent}}
@keyframes fd{from{background:rgba(239,83,80,.1)}to{background:transparent}}
.mw-qt{display:none;position:absolute;right:2px;top:50%;transform:translateY(-50%);gap:1px;z-index:2}
.mw-qt button{padding:0 4px;border:none;border-radius:1px;font-size:8px;font-weight:700;cursor:pointer;line-height:16px}
.mw-qs{background:var(--red);color:#fff}.mw-qb{background:var(--grn);color:#fff}

#ca{position:relative;overflow:hidden;background:var(--bg);display:flex;flex-direction:column}
#lwc{position:absolute;inset:0}
#dc{position:absolute;inset:0;pointer-events:none;z-index:5}
.ca-ohlc{position:absolute;top:2px;left:4px;z-index:6;font-family:var(--fm);font-size:9px;color:var(--ink3);pointer-events:none;line-height:1.5;background:rgba(19,23,34,.8);padding:1px 4px;border-radius:2px}
.ca-crosshair-price{position:absolute;right:0;background:var(--p3);border:1px solid var(--wire);padding:0 3px;font-family:var(--fm);font-size:9px;color:var(--ink1);pointer-events:none;z-index:7;transform:translateY(-50%)}
.ca-sym-badge{position:absolute;top:2px;right:6px;z-index:6;background:rgba(19,23,34,.8);border-radius:2px;padding:1px 5px;font-family:var(--fm);font-size:9px;font-weight:600;color:var(--ink2);pointer-events:none}

#rp{background:var(--p1);border-left:1px solid var(--wire);display:flex;flex-direction:column;overflow:hidden}
.rp-sym-hd{padding:5px 8px;border-bottom:1px solid var(--wire);flex-shrink:0}
.rp-sym-row{display:flex;align-items:center;justify-content:space-between}
.rp-sym{font-size:12px;font-weight:700;font-family:var(--fm);color:var(--ink1)}
.rp-desc{font-size:9px;color:var(--ink3)}
.bs-grid{display:grid;grid-template-columns:1fr 1fr;gap:2px;padding:4px 6px;flex-shrink:0}
.bs-btn{padding:6px 2px;border:1px solid;border-radius:2px;cursor:pointer;text-align:center;transition:.06s;display:flex;flex-direction:column;align-items:center;gap:0;font-family:var(--fm)}
.bs-sell{background:var(--redb);border-color:var(--redgl);color:var(--red)}
.bs-sell:hover,.bs-sell.sel{background:var(--red);color:#fff;border-color:var(--red)}
.bs-buy{background:var(--grnb);border-color:var(--grngl);color:var(--grn)}
.bs-buy:hover,.bs-buy.sel{background:var(--grn);color:#fff;border-color:var(--grn)}
.bs-lbl{font-size:9px;font-weight:700;letter-spacing:.03em}.bs-px{font-size:12px;font-weight:700}.bs-sub{font-size:8px;opacity:.5;font-family:var(--ff)}
.spr-line{text-align:center;font-size:9px;color:var(--ink3);font-family:var(--fm);padding:0 6px 1px;flex-shrink:0}
.ot-bar{display:flex;gap:1px;padding:2px 6px;flex-shrink:0}
.ot-tab{flex:1;padding:3px 1px;background:var(--bg);border:1px solid var(--wire);border-radius:2px;cursor:pointer;font-size:9px;font-weight:600;text-align:center;color:var(--ink3);transition:.06s;text-transform:uppercase}
.ot-tab.on{color:var(--teal);border-color:var(--teal);background:var(--tealb)}
.rp-body{flex:1;overflow-y:auto;padding:3px 6px;display:flex;flex-direction:column;gap:3px}
.f{display:flex;flex-direction:column;gap:0}
.fl{font-size:9px;font-weight:500;text-transform:uppercase;letter-spacing:.04em;color:var(--ink3)}
.fi{background:var(--bg);border:1px solid var(--wire);border-radius:2px;padding:3px 4px;color:var(--ink1);font-family:var(--fm);font-size:11px;outline:none;width:100%;transition:.06s}
.fi:focus{border-color:var(--teal)}
.fs{background:var(--bg);border:1px solid var(--wire);border-radius:2px;padding:2px 4px;color:var(--ink1);font-size:10px;outline:none;cursor:pointer;width:100%}
.fs option{background:var(--p1)}
.vq{display:flex;gap:1px;margin-top:1px}
.vqb{flex:1;padding:1px 0;background:var(--bg);border:1px solid var(--wire);border-radius:1px;color:var(--ink3);font-size:9px;font-weight:500;cursor:pointer;font-family:var(--fm);text-align:center;transition:.04s}
.vqb:hover{background:var(--p3);color:var(--ink1)}
.sltp{background:var(--bg);border:1px solid var(--wire);border-radius:2px;padding:4px 5px}
.sltp-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:2px}
.sltp-ttl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.04em}
.sl-ttl{color:var(--red)}.tp-ttl{color:var(--grn)}
.sltp-modes{display:flex;gap:1px}
.slm{padding:1px 3px;border-radius:1px;font-size:8px;font-weight:600;cursor:pointer;color:var(--ink3)}
.slm.on{background:var(--p4);color:var(--ink1)}
.sltp-body{display:grid;grid-template-columns:1fr 1fr;gap:2px}
.sfld{display:flex;flex-direction:column;gap:0}
.sfl{font-size:8px;color:var(--ink3);font-weight:500;text-transform:uppercase}
.si{background:var(--p1);border:1px solid var(--wire);border-radius:1px;padding:2px 3px;color:var(--ink1);font-family:var(--fm);font-size:10px;outline:none;width:100%}
.si:focus{border-color:var(--teal)}.si:disabled{opacity:.2}
.tgl-r{display:flex;align-items:center;justify-content:space-between;font-size:10px}
.tgl-l{color:var(--ink2);font-weight:500}
.tgl{position:relative;display:inline-block;width:22px;height:11px;flex-shrink:0}
.tgl input{opacity:0;width:0;height:0}
.tgl-s{position:absolute;cursor:pointer;inset:0;background:var(--p3);border-radius:6px;transition:.1s;border:1px solid var(--wire)}
.tgl-s::before{content:'';position:absolute;width:5px;height:5px;left:2px;bottom:2px;background:var(--ink3);border-radius:50%;transition:.1s}
.tgl input:checked+.tgl-s{background:var(--teal);border-color:var(--teal)}
.tgl input:checked+.tgl-s::before{transform:translateX(11px);background:#fff}
.calc-s{display:flex;justify-content:space-between;background:var(--bg);border:1px solid var(--wire);border-radius:2px;padding:2px 5px;font-size:9px}
.cs-l{color:var(--ink3)}.cs-v{font-family:var(--fm);font-weight:600;color:var(--ink2)}
.rr-val{font-family:var(--fm);font-weight:600;font-size:9px}
.mkt-warn{background:rgba(239,83,80,.05);border:1px solid rgba(239,83,80,.15);border-radius:2px;padding:3px 5px;font-size:9px;color:var(--red);text-align:center;flex-shrink:0;margin:0 6px}
.place{width:100%;padding:7px;border:none;border-radius:2px;cursor:pointer;font-weight:700;font-size:11px;letter-spacing:.01em;transition:.08s;font-family:var(--ff);flex-shrink:0}
.place-b{background:var(--grn);color:#fff}.place-b:hover{background:var(--grn2)}
.place-s{background:var(--red);color:#fff}.place-s:hover{background:var(--red2)}
.place:active{transform:scale(.98)}.place:disabled{opacity:.3;cursor:not-allowed;transform:none!important}

.bot-tabs{display:flex;align-items:stretch;border-bottom:1px solid var(--wire);flex-shrink:0;padding:0 4px;height:24px;gap:0;overflow-x:auto}
.bt{padding:0 8px;cursor:pointer;font-size:10px;font-weight:500;color:var(--ink3);border-bottom:2px solid transparent;transition:.06s;white-space:nowrap;display:flex;align-items:center;gap:2px}
.bt:hover{color:var(--ink1)}.bt.on{color:var(--teal);border-bottom-color:var(--teal)}
.bc{background:var(--redb);color:var(--red);padding:0 3px;border-radius:3px;font-size:8px;font-weight:600;min-width:10px;text-align:center;display:inline-block}
.bc.neu{background:var(--tealb);color:var(--teal)}
.bot-summary{display:flex;gap:0;border-bottom:1px solid var(--wire);flex-shrink:0;overflow-x:auto}
.bsi{display:flex;gap:3px;align-items:center;padding:1px 6px;border-right:1px solid var(--wire);font-size:9px;white-space:nowrap}
.bsl{color:var(--ink3)}.bsv{font-family:var(--fm);font-weight:500}
.bot-scroll{flex:1;overflow-y:auto}
.tbl{width:100%;border-collapse:collapse;font-size:10px}
.tbl th{padding:2px 5px;text-align:left;font-size:9px;text-transform:uppercase;letter-spacing:.04em;color:var(--ink4);background:var(--bg);border-bottom:1px solid var(--wire);white-space:nowrap;position:sticky;top:0;z-index:1;font-weight:600}
.tbl td{padding:2px 5px;border-bottom:1px solid rgba(42,46,57,.5);font-family:var(--fm);white-space:nowrap;vertical-align:middle}
.tbl tr:hover td{background:rgba(255,255,255,.015)}
.tsym{font-weight:600;color:var(--ink1);font-family:var(--ff);font-size:10px}
.empt{padding:16px;text-align:center;color:var(--ink3);font-size:10px}
.pa-row{display:flex;gap:1px}
.pa{padding:0 3px;border:1px solid;border-radius:1px;cursor:pointer;font-size:9px;font-weight:600;font-family:var(--ff);line-height:16px}
.pa-x{background:var(--redb);color:var(--red);border-color:var(--redgl)}.pa-x:hover{background:rgba(239,83,80,.15)}
.pa-m{background:var(--blub);color:var(--blu);border-color:rgba(41,98,255,.2)}
.pa-p{background:var(--tealb);color:var(--teal);border-color:var(--tealg)}
.pa-rev{background:var(--ambb);color:var(--amb);border-color:rgba(255,152,0,.2)}
.ab-itm{display:flex;gap:3px;align-items:center;padding:0 5px;border-right:1px solid var(--wire);font-size:9px;white-space:nowrap}
.ab-l{color:var(--ink3)}.ab-v{font-family:var(--fm);font-weight:500}

.drop{position:fixed;z-index:500;background:var(--p2);border:1px solid var(--wire2);border-radius:3px;box-shadow:0 6px 24px rgba(0,0,0,.55);overflow:hidden;max-height:380px;overflow-y:auto}
.drop-sym{width:400px}
.dss{padding:4px 6px;border-bottom:1px solid var(--wire);display:flex;gap:4px;align-items:center}
.dss-i{flex:1;background:none;border:none;color:var(--ink1);font-size:10px;outline:none}
.ds-grp{padding:2px 8px;font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--ink4);background:var(--bg)}
.ds-row{display:grid;grid-template-columns:68px 1fr auto;align-items:center;padding:3px 8px;cursor:pointer;gap:6px}
.ds-row:hover{background:rgba(255,255,255,.025)}.ds-row.on{background:rgba(41,98,255,.05)}
.drop-acct{width:260px}
.da-row{padding:6px 8px;cursor:pointer;border-bottom:1px solid var(--wire)}
.da-row:hover{background:rgba(255,255,255,.02)}.da-row.on{background:rgba(41,98,255,.04)}

.mbg{position:fixed;inset:0;background:rgba(0,0,0,.65);backdrop-filter:blur(4px);z-index:600;display:flex;align-items:center;justify-content:center}
.mbox{background:var(--p2);border:1px solid var(--wire2);border-radius:4px;padding:12px;min-width:240px;max-width:340px;width:calc(100% - 20px);max-height:85vh;overflow-y:auto}
.mbox h3{font-size:12px;font-weight:700;margin-bottom:8px}
.mbtns{display:flex;gap:3px;justify-content:flex-end;margin-top:6px}
.mfd{display:flex;flex-direction:column;gap:0;margin-bottom:5px}
.mfl{font-size:9px;font-weight:500;text-transform:uppercase;letter-spacing:.04em;color:var(--ink3);margin-bottom:1px}
.bo{padding:2px 6px;background:none;border:1px solid var(--wire);border-radius:2px;color:var(--ink2);font-size:10px;font-weight:500;cursor:pointer}
.bo:hover{color:var(--ink1)}
.bp{padding:2px 6px;background:var(--teal);border:none;border-radius:2px;color:#fff;font-size:10px;font-weight:700;cursor:pointer}
.bd{padding:2px 6px;background:var(--redb);border:1px solid var(--redgl);border-radius:2px;color:var(--red);font-size:10px;font-weight:500;cursor:pointer}

<div id="toasts"></div>
<div id="mbg2" style="display:none" class="mbg" onclick="if(event.target===this)cMod()"><div class="mbox" id="mbox2"></div></div>
<div id="sdrop" style="display:none" class="drop drop-sym"></div>
<div id="adrop" style="display:none" class="drop drop-acct"></div>

<script>
// ══════════════════════════════════════════════════════════════════════
// PlutoTrader v3 — Industrial Dark  |  Outfit + IBM Plex Mono
// ══════════════════════════════════════════════════════════════════════
const BE  = location.hostname==='localhost' ? '' : 'https://pluto-platform-production.up.railway.app';
const WSU = BE.replace('https','wss').replace('http','ws') + '/ws/prices';
let token = localStorage.getItem('pcf_token');

// ── API ──────────────────────────────────────────────────────────────
async function api(path, o={}) {
  const r = await fetch(BE+path, {...o, headers: {'Content-Type':'application/json','Authorization':'Bearer '+(token||''), ...(o.headers||{})}});
  const d = await r.json().catch(()=>({}));
  if (r.status===401) { logout(); return; }
  if (!r.ok) throw new Error(d.error||`HTTP ${r.status}`);
  return d;
}

// ── Toast ────────────────────────────────────────────────────────────
function toast(msg, t='inf', ms=3200) {
  const el = Object.assign(document.createElement('div'), {className:`ti t${t}`, textContent:msg});
  $('toasts').appendChild(el);
  setTimeout(()=>{ el.style.transition='opacity .2s'; el.style.opacity='0'; setTimeout(()=>el.remove(),220); }, ms);
}

// ── Helpers ──────────────────────────────────────────────────────────
const $  = id => document.getElementById(id);
const F  = (n,d=2) => '$'+Number(n||0).toLocaleString('en',{minimumFractionDigits:d,maximumFractionDigits:d});
const Fp = (n,d) => Number(n||0).toFixed(d!=null?d:5);
const elapsed = t => { const m=Math.floor((Date.now()-new Date(t))/60000); return m<60?m+'m':Math.floor(m/60)+'h'+(m%60)+'m'; };

// ── State ────────────────────────────────────────────────────────────
let inst={}, px={}, accounts=[], acct=null;
let pos=[], pend=[], hist=[], alerts=[], journal=[];
let sym='EURUSD', dir='buy', ot='market', tf='5m';
let chart=null, cSeries=null, vSeries=null, candles=[];
let ws=null, wsOn=false, botTab='pos';
let drawTool=null, drawings=[], drawPt=null;

const TV_MAP={
  'EURUSD':'FX:EURUSD','GBPUSD':'FX:GBPUSD','USDJPY':'FX:USDJPY','USDCHF':'FX:USDCHF',
  'AUDUSD':'FX:AUDUSD','USDCAD':'FX:USDCAD','NZDUSD':'FX:NZDUSD','EURGBP':'FX:EURGBP',
  'EURJPY':'FX:EURJPY','GBPJPY':'FX:GBPJPY',
  'XAUUSD':'OANDA:XAUUSD','XAGUSD':'OANDA:XAGUSD',
  'BTCUSD':'COINBASE:BTCUSD','ETHUSD':'COINBASE:ETHUSD',
  'US30':'FOREXCOM:DJI','NAS100':'PEPPERSTONE:NAS100','US500':'FOREXCOM:SPX500',
  'GER40':'PEPPERSTONE:GER40','UK100':'PEPPERSTONE:UK100',
  'USOIL':'TVC:USOIL','UKBRENT':'TVC:UKOIL'
};
function tvSym(s){return TV_MAP[s]||'FX:'+s;}
let tvWidget=null;

let slOn=false, tpOn=false, trOn=false, slMode='pips', tpMode='pips';
let showGrid=true, refreshT=null;

// ── Instrument helpers ────────────────────────────────────────────────
function digs(s){ const i=inst[s]; if(i?.digits)return i.digits; if(['XAUUSD','XAGUSD'].includes(s))return 2; if(['US30','NAS100','US500','GER40','UK100'].includes(s))return 1; if(s?.includes('JPY'))return 3; return 5; }
function pip(s){ const i=inst[s]; if(i?.pip)return i.pip; if(['US30','NAS100','US500','GER40','UK100'].includes(s))return 1; if(['XAUUSD','XAGUSD'].includes(s))return 0.1; if(s?.includes('JPY'))return 0.01; return 0.0001; }
function spr(s){ const p=px[s]; if(p?.ask&&p?.bid)return +(p.ask-p.bid).toFixed(digs(s)+1); return inst[s]?.spread||0; }
function sprPips(s){ return +(spr(s)/pip(s)).toFixed(1); }
function pipVal(s,v){ const i=inst[s]; if(i?.pipValue)return +(i.pipValue*v).toFixed(2); return +(pip(s)*v*100000/px[s]?.ask||1).toFixed(2)||+(v*pip(s)*10).toFixed(2); }
function margin(s,v){ const p=px[s]||{}; const ep=dir==='buy'?(p.ask||1):(p.bid||1); const lev=acct?.leverage?.replace('1:','')||30; return +(ep*v*(inst[s]?.contract_size||100000)/lev).toFixed(2); }

// ── Modals ────────────────────────────────────────────────────────────
function showMod(h){$('mbg2').style.display='flex';$('mbox2').innerHTML=h;}
function cMod(){$('mbg2').style.display='none';}

// ── Dropdowns ────────────────────────────────────────────────────────
document.addEventListener('click', e=>{
  if(!e.target.closest('#sdrop')&&!e.target.closest('#tbSym')&&!e.target.closest('#adrop')&&!e.target.closest('#tbAcct'))
    closeDrops();
});
function closeDrops(){$('sdrop').style.display='none';$('adrop').style.display='none';}

function logout(){localStorage.removeItem('pcf_token');localStorage.removeItem('pcf_user');location.href='/';}

// ══════════════════════════════════════════════════════════════════════
//  TOPBAR
// ══════════════════════════════════════════════════════════════════════
function renderTB(){
  const p=px[sym]||{}, dg=digs(sym), sp=sprPips(sym), chg=p.change_pct||0;
  const si=$('tbSI');
  if(si) si.innerHTML=`
<div class="tb-prices"><div class="tb-bid">${Fp(p.bid||0,dg)}</div><div class="tb-ask">${Fp(p.ask||0,dg)}</div></div>
<div style="display:flex;flex-direction:column;padding:0 4px">
  <div class="tb-chg ${chg>=0?'up':'dn'}">${chg>=0?'+':''}${Fp(chg,2)}%</div>
  <div class="tb-sym-spread">Spr ${sp}</div>
</div>`;
  // Update order panel
  const bs=$('bSell'); if(bs){bs.querySelector('.bs-px').textContent=Fp(p.bid||0,dg);}
  const bb=$('bBuy');  if(bb){bb.querySelector('.bs-px').textContent=Fp(p.ask||0,dg);}
  const sl=$('sprLine'); if(sl) sl.textContent=`Spread ${sp}pts · H:${Fp(p.high||0,dg)} · L:${Fp(p.low||0,dg)}`;
  updatePlaceBtn(); calcUpdate(); updateAB();
}

function updateAB(){
  if(!acct)return;
  const fp=pos.reduce((s,p)=>s+(p.profit||0),0);
  const bal=acct.current_balance||0, eq=bal+fp;
  const mu=pos.reduce((s,p)=>s+margin(p.symbol,p.volume),0);
  const fm=Math.max(0,bal-mu);
  const ml=mu>0?+(eq/mu*100).toFixed(1):0;
  const ab=$('ab');
  if(!ab)return;
  ab.innerHTML=`
<div class="ab-itm"><span class="ab-l">Balance</span><span class="ab-v">${F(bal)}</span></div>
<div class="ab-itm"><span class="ab-l">Equity</span><span class="ab-v" style="color:${eq>=bal?'var(--grn)':'var(--red)'}">${F(eq)}</span></div>
<div class="ab-itm"><span class="ab-l">Float P&L</span><span class="ab-v" style="color:${fp>=0?'var(--grn)':'var(--red)'}">${fp>=0?'+':''}${F(fp)}</span></div>
<div class="ab-itm"><span class="ab-l">Margin</span><span class="ab-v">${F(mu)}</span></div>
<div class="ab-itm"><span class="ab-l">Free Margin</span><span class="ab-v">${F(fm)}</span></div>
<div class="ab-itm"><span class="ab-l">Margin Lvl</span><span class="ab-v" style="color:${ml>200?'var(--grn)':ml>100?'var(--amb)':'var(--red)'}">${ml?ml+'%':'N/A'}</span></div>
${acct.profit_target_pct?`<div class="ab-itm"><span class="ab-l">Target</span><span class="ab-v" style="color:var(--amb)">${acct.profit_target_pct}%</span></div>`:''}
<div class="ab-itm"><span class="ab-l">DD Floor</span><span class="ab-v" style="color:var(--red)">${F((acct.starting_balance||0)*(1-(acct.max_total_loss_pct||8)/100))}</span></div>
<div style="margin-left:auto;display:flex;align-items:center;gap:6px;padding:0 8px">
  <div class="wsdot ${wsOn?'on':''}" id="wsDot"></div>
  <span style="font-size:.55rem;color:var(--ink3)">${wsOn?'LIVE':'OFFLINE'}</span>
  <span id="abClock" style="font-family:var(--fm);font-size:.55rem;color:var(--ink3)"></span>
</div>`;
}

// ══════════════════════════════════════════════════════════════════════
//  MARKET WATCH
// ══════════════════════════════════════════════════════════════════════
function renderMW(q=''){
  const groups={};
  Object.entries(inst).forEach(([s,i])=>{
    if(q&&!s.toLowerCase().includes(q.toLowerCase())&&!(i.name||'').toLowerCase().includes(q.toLowerCase()))return;
    const g=i.type||'forex';
    if(!groups[g])groups[g]=[];
    groups[g].push([s,i]);
  });
  const order=['forex','metals','indices','energies','crypto'];
  const labels={forex:'Forex',metals:'Metals',indices:'Indices',energies:'Energy',crypto:'Crypto'};
  let h='';
  order.forEach(g=>{
    if(!groups[g]?.length)return;
    h+=`<div class="mw-grp">${labels[g]||g}</div>`;
    groups[g].forEach(([s,i])=>{
      const p=px[s]||{}, dg=digs(s), chg=p.change_pct||0;
      h+=`<div class="mw-row ${s===sym?'on':''}" id="mr${s}" onclick="pickSym('${s}')">
<div><div class="mw-s">${s}</div><div class="mw-n">${i.name||''}</div></div>
<div style="text-align:right"><div class="mw-b" id="mb${s}">${Fp(p.bid||0,dg)}</div><div class="mw-a" id="ma${s}">${Fp(p.ask||0,dg)}</div></div>
<div style="text-align:right"><div class="mw-c ${chg>=0?'up':'dn'}" id="mc${s}">${chg>=0?'+':''}${Fp(chg,2)}%</div></div>
<div class="mw-qt"><button class="mw-qs" onclick="event.stopPropagation();qTrade('${s}','sell')">S</button><button class="mw-qb" onclick="event.stopPropagation();qTrade('${s}','buy')">B</button></div>
</div>`;
    });
  });
  const el=$('mwL'); if(el)el.innerHTML=h||'<div class="empt">No results</div>';
}

function tickMW(s,p){
  const prev=px[s]||{};
  px[s]={...px[s],...p};
  const dg=digs(s);
  const b=$('mb'+s),a=$('ma'+s),c=$('mc'+s),row=$('mr'+s);
  if(b)b.textContent=Fp(p.bid||px[s].bid||0,dg);
  if(a)a.textContent=Fp(p.ask||px[s].ask||0,dg);
  if(c){const ch=p.change_pct||px[s].change_pct||0;c.textContent=(ch>=0?'+':'')+Fp(ch,2)+'%';c.className='mw-c '+(ch>=0?'up':'dn');}
  if(row&&prev.bid){const dir=(p.bid||0)>(prev.bid||0);row.classList.remove('fu','fd');void row.offsetWidth;row.classList.add(dir?'fu':'fd');setTimeout(()=>row.classList.remove('fu','fd'),360);}
}

async function qTrade(s,d){
  if(s!==sym)pickSym(s);
  dir=d; setDir(d);
  const v=parseFloat($('volI')?.value)||0.01;
  const iF=acct?.challenge_type==='funded';
  const body={symbol:s,direction:d,volume:v,...(iF?{funded_account_id:acct.id}:{challenge_id:acct.id})};
  try{await api('/api/trading/order',{method:'POST',body:JSON.stringify(body)});toast(`${d.toUpperCase()} ${v} ${s}`,'ok');await loadPos();botRender();renderTB();}
  catch(e){toast(e.message,'err');}
}

function pickSym(s){
  sym=s; closeDrops();
  document.querySelectorAll('.mw-row').forEach(r=>r.classList.remove('on'));
  const row=$('mr'+s); if(row)row.classList.add('on');
  const dg=digs(s),p=px[s]||{};
  $('rpSym')&&($('rpSym').textContent=s);
  $('rpDesc')&&($('rpDesc').textContent=inst[s]?.name||'');
  $('caBadge')&&($('caBadge').textContent=s);
  renderTB();
  calcUpdate();
  localStorage.setItem('pluto_last_sym',s);
  // Update TradingView chart
  if(tvWidget&&tvWidget.iframe){
    try{
      tvWidget.iframe.contentWindow.postMessage({name:'set-symbol',data:{symbol:tvSym(s),interval:tf==='1m'?'1':tf==='5m'?'5':tf==='15m'?'15':tf==='1h'?'60':tf==='4h'?'240':tf==='1d'?'D':'5'}},'*');
    }catch(e){}
    // Fallback: recreate widget
    try{ initChart(); }catch(e){}
  }
}

// ══════════════════════════════════════════════════════════════════════
//  CHART + DRAWING TOOLS
// ══════════════════════════════════════════════════════════════════════
const TF={'1m':'1min','3m':'3min','5m':'5min','15m':'15min','30m':'30min','1h':'1h','4h':'4h','1d':'1day','1w':'1week'};

function initChart(){
  const el=$('lwc');if(!el)return;
  el.innerHTML='';
  try{
    tvWidget=new TradingView.widget({
      container_id:'lwc',
      autosize:true,
      symbol:tvSym(sym),
      interval:'5',
      timezone:'Etc/UTC',
      theme:'dark',
      style:'1',
      locale:'en',
      toolbar_bg:'#1e222d',
      enable_publishing:false,
      hide_top_toolbar:false,
      hide_legend:false,
      hide_side_toolbar:false,
      allow_symbol_change:false,
      save_image:false,
      studies:[],
      show_popup_button:false,
      popup_width:'1000',
      popup_height:'650',
      no_referral_id:true,
      overrides:{
        'paneProperties.background':'#131722',
        'paneProperties.backgroundType':'solid',
        'mainSeriesProperties.candleStyle.upColor':'#26a69a',
        'mainSeriesProperties.candleStyle.downColor':'#ef5350',
        'mainSeriesProperties.candleStyle.wickUpColor':'#26a69a',
        'mainSeriesProperties.candleStyle.wickDownColor':'#ef5350',
        'mainSeriesProperties.candleStyle.borderUpColor':'#26a69a',
        'mainSeriesProperties.candleStyle.borderDownColor':'#ef5350',
      }
    });
  }catch(e){
    el.innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#787b86;font-size:12px">Chart loading...</div>';
    console.warn('[Chart]',e.message);
  }
}

function toggleGrid(){}

async function loadCandles(){}

function tickChart(){}

function switchTF(t){
  tf=t;
  document.querySelectorAll('.tf').forEach(b=>b.classList.toggle('on',b.dataset.tf===t));
  loadCandles();
}

function addPosLines(){}

// ─── DRAWING CANVAS ───────────────────────────────────────────────────
// Drawings stored by price/time so they persist across zoom and pan
function initDC(){}

function reDraw(){}function reDraw(){
  const cv=$('dc'); if(!cv||!chart)return;
  // Sync canvas size to container WITHOUT wiping it via width= assignment
  const W=cv.offsetWidth, H=cv.offsetHeight;
  if(cv.width!==W||cv.height!==H){cv.width=W;cv.height=H;}
  const ctx=cv.getContext('2d');
  ctx.clearRect(0,0,W,H);
  const all=[...drawings,...(drawPt?[drawPt]:[])];
  all.filter(d=>d.sym===sym).forEach(d=>{
    ctx.save();
    if(d.type==='hline'){
      const y=cSeries.priceToCoordinate(d.price);
      if(y==null)return ctx.restore();
      ctx.strokeStyle=d.color;ctx.lineWidth=d.w||1;ctx.setLineDash([5,3]);ctx.globalAlpha=.8;
      ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();
      ctx.setLineDash([]);ctx.fillStyle=d.color;ctx.font='600 9px IBM Plex Mono';ctx.globalAlpha=.9;
      ctx.fillText(Fp(d.price,digs(sym)),W-68,y-2);
    } else if(d.type==='vline'){
      // vline stored with ts OR raw x fallback
      let x=null;
      if(d.ts) x=chart.timeScale().timeToCoordinate(d.ts);
      if(x==null) x=d.x; // use raw pixel if ts out of view
      if(x==null)return ctx.restore();
      ctx.strokeStyle=d.color;ctx.lineWidth=d.w||1;ctx.setLineDash([4,3]);ctx.globalAlpha=.7;
      ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();ctx.setLineDash([]);
    } else if(d.type==='line'||d.type==='ray'){
      // Convert stored price/time to current pixel coords
      let x1,y1,x2,y2;
      if(d.ts1&&d.p1){
        x1=chart.timeScale().timeToCoordinate(d.ts1)??d.x1;
        y1=cSeries.priceToCoordinate(d.p1)??d.y1;
        x2=chart.timeScale().timeToCoordinate(d.ts2)??d.x2;
        y2=cSeries.priceToCoordinate(d.p2)??d.y2;
      } else {x1=d.x1;y1=d.y1;x2=d.x2;y2=d.y2;}
      ctx.strokeStyle=d.color||'#a855f7';ctx.lineWidth=d.w||1.5;ctx.globalAlpha=.85;
      ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
      if(d.type==='ray'){
        const dx=x2-x1,dy=y2-y1,len=Math.sqrt(dx*dx+dy*dy)||1,sc=W*3/len;
        ctx.setLineDash([4,3]);ctx.globalAlpha=.4;
        ctx.beginPath();ctx.moveTo(x2,y2);ctx.lineTo(x2+dx*sc,y2+dy*sc);ctx.stroke();
        ctx.setLineDash([]);
      }
    } else if(d.type==='rect'){
      let x1,y1,x2,y2;
      if(d.ts1&&d.p1){
        x1=chart.timeScale().timeToCoordinate(d.ts1)??d.x1;
        y1=cSeries.priceToCoordinate(d.p1)??d.y1;
        x2=chart.timeScale().timeToCoordinate(d.ts2)??d.x2;
        y2=cSeries.priceToCoordinate(d.p2)??d.y2;
      } else {x1=d.x1;y1=d.y1;x2=d.x2;y2=d.y2;}
      const rx=Math.min(x1,x2),ry=Math.min(y1,y2),rw=Math.abs(x2-x1),rh=Math.abs(y2-y1);
      ctx.fillStyle=d.color||'rgba(168,85,247,.1)';ctx.globalAlpha=.8;ctx.fillRect(rx,ry,rw,rh);
      ctx.strokeStyle=d.borderColor||'#a855f7';ctx.lineWidth=1;ctx.globalAlpha=.7;ctx.strokeRect(rx,ry,rw,rh);
    } else if(d.type==='fib'){
      const fibs=[0,.236,.382,.5,.618,.786,1];
      const cols=['#ff4757','#ffb300','#448aff','#a855f7','#00e676','#ffb300','#ff4757'];
      let y1,y2;
      if(d.p1&&d.p2){
        y1=cSeries.priceToCoordinate(d.p1)??d.y1;
        y2=cSeries.priceToCoordinate(d.p2)??d.y2;
      } else {y1=d.y1;y2=d.y2;}
      fibs.forEach((f,i)=>{
        const yf=y1+(y2-y1)*f;
        ctx.strokeStyle=cols[i];ctx.lineWidth=.8;ctx.setLineDash([3,3]);ctx.globalAlpha=.7;
        ctx.beginPath();ctx.moveTo(0,yf);ctx.lineTo(W,yf);ctx.stroke();
        ctx.setLineDash([]);ctx.fillStyle=cols[i];ctx.font='500 8px IBM Plex Mono';ctx.globalAlpha=.85;
        const price=d.p1&&d.p2?+(d.p1+(d.p2-d.p1)*f).toFixed(digs(sym)):'';
        ctx.fillText(`${(f*100).toFixed(1)}%${price?' '+price:''}`,3,yf-2);
      });
    }
    ctx.restore();
  });
}

function setTool(t){
  drawTool=t;
  document.querySelectorAll('.db[data-tool]').forEach(b=>b.classList.toggle('on',b.dataset.tool===t));
  const cv=$('dc');
  if(cv){cv.style.pointerEvents=t?'all':'none';cv.style.cursor=t?'crosshair':'default';}
}
function clearDraw(){drawings=drawings.filter(d=>d.sym!==sym);reDraw();toast('Drawings cleared','inf');}

// ══════════════════════════════════════════════════════════════════════
//  ORDER PANEL
// ══════════════════════════════════════════════════════════════════════
function setDir(d){
  dir=d;
  $('bSell')?.classList.toggle('sel',d==='sell');
  $('bBuy')?.classList.toggle('sel',d==='buy');
  updatePlaceBtn();calcUpdate();
}

function setOT(t){
  ot=t;
  document.querySelectorAll('.ot-tab').forEach(b=>b.classList.toggle('on',b.dataset.ot===t));
  $('entPxRow') && ($('entPxRow').style.display=t==='market'?'none':'');
  $('expRow')   && ($('expRow').style.display=t==='market'?'none':'');
  updatePlaceBtn();
}

function setVol(v){const i=$('volI');if(i){i.value=v;calcUpdate();}}

function calcUpdate(){
  const v=parseFloat($('volI')?.value)||0.01;
  const mg=margin(sym,v), pv=pipVal(sym,v);
  const mEl=$('cMargin');if(mEl)mEl.textContent=F(mg);
  const pEl=$('cPipVal');if(pEl)pEl.textContent='$'+pv;
  // RR
  const sl=parseFloat($('slI')?.value)||0;
  const tp=parseFloat($('tpI')?.value)||0;
  const rr=sl>0&&tp>0?+(tp/sl).toFixed(2):0;
  const rrEl=$('rrV');if(rrEl){rrEl.textContent=rr?'1:'+rr:'—';rrEl.style.color=rr>=2?'var(--grn)':rr>=1?'var(--amb)':'var(--ink3)';}
}

function setSLMode(m){slMode=m;document.querySelectorAll('#slMs .slm').forEach(b=>b.classList.toggle('on',b.dataset.m===m));$('slLbl')&&($('slLbl').textContent=m==='pips'?'Pips':m==='price'?'Price':'% Bal');}
function setTPMode(m){tpMode=m;document.querySelectorAll('#tpMs .slm').forEach(b=>b.classList.toggle('on',b.dataset.m===m));$('tpLbl')&&($('tpLbl').textContent=m==='pips'?'Pips':'Price');}
function togSL(v){slOn=v;const b=$('slBody');if(b)b.style.opacity=v?'1':'.35';const i=$('slI');if(i)i.disabled=!v;calcUpdate();}
function togTP(v){tpOn=v;const b=$('tpBody');if(b)b.style.opacity=v?'1':'.35';const i=$('tpI');if(i)i.disabled=!v;calcUpdate();}
function togTR(v){trOn=v;const r=$('trRow');if(r)r.style.display=v?'':'none';}

function slToPx(val,mode){
  const p=px[sym]||{};const ppp=pip(sym);const ep=dir==='buy'?(p.ask||0):(p.bid||0);
  if(mode==='price')return +parseFloat(val).toFixed(digs(sym));
  if(mode==='pips')return dir==='buy'?+(ep-val*ppp).toFixed(digs(sym)):+(ep+val*ppp).toFixed(digs(sym));
  return null;
}
function tpToPx(val,mode){
  const p=px[sym]||{};const ppp=pip(sym);const ep=dir==='buy'?(p.ask||0):(p.bid||0);
  if(mode==='price')return +parseFloat(val).toFixed(digs(sym));
  if(mode==='pips')return dir==='buy'?+(ep+val*ppp).toFixed(digs(sym)):+(ep-val*ppp).toFixed(digs(sym));
  return null;
}

function mktOpen(){const d=new Date(),day=d.getUTCDay(),h=d.getUTCHours();return!(day===6||(day===0&&h<22)||(day===5&&h>=22));}

function updatePlaceBtn(){
  const btn=$('placeBtn');if(!btn)return;
  const p=px[sym]||{},dg=digs(sym);
  const ep=dir==='buy'?(p.ask||0):(p.bid||0);
  const isP=ot!=='market';
  const open=mktOpen();
  btn.textContent=isP?`Place ${ot.toUpperCase()} Order`:`${dir==='buy'?'BUY':'SELL'} ${sym} @ ${Fp(ep,dg)}`;
  btn.className=`place ${dir==='buy'?'place-b':'place-s'}`;
  btn.disabled=(!open&&!isP)||!acct;
  const mw=$('mktW');if(mw)mw.style.display=(!open&&!isP)?'':'none';
}

async function placeOrder(){
  if(!acct)return toast('Select an account','err');
  const v=parseFloat($('volI')?.value)||0;
  if(!v||v<0.01)return toast('Min 0.01 lots','err');
  const p=px[sym]||{};
  if(!p.bid||!p.ask)return toast('No price data','err');
  const sl=slOn&&parseFloat($('slI')?.value)?slToPx(parseFloat($('slI').value),slMode):null;
  const tp=tpOn&&parseFloat($('tpI')?.value)?tpToPx(parseFloat($('tpI').value),tpMode):null;
  const tr=trOn&&parseFloat($('trI')?.value)?parseFloat($('trI').value):0;
  const cmt=$('cmtI')?.value||null;
  const iF=acct.challenge_type==='funded';
  const base={symbol:sym,direction:dir,volume:v,stop_loss:sl,take_profit:tp,trailing_stop_pips:tr,comment:cmt,...(iF?{funded_account_id:acct.id}:{challenge_id:acct.id})};
  const btn=$('placeBtn');btn.disabled=true;btn.textContent='Sending…';
  try{
    if(ot==='market'){
      await api('/api/trading/order',{method:'POST',body:JSON.stringify(base)});
      toast(`${dir.toUpperCase()} ${v} ${sym} placed`,'ok');
    } else {
      const ep=parseFloat($('entPxI')?.value)||0;
      if(!ep)return toast('Enter entry price','err');
      const exp=$('expI')?.value||null;
      await api('/api/trading/pending-order',{method:'POST',body:JSON.stringify({...base,order_type:ot,entry_price:ep,expiry:exp})});
      toast(`${ot.toUpperCase()} ${dir.toUpperCase()} ${v} ${sym} @ ${ep}`,'inf');
    }
    if($('slI'))$('slI').value=''; if($('tpI'))$('tpI').value='';
    await loadPos();await loadPend();botRender();renderTB();addPosLines();
  }catch(e){toast(e.message,'err');}
  finally{updatePlaceBtn();}
}

// ── Live P&L ──────────────────────────────────────────────────────────
function livePnL(){
  pos.forEach(p=>{
    const el=$('pnl'+p.id);if(!el)return;
    const cp=px[p.symbol];if(!cp)return;
    const cur=p.direction==='buy'?cp.bid:cp.ask;
    const diff=p.direction==='buy'?cur-p.open_price:p.open_price-cur;
    const pnl=+(diff/pip(p.symbol)*pipVal(p.symbol,p.volume)*pip(p.symbol)).toFixed(2);
    p.profit=pnl;el.textContent=(pnl>=0?'+':'')+F(pnl);el.style.color=pnl>=0?'var(--grn)':'var(--red)';
  });
  updateAB();
}

function connectWS(){
  if(ws)try{ws.close();}catch(_){}
  ws=new WebSocket(WSU);
  ws.onopen=()=>{wsOn=true;clearTimeout(wsRC);const d=$('wsDot');if(d)d.className='wsdot on';};
  ws.onmessage=e=>{
    try{
      const m=JSON.parse(e.data);
      if(m.type==='prices'&&m.data){
        Object.entries(m.data).forEach(([s,p])=>{tickMW(s,p);tickChart(s,p);if(s===sym)renderTB();});
        livePnL();chkAlerts();
      }
    }catch(_){}
  };
  ws.onclose=()=>{wsOn=false;const d=$('wsDot');if(d)d.className='wsdot';wsRC=setTimeout(connectWS,3500);};
  ws.onerror=()=>ws.close();
}

function showAcctDrop(e){
  e.stopPropagation();
  const dd=$('adrop'),r=e.currentTarget.getBoundingClientRect();
  dd.style.top=(r.bottom+4)+'px';dd.style.right=(window.innerWidth-r.right)+'px';dd.style.left='auto';
  let h='';
  if(!accounts.length){h='<div style="padding:12px;font-size:.7rem;color:var(--ink3);text-align:center">No active accounts<br><a href="/" style="color:var(--teal)">Buy challenge →</a></div>';}
  else accounts.forEach(a=>{
    const fp=pos.filter(p=>(p.challenge_id||p.funded_account_id)===a.id).reduce((s,p)=>s+(p.profit||0),0);
    const eq=(a.current_balance||0)+fp;
    h+=`<div class="da-row ${a.id===acct?.id?'on':''}" onclick="switchAcct('${a.id}')">
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:2px">
<span style="font-size:.72rem;font-weight:700">${F(a.account_size)} ${a.challenge_type==='funded'?'Funded':a.challenge_type==='two_step'?'2-Step':a.challenge_type==='rapid'?'Rapid':'1-Step'}</span>
${a.id===acct?.id?`<span style="font-size:.55rem;color:var(--teal);font-weight:700">● ACTIVE</span>`:''}
</div>
<div style="font-size:.6rem;color:var(--ink3);font-family:var(--fm)">${a.id.slice(0,8)} · ${a.status}</div>
<div style="display:flex;gap:8px;margin-top:3px;font-size:.58rem;font-family:var(--fm)">
<span style="color:var(--ink2)">Bal <span style="color:var(--ink1)">${F(a.current_balance)}</span></span>
<span style="color:var(--ink2)">Eq <span style="color:${eq>=(a.current_balance||0)?'var(--grn)':'var(--red)'}">${F(eq)}</span></span>
</div></div>`;
  });
  dd.innerHTML=h;dd.style.display='block';
}

async function switchAcct(id){
  closeDrops();
  const a=accounts.find(x=>x.id===id);if(!a)return;
  acct=a;localStorage.setItem('pluto_last_account',id);
  $('tbAcctName') && ($('tbAcctName').textContent=F(a.account_size)+' '+(a.challenge_type==='funded'?'Funded':a.challenge_type==='rapid'?'Rapid':a.challenge_type==='two_step'?'2-Step':'1-Step'));
  $('tbAcctBal') && ($('tbAcctBal').textContent=F(a.current_balance));
  renderTB();await loadPos();await loadPend();botRender();addPosLines();toast(`Switched to ${F(a.account_size)}`,'inf');
}

function showSymDrop(e){
  e.stopPropagation();
  const dd=$('sdrop'),r=e.currentTarget.getBoundingClientRect();
  dd.style.top=(r.bottom+4)+'px';dd.style.left=r.left+'px';
  renderSymDrop('');dd.style.display='block';
  setTimeout(()=>dd.querySelector('.dss-i')?.focus(),30);
}
function renderSymDrop(q){
  const order=['forex','metals','indices','energies','crypto'];
  const labels={forex:'Forex',metals:'Metals',indices:'Indices',energies:'Energy',crypto:'Crypto'};
  const groups={};
  Object.entries(inst).filter(([s,i])=>!q||s.toLowerCase().includes(q)||i.name?.toLowerCase().includes(q)).forEach(([s,i])=>{const g=i.type||'forex';if(!groups[g])groups[g]=[];groups[g].push([s,i]);});
  let h=`<div class="dss"><span style="color:var(--ink3);font-size:.72rem">⌕</span><input class="dss-i" placeholder="Search symbol…" oninput="renderSymDrop(this.value.toLowerCase())" value="${q}"></div>`;
  order.forEach(g=>{
    if(!groups[g]?.length)return;
    h+=`<div class="ds-grp">${labels[g]||g}</div>`;
    groups[g].forEach(([s,i])=>{
      const p=px[s]||{},dg=digs(s);
      h+=`<div class="ds-row ${s===sym?'on':''}" onclick="pickSym('${s}');$('sdrop').style.display='none'">
<div><div style="font-size:.72rem;font-weight:700;font-family:var(--fm)">${s}</div><div style="font-size:.55rem;color:var(--ink3)">${i.name||''}</div></div>
<div style="text-align:right"><div style="font-size:.66rem;font-family:var(--fm)">${Fp(p.bid||0,dg)}</div><div style="font-size:.56rem;color:var(--ink3)">${Fp(p.ask||0,dg)}</div></div>
<div style="text-align:right"><div style="font-size:.6rem;font-family:var(--fm);color:${(p.change_pct||0)>=0?'var(--grn)':'var(--red)'}">${(p.change_pct||0)>=0?'+':''}${Fp(p.change_pct||0,2)}%</div><div style="font-size:.54rem;color:var(--ink3)">${sprPips(s)} pts</div></div>
</div>`;
    });
  });
  $('sdrop').innerHTML=h;
}

async function doLogin(){
  const em=$('lEm')?.value.trim(), pw=$('lPw')?.value;
  const err=$('lErr');
  if(!em||!pw){err.style.display='block';err.textContent='Enter email and password';return;}
  const btn=document.querySelector('.lb');btn.textContent='Connecting…';btn.disabled=true;
  try{
    const r=await fetch(BE+'/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:em,password:pw})});
    const d=await r.json();
    if(!r.ok)throw new Error(d.error||'Login failed');
    localStorage.setItem('pcf_token',d.token);
    localStorage.setItem('pcf_user',JSON.stringify(d.user));
    token=d.token;boot();
  }catch(e){err.style.display='block';err.textContent=e.message;btn.textContent='Launch Terminal';btn.disabled=false;}
}

// ══════════════════════════════════════════════════════════════════════
//  BOOT
// ══════════════════════════════════════════════════════════════════════
async function boot(){
  if(!token){showLogin();return;}
  try{
    const[instList,acctList]=await Promise.all([api('/api/trading/instruments'),api('/api/trading/accounts')]);
    instList.forEach(i=>{inst[i.symbol]=i;px[i.symbol]={bid:i.last_price||0,ask:(i.last_price||0)+(i.spread||0),change_pct:0,high:i.last_price||0,low:i.last_price||0};});
    accounts=acctList.filter(a=>a.status==='active'||a.challenge_type==='funded');
    const last=localStorage.getItem('pluto_last_account');
    acct=accounts.find(a=>a.id===last)||accounts[0]||null;
    renderApp();
    connectWS();
  }catch(e){
    if(e.message?.includes('401')){localStorage.removeItem('pcf_token');showLogin();}
    else{$('app').innerHTML=`<div class="lp"><div class="lc"><div style="color:var(--red);margin-bottom:12px;font-size:.75rem">⚠ ${e.message}</div><button class="lb" onclick="boot()">Retry</button></div></div>`;}
  }
}

boot();
</script>
