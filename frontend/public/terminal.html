<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>PlutoTrader — Professional Terminal</title>
<link rel="icon" type="image/svg+xml" href="/img/favicon.svg?v=47">
<script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#08070f;--bg2:#0d0c1a;--sf:#111020;--sf2:#161525;--sf3:#1c1a2e;--sf4:#222038;
  --brd:rgba(255,255,255,.055);--brd2:rgba(255,255,255,.09);--brd3:rgba(255,255,255,.14);
  --ac:#7c3aed;--ac2:#a78bfa;--acbg:rgba(124,58,237,.1);--acgl:rgba(124,58,237,.3);
  --buy:#00c896;--buy2:#00a87d;--buybg:rgba(0,200,150,.08);--buygl:rgba(0,200,150,.3);
  --sell:#ff3b5c;--sell2:#d42d4a;--sellbg:rgba(255,59,92,.08);--sellgl:rgba(255,59,92,.3);
  --am:#f59e0b;--ambg:rgba(245,158,11,.08);
  --bl:#60a5fa;--blbg:rgba(96,165,250,.08);
  --t1:#eeedf4;--t2:#8b87a0;--t3:#5a5672;--t4:#3d3955;
  --ff:'Manrope',sans-serif;--fm:'JetBrains Mono',monospace;
  --r:5px;--r2:8px;--r3:12px;
  --tb:44px;--mw:200px;--op:270px;--bot:200px;--ab:32px;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--t1);font-family:var(--ff);font-size:12px;-webkit-font-smoothing:antialiased;user-select:none}
input,select,button,textarea{font-family:inherit;font-size:inherit}

/* ─── LAYOUT ─────────────────────────────────────────────────────── */
.tb{position:fixed;top:0;left:0;right:0;height:var(--tb);background:var(--sf);border-bottom:1px solid var(--brd);z-index:200;display:flex;align-items:center;gap:0}
.body{position:fixed;top:var(--tb);left:0;right:0;bottom:calc(var(--bot)+var(--ab));display:grid;grid-template-columns:var(--mw) 1fr var(--op)}
.bot-area{position:fixed;bottom:var(--ab);left:0;right:0;height:var(--bot);background:var(--sf);border-top:1px solid var(--brd);display:flex;flex-direction:column}
.acct-bar{position:fixed;bottom:0;left:0;right:0;height:var(--ab);background:var(--bg2);border-top:1px solid var(--brd);display:flex;align-items:center;gap:0;padding:0 8px;overflow:hidden}

/* ─── TOPBAR ─────────────────────────────────────────────────────── */
.tb-logo{display:flex;align-items:center;gap:7px;padding:0 12px;border-right:1px solid var(--brd);height:100%;flex-shrink:0}
.tb-logo-dot{width:22px;height:22px;background:linear-gradient(135deg,var(--ac),var(--ac2));border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:10px;color:#fff}
.tb-logo-txt{font-size:.72rem;font-weight:800;letter-spacing:-.01em;color:var(--t1)}
.tb-logo-txt span{color:var(--ac2)}
.tb-sym{display:flex;align-items:center;gap:6px;padding:0 10px;border-right:1px solid var(--brd);height:100%;cursor:pointer;min-width:160px;transition:.15s}
.tb-sym:hover{background:rgba(255,255,255,.03)}
.tb-sym-name{font-size:.82rem;font-weight:700;font-family:var(--fm)}
.tb-sym-price{font-size:.72rem;color:var(--t2);font-family:var(--fm)}
.tb-sym-chg{font-size:.65rem;font-family:var(--fm);font-weight:700}
.tb-bid{color:var(--sell);font-size:.82rem;font-weight:700;font-family:var(--fm)}
.tb-ask{color:var(--buy);font-size:.82rem;font-weight:700;font-family:var(--fm)}
.tb-spr{font-size:.6rem;color:var(--t3);font-family:var(--fm)}
.tb-divider{width:1px;background:var(--brd);height:60%;flex-shrink:0}

/* TF buttons */
.tf-wrap{display:flex;align-items:center;gap:1px;padding:0 6px;height:100%}
.tf-btn{padding:3px 7px;background:transparent;border:1px solid transparent;border-radius:4px;color:var(--t3);font-size:.62rem;font-weight:700;cursor:pointer;transition:.12s;font-family:var(--fm)}
.tf-btn:hover{color:var(--t2);border-color:var(--brd)}
.tf-btn.act{background:var(--acbg);color:var(--ac2);border-color:var(--acgl)}

/* Drawing tools */
.dt-wrap{display:flex;align-items:center;gap:2px;padding:0 6px;height:100%;border-left:1px solid var(--brd)}
.dt-btn{width:28px;height:26px;display:flex;align-items:center;justify-content:center;background:transparent;border:1px solid transparent;border-radius:4px;color:var(--t3);cursor:pointer;transition:.12s;position:relative;font-size:.7rem}
.dt-btn:hover{background:rgba(255,255,255,.05);color:var(--t2);border-color:var(--brd)}
.dt-btn.act{background:var(--acbg);color:var(--ac2);border-color:var(--acgl)}
.dt-btn svg{pointer-events:none}

/* Chart type + right tb items */
.tb-right{margin-left:auto;display:flex;align-items:center;gap:4px;padding-right:8px}
.tb-btn{padding:4px 9px;background:transparent;border:1px solid var(--brd2);border-radius:var(--r);color:var(--t2);font-size:.65rem;font-weight:700;cursor:pointer;transition:.15s}
.tb-btn:hover{background:rgba(255,255,255,.05);color:var(--t1)}
.tb-btn.act{background:var(--acbg);color:var(--ac2);border-color:var(--acgl)}
.tb-acct{display:flex;align-items:center;gap:6px;padding:4px 8px;background:var(--sf2);border:1px solid var(--brd2);border-radius:var(--r);cursor:pointer;transition:.15s}
.tb-acct:hover{border-color:var(--brd3)}
.tb-ws{width:7px;height:7px;border-radius:50%;background:var(--sell);flex-shrink:0;transition:.3s}
.tb-ws.on{background:var(--buy);box-shadow:0 0 6px rgba(0,200,150,.5);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
#tbClock{font-family:var(--fm);font-size:.62rem;color:var(--t3)}

/* ─── MARKET WATCH ───────────────────────────────────────────────── */
.mw{grid-row:1;background:var(--sf);border-right:1px solid var(--brd);overflow:hidden;display:flex;flex-direction:column}
.mw-hd{display:flex;align-items:center;justify-content:space-between;padding:6px 8px;border-bottom:1px solid var(--brd);flex-shrink:0}
.mw-ttl{font-size:.6rem;font-weight:800;text-transform:uppercase;letter-spacing:.12em;color:var(--t3)}
.mw-hdr{display:grid;grid-template-columns:1fr auto auto;padding:3px 8px;border-bottom:1px solid var(--brd);background:var(--sf2);flex-shrink:0}
.mw-hdr span{font-size:.55rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--t4)}
.mw-search{padding:5px 8px;border-bottom:1px solid var(--brd);flex-shrink:0}
.mw-srch-inp{width:100%;background:var(--sf2);border:1px solid var(--brd);border-radius:var(--r);padding:4px 8px;color:var(--t1);font-size:.72rem;outline:none}
.mw-srch-inp:focus{border-color:var(--ac)}
.mw-list{flex:1;overflow-y:auto}
.mw-grp{padding:4px 8px 2px;font-size:.54rem;font-weight:800;text-transform:uppercase;letter-spacing:.12em;color:var(--t4)}
.mw-row{display:grid;grid-template-columns:1fr auto auto;align-items:center;padding:4px 8px;cursor:pointer;border-left:2px solid transparent;transition:.1s;position:relative;gap:4px}
.mw-row:hover{background:rgba(255,255,255,.03)}
.mw-row.act{background:var(--acbg);border-left-color:var(--ac)}
.mw-row:hover .mw-qt{display:flex}
.mw-sym{font-size:.72rem;font-weight:700;color:var(--t1)}
.mw-name{font-size:.57rem;color:var(--t3)}
.mw-bid{font-family:var(--fm);font-size:.68rem;color:var(--sell);font-weight:600;text-align:right}
.mw-ask{font-family:var(--fm);font-size:.68rem;color:var(--buy);font-weight:600;text-align:right}
.mw-chg{font-size:.58rem;font-weight:700;font-family:var(--fm);text-align:right}
.up{color:var(--buy)}.dn{color:var(--sell)}
.flash-up{animation:fup .3s ease}
.flash-dn{animation:fdn .3s ease}
@keyframes fup{0%{background:rgba(0,200,150,.15)}100%{background:transparent}}
@keyframes fdn{0%{background:rgba(255,59,92,.15)}100%{background:transparent}}
.mw-qt{display:none;position:absolute;right:6px;top:50%;transform:translateY(-50%);gap:3px}
.mw-qt button{padding:2px 7px;border:none;border-radius:3px;font-size:.6rem;font-weight:700;cursor:pointer}
.mw-qt .qs{background:var(--sell);color:#fff}
.mw-qt .qb{background:var(--buy);color:#fff}

/* ─── CHART ──────────────────────────────────────────────────────── */
.chart-area{position:relative;overflow:hidden;background:var(--bg)}
#lwChart{position:absolute;inset:0}
#drawCanvas{position:absolute;inset:0;pointer-events:none;z-index:5}
#drawCanvas.active{pointer-events:all;cursor:crosshair}
.no-data{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--t3);font-size:.78rem;pointer-events:none;z-index:4}
.chart-ohlc{position:absolute;top:6px;left:6px;z-index:6;font-family:var(--fm);font-size:.62rem;color:var(--t2);background:rgba(8,7,15,.7);border:1px solid var(--brd);border-radius:var(--r);padding:4px 8px;line-height:1.7;pointer-events:none}
.ohlc-o{color:var(--t2)}.ohlc-h{color:var(--buy)}.ohlc-l{color:var(--sell)}.ohlc-c{color:var(--t1)}

/* ─── ORDER PANEL ────────────────────────────────────────────────── */
.op{background:var(--sf);border-left:1px solid var(--brd);overflow-y:auto;display:flex;flex-direction:column}
.op-hd{padding:8px 10px;border-bottom:1px solid var(--brd);flex-shrink:0}
.op-sym{font-size:.8rem;font-weight:700;font-family:var(--fm);color:var(--t1)}
.op-desc{font-size:.62rem;color:var(--t3);margin-top:1px}
.op-body{padding:8px;display:flex;flex-direction:column;gap:6px}

/* Buy/Sell buttons */
.dir-grid{display:grid;grid-template-columns:1fr 1fr;gap:3px}
.dir-btn{padding:9px 4px;border:1.5px solid;border-radius:var(--r2);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:1px;transition:.15s;font-family:var(--fm)}
.dir-btn.sell{background:var(--sellbg);border-color:var(--sellgl);color:var(--sell)}
.dir-btn.sell:hover,.dir-btn.sell.act{background:var(--sell);color:#fff;border-color:var(--sell)}
.dir-btn.buy{background:var(--buybg);border-color:var(--buygl);color:var(--buy)}
.dir-btn.buy:hover,.dir-btn.buy.act{background:var(--buy);color:#fff;border-color:var(--buy)}
.dir-lbl{font-size:.7rem;font-weight:800;letter-spacing:.05em}
.dir-px{font-size:.8rem;font-weight:700}
.dir-sub{font-size:.58rem;opacity:.7;font-family:var(--ff)}
.spr-row{text-align:center;font-size:.6rem;color:var(--t3);font-family:var(--fm);padding:1px 0}

/* Price row */
.px-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px}
.px-box{background:var(--sf2);border:1px solid var(--brd);border-radius:var(--r2);padding:5px 7px;text-align:center}
.px-lbl{font-size:.54rem;color:var(--t3);text-transform:uppercase;letter-spacing:.09em;font-weight:700}
.px-val{font-size:.95rem;font-weight:700;font-family:var(--fm);margin-top:1px}
.px-val.bid{color:var(--sell)}.px-val.ask{color:var(--buy)}

/* Order type tabs */
.ot-tabs{display:flex;gap:1px;background:var(--sf3);border-radius:var(--r2);padding:2px}
.ot-tab{flex:1;padding:4px 3px;border-radius:5px;cursor:pointer;font-size:.6rem;font-weight:700;text-align:center;color:var(--t3);transition:.12s}
.ot-tab.act{background:var(--ac);color:#fff}
.ot-tab:hover:not(.act){background:rgba(255,255,255,.05);color:var(--t2)}

/* Form fields */
.fl{display:flex;flex-direction:column;gap:2px}
.fl-lbl{font-size:.57rem;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.09em;display:flex;align-items:center;gap:4px}
.fl-inp{background:var(--sf2);border:1.5px solid var(--brd2);border-radius:var(--r);padding:5px 7px;color:var(--t1);font-family:var(--fm);font-size:.78rem;outline:none;transition:.15s;width:100%}
.fl-inp:focus{border-color:var(--ac)}
.fl-sel{background:var(--sf2);border:1.5px solid var(--brd2);border-radius:var(--r);padding:5px 7px;color:var(--t1);font-size:.75rem;outline:none;cursor:pointer;width:100%}
.fl-sel:focus{border-color:var(--ac)}
.fl-sel option{background:var(--bg2)}
.vol-quick{display:flex;gap:2px;margin-top:2px}
.vq-btn{flex:1;padding:2px 0;background:var(--sf3);border:1px solid var(--brd);border-radius:3px;color:var(--t3);font-size:.58rem;font-weight:700;cursor:pointer;transition:.12s;font-family:var(--fm)}
.vq-btn:hover{background:rgba(255,255,255,.05);color:var(--t2)}

/* SL/TP with toggle */
.sltp-block{background:var(--sf2);border:1px solid var(--brd);border-radius:var(--r2);padding:7px 8px}
.sltp-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px}
.sltp-ttl{font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.09em}
.sltp-sl .sltp-ttl{color:var(--sell)}
.sltp-tp .sltp-ttl{color:var(--buy)}
.sltp-modes{display:flex;gap:2px}
.sltp-mode{padding:1px 6px;border-radius:3px;font-size:.56rem;font-weight:700;cursor:pointer;color:var(--t3);transition:.12s}
.sltp-mode.act{background:var(--sf4);color:var(--t1)}
.sltp-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:3px}
.sltp-field{display:flex;flex-direction:column;gap:1px}
.sltp-fl{font-size:.54rem;color:var(--t3);font-weight:600;letter-spacing:.06em}
.sltp-inp{background:var(--sf3);border:1px solid var(--brd);border-radius:3px;padding:4px 5px;color:var(--t1);font-family:var(--fm);font-size:.73rem;outline:none;width:100%;transition:.15s}
.sltp-inp:focus{border-color:var(--ac)}
.sltp-disabled{opacity:.35;pointer-events:none}

/* Calc row */
.calc-row{display:flex;justify-content:space-between;font-size:.62rem;padding:3px 6px;background:var(--sf3);border-radius:var(--r);border:1px solid var(--brd)}
.cr-lbl{color:var(--t3)}.cr-val{font-family:var(--fm);font-weight:700;color:var(--t2)}

/* Place button */
.place-btn{width:100%;padding:10px;border:none;border-radius:var(--r2);cursor:pointer;font-weight:800;font-size:.82rem;letter-spacing:.02em;transition:.18s;font-family:var(--ff)}
.place-buy{background:linear-gradient(135deg,var(--buy),var(--buy2));color:#000;box-shadow:0 4px 14px rgba(0,200,150,.25)}
.place-buy:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(0,200,150,.4)}
.place-sell{background:linear-gradient(135deg,var(--sell),var(--sell2));color:#fff;box-shadow:0 4px 14px rgba(255,59,92,.25)}
.place-sell:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(255,59,92,.4)}
.place-btn:active{transform:translateY(0)!important;box-shadow:none!important}
.place-btn:disabled{opacity:.45;cursor:not-allowed;transform:none!important}

/* Market closed notice */
.mkt-closed{background:var(--sellbg);border:1px solid var(--sellgl);border-radius:var(--r2);padding:7px 9px;font-size:.7rem;color:var(--sell);text-align:center;line-height:1.5}

/* Trailing/comment */
.tgl-row{display:flex;align-items:center;justify-content:space-between;font-size:.68rem}
.tgl-lbl{color:var(--t2);font-weight:600}
.tgl{position:relative;display:inline-block;width:30px;height:16px;flex-shrink:0}
.tgl input{opacity:0;width:0;height:0}
.tgl-s{position:absolute;cursor:pointer;inset:0;background:var(--sf3);border-radius:8px;transition:.2s;border:1px solid var(--brd)}
.tgl-s::before{content:'';position:absolute;width:10px;height:10px;left:2px;bottom:2px;background:var(--t3);border-radius:50%;transition:.2s}
.tgl input:checked+.tgl-s{background:var(--ac);border-color:var(--ac)}
.tgl input:checked+.tgl-s::before{transform:translateX(14px);background:#fff}
.op-divider{height:1px;background:var(--brd);margin:2px -8px}

/* ─── BOTTOM PANEL ───────────────────────────────────────────────── */
.bot-tabs{display:flex;align-items:center;border-bottom:1px solid var(--brd);flex-shrink:0;padding:0 8px;gap:0;height:30px}
.bot-tab{padding:4px 12px;cursor:pointer;font-size:.65rem;font-weight:700;color:var(--t3);border-bottom:2px solid transparent;transition:.15s;white-space:nowrap;height:30px;display:flex;align-items:center}
.bot-tab:hover{color:var(--t2)}
.bot-tab.act{color:var(--ac2);border-bottom-color:var(--ac)}
.bot-cnt{display:inline-block;background:var(--acbg);color:var(--ac2);padding:0 4px;border-radius:7px;font-size:.54rem;font-weight:800;margin-left:3px;min-width:14px;text-align:center}
.bot-cnt.red{background:var(--sellbg);color:var(--sell)}
.bot-body{flex:1;overflow-y:auto}
.bot-summary{display:flex;gap:16px;padding:4px 10px;border-bottom:1px solid var(--brd);flex-shrink:0;flex-wrap:wrap}
.bs-item{display:flex;gap:4px;align-items:center;font-size:.62rem}
.bs-lbl{color:var(--t3)}.bs-val{font-family:var(--fm);font-weight:700}
.bot-actions{display:flex;gap:5px;margin-left:auto;align-items:center}

/* Bottom tables */
.bt{width:100%;border-collapse:collapse;font-size:.68rem}
.bt th{padding:4px 8px;text-align:left;font-size:.54rem;text-transform:uppercase;letter-spacing:.09em;color:var(--t3);background:var(--sf2);border-bottom:1px solid var(--brd);white-space:nowrap;position:sticky;top:0;z-index:1}
.bt td{padding:5px 8px;border-bottom:1px solid rgba(255,255,255,.02);font-family:var(--fm);white-space:nowrap}
.bt tr:hover td{background:rgba(255,255,255,.02)}
.bt-sym{font-weight:700;color:var(--t1);font-family:var(--ff)}
.pos-actions{display:flex;gap:2px}
.pa{padding:1px 6px;border:none;border-radius:3px;cursor:pointer;font-size:.58rem;font-weight:700;font-family:var(--ff);transition:.12s}
.pa-x{background:var(--sellbg);color:var(--sell);border:1px solid var(--sellgl)}
.pa-x:hover{background:rgba(255,59,92,.2)}
.pa-e{background:var(--blbg);color:var(--bl);border:1px solid rgba(96,165,250,.2)}
.pa-e:hover{background:rgba(96,165,250,.2)}
.pa-p{background:var(--acbg);color:var(--ac2);border:1px solid var(--acgl)}
.pa-rev{background:var(--ambg);color:var(--am);border:1px solid rgba(245,158,11,.2)}
.empty-bot{padding:30px;text-align:center;color:var(--t3);font-size:.75rem}

/* ─── ACCOUNT BAR ────────────────────────────────────────────────── */
.ab-item{display:flex;gap:5px;align-items:center;padding:0 10px;border-right:1px solid var(--brd);font-size:.62rem;white-space:nowrap}
.ab-lbl{color:var(--t3)}.ab-val{font-family:var(--fm);font-weight:700}
.ab-profit{color:var(--buy)}.ab-loss{color:var(--sell)}

/* ─── DROPDOWNS ──────────────────────────────────────────────────── */
.drop{position:fixed;z-index:500;background:var(--sf2);border:1px solid var(--brd3);border-radius:var(--r3);box-shadow:0 16px 50px rgba(0,0,0,.7);overflow:hidden;max-height:440px;overflow-y:auto}
.drop-sym{width:480px}
.ds-search{padding:8px 10px;border-bottom:1px solid var(--brd);display:flex;gap:6px}
.ds-si{flex:1;background:transparent;border:none;color:var(--t1);font-size:.78rem;outline:none}
.ds-row{display:grid;grid-template-columns:90px 1fr auto auto;align-items:center;padding:6px 12px;cursor:pointer;gap:8px;transition:.1s}
.ds-row:hover{background:rgba(255,255,255,.04)}
.ds-row.act{background:var(--acbg)}
.ds-grp{padding:4px 12px;font-size:.54rem;font-weight:800;text-transform:uppercase;letter-spacing:.12em;color:var(--t4)}
.drop-acct{width:340px}
.da-row{padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--brd);transition:.1s}
.da-row:last-child{border-bottom:none}
.da-row:hover{background:rgba(255,255,255,.03)}
.da-row.act{background:var(--acbg)}

/* ─── MODAL ──────────────────────────────────────────────────────── */
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.72);backdrop-filter:blur(8px);z-index:600;display:flex;align-items:center;justify-content:center}
.mbox{background:var(--sf2);border:1px solid var(--brd2);border-radius:var(--r3);padding:20px;min-width:300px;max-width:420px;width:calc(100% - 32px);max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.mbox h3{font-size:.85rem;font-weight:700;margin-bottom:12px}
.mbtns{display:flex;gap:8px;margin-top:12px;justify-content:flex-end}
.fld{margin-bottom:9px}
.flbl2{display:block;font-size:.57rem;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.09em;margin-bottom:3px}
.btn-o{padding:4px 10px;background:transparent;border:1px solid var(--brd2);border-radius:var(--r);color:var(--t2);font-size:.65rem;font-weight:700;cursor:pointer;transition:.15s}
.btn-o:hover{background:rgba(255,255,255,.05);color:var(--t1)}
.btn-p{padding:4px 10px;background:var(--ac);border:none;border-radius:var(--r);color:#fff;font-size:.65rem;font-weight:700;cursor:pointer;transition:.15s}
.btn-p:hover{background:var(--acbg);color:var(--ac2)}
.btn-d{padding:4px 10px;background:var(--sellbg);border:1px solid var(--sellgl);border-radius:var(--r);color:var(--sell);font-size:.65rem;font-weight:700;cursor:pointer;transition:.15s}
.btn-d:hover{background:rgba(255,59,92,.2)}

/* ─── TOASTS ─────────────────────────────────────────────────────── */
#toasts{position:fixed;bottom:40px;right:14px;z-index:900;display:flex;flex-direction:column;gap:4px;pointer-events:none}
.ti{padding:7px 12px;border-radius:var(--r2);font-size:.7rem;font-weight:600;border:1px solid;animation:ts .2s ease}
.t-ok{background:rgba(0,200,150,.1);border-color:rgba(0,200,150,.3);color:var(--buy)}
.t-err{background:rgba(255,59,92,.1);border-color:rgba(255,59,92,.3);color:var(--sell)}
.t-inf{background:rgba(124,58,237,.1);border-color:var(--acgl);color:var(--ac2)}
.t-warn{background:rgba(245,158,11,.1);border-color:rgba(245,158,11,.3);color:var(--am)}
@keyframes ts{from{opacity:0;transform:translateX(10px)}to{opacity:1;transform:none}}

/* ─── LOGIN ──────────────────────────────────────────────────────── */
.lp{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:var(--bg);z-index:999}
.lc{background:var(--sf);border:1px solid var(--brd2);border-radius:var(--r3);padding:32px;width:360px;box-shadow:0 20px 60px rgba(0,0,0,.6)}
.lb{width:100%;background:linear-gradient(135deg,var(--ac),var(--buy));border:none;border-radius:var(--r2);padding:11px;color:#fff;font-size:.85rem;font-weight:700;cursor:pointer;transition:.15s}
.lb:hover{opacity:.9}
.le{display:none;background:var(--sellbg);border:1px solid var(--sellgl);border-radius:var(--r);padding:7px 10px;color:var(--sell);font-size:.72rem;margin-bottom:10px}

/* ─── PRICE ALERTS ───────────────────────────────────────────────── */
.alert-row{display:flex;align-items:center;gap:8px;padding:6px 10px;border-bottom:1px solid var(--brd);font-size:.7rem}
.alert-sym{font-weight:700;font-family:var(--fm);color:var(--t1);min-width:60px}
.alert-cond{color:var(--t3);font-family:var(--fm)}
.alert-px{font-family:var(--fm);font-weight:700;color:var(--am)}

/* ─── SETTINGS PANEL ─────────────────────────────────────────────── */
.settings-panel{position:fixed;right:0;top:var(--tb);bottom:var(--ab);width:320px;background:var(--sf2);border-left:1px solid var(--brd2);z-index:300;overflow-y:auto;padding:14px;transform:translateX(100%);transition:transform .25s cubic-bezier(.22,1,.36,1)}
.settings-panel.open{transform:none}

/* ─── RESIZE HANDLE ──────────────────────────────────────────────── */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--sf4);border-radius:2px}
</style>
</head>
<body>
<div id="toasts"></div>
<div id="mbg" style="display:none" class="mbg" onclick="if(event.target===this)closeMod()"><div class="mbox" id="mbox"></div></div>
<div id="symDrop" style="display:none" class="drop drop-sym"></div>
<div id="acctDrop" style="display:none" class="drop drop-acct"></div>
<div id="app"></div>
<script>
// ═══════════════════════════════════════════════════════════════════
//  PlutoTrader v2 — Complete Terminal
// ═══════════════════════════════════════════════════════════════════
const BE  = location.hostname==='localhost'?'':'https://pluto-platform-production.up.railway.app';
const WSU = BE.replace('https','wss').replace('http','ws')+'/ws/prices';
let token = localStorage.getItem('pcf_token');

// ── API ─────────────────────────────────────────────────────────────
async function api(path, opts={}) {
  const r = await fetch(BE+path,{...opts,headers:{'Content-Type':'application/json','Authorization':'Bearer '+(token||''),...(opts.headers||{})}});
  const d = await r.json().catch(()=>({}));
  if (r.status===401){logout();return;}
  if (!r.ok) throw new Error(d.error||`Error ${r.status}`);
  return d;
}

// ── Toast ────────────────────────────────────────────────────────────
function toast(msg, type='inf', ms=3000) {
  const el = Object.assign(document.createElement('div'),{className:`ti t-${type}`,textContent:msg});
  document.getElementById('toasts').appendChild(el);
  setTimeout(()=>{el.style.opacity='0';el.style.transition='opacity .25s';setTimeout(()=>el.remove(),250)},ms);
}

// ── Utils ────────────────────────────────────────────────────────────
const F   = (n,d=2)=>'$'+Number(n||0).toLocaleString('en',{minimumFractionDigits:d,maximumFractionDigits:d});
const Fp  = (n,d)=>Number(n||0).toFixed(d||5);
const $   = id=>document.getElementById(id);
const pct = n=>Number(n||0).toFixed(2)+'%';
function elapsed(t){const m=Math.floor((Date.now()-new Date(t))/60000);return m<60?m+'m':Math.floor(m/60)+'h '+m%60+'m'}

// ── State ────────────────────────────────────────────────────────────
let instruments={}, prices={}, accounts=[], account=null;
let positions=[], pendingOrders=[], history=[], priceAlerts=[];
let curSym='EURUSD', curDir='sell', curOT='market', curTF='5m';
let chart=null, candleSeries=null, volSeries=null, candleData=[];
let ws=null, wsOk=false, botTab='positions';
let drawTool=null; // null | 'line' | 'hline' | 'vline' | 'ray' | 'rect' | 'fib' | 'trend'
let drawings=[], drawingInProgress=null;
let showGrid=true;
let slMode='pips', tpMode='pips'; // pips | price | pct
let slEnabled=false, tpEnabled=false, trailEnabled=false;
let refreshT=null, settings={grid:true,sounds:false,mktRng:false,mktRngPips:3};
let journal=[]; // local trade journal entries

// ── Instrument helpers ───────────────────────────────────────────────
function getDigits(sym){ const i=instruments[sym]; if(i?.digits)return i.digits; if(['XAUUSD','XAGUSD'].includes(sym))return 2; if(['US30','NAS100','US500','GER40'].includes(sym))return 1; if(sym?.includes('JPY'))return 3; return 5; }
function getPip(sym){ const i=instruments[sym]; if(i?.pip)return i.pip; if(['US30','NAS100','US500','GER40'].includes(sym))return 1; if(['XAUUSD'].includes(sym))return 0.1; if(sym?.includes('JPY'))return 0.01; return 0.0001; }
function getSpread(sym){ const p=prices[sym]; if(p?.ask&&p?.bid)return +(p.ask-p.bid).toFixed(getDigits(sym)+1); return instruments[sym]?.spread||0; }
function getSpreadPips(sym){ return +(getSpread(sym)/getPip(sym)).toFixed(1); }
function getPipVal(sym,vol){ const i=instruments[sym]; if(i?.pipValue)return i.pipValue*vol; const dg=getDigits(sym); const pip=getPip(sym); return +(pip*vol*10).toFixed(2); }
function calcMargin(sym,vol,dir){ const p=prices[sym]||{}; const px=dir==='buy'?(p.ask||1):(p.bid||1); const i=instruments[sym]; const lev=account?.leverage?.replace('1:','')||30; return +(px*vol*100000/lev).toFixed(2); }

// ── SL/TP conversion ─────────────────────────────────────────────────
function slToPx(val, mode, dir, sym){
  const p=prices[sym]||{}, pip=getPip(sym);
  const entPx=dir==='buy'?(p.ask||0):(p.bid||0);
  if(mode==='price')return +parseFloat(val).toFixed(getDigits(sym));
  if(mode==='pips')return dir==='buy'?+(entPx-val*pip).toFixed(getDigits(sym)):+(entPx+val*pip).toFixed(getDigits(sym));
  if(mode==='pct'){ const bal=account?.current_balance||0; const risk=bal*val/100; const vol=parseFloat($('volInp')?.value||0.01); const pv=getPipVal(sym,vol)||1; const pips=risk/pv; return dir==='buy'?+(entPx-pips*pip).toFixed(getDigits(sym)):+(entPx+pips*pip).toFixed(getDigits(sym)); }
  return null;
}
function tpToPx(val, mode, dir, sym){
  const p=prices[sym]||{}, pip=getPip(sym);
  const entPx=dir==='buy'?(p.ask||0):(p.bid||0);
  if(mode==='price')return +parseFloat(val).toFixed(getDigits(sym));
  if(mode==='pips')return dir==='buy'?+(entPx+val*pip).toFixed(getDigits(sym)):+(entPx-val*pip).toFixed(getDigits(sym));
  return null;
}

// ── Modal ─────────────────────────────────────────────────────────────
function showMod(h){$('mbg').style.display='flex';$('mbox').innerHTML=h}
function closeMod(){$('mbg').style.display='none'}

// ── Dropdowns ─────────────────────────────────────────────────────────
document.addEventListener('click',e=>{
  if(!e.target.closest('#symDrop')&&!e.target.closest('#tbSym')&&
     !e.target.closest('#acctDrop')&&!e.target.closest('#tbAcct'))
    closeAllDrops();
});
function closeAllDrops(){$('symDrop').style.display='none';$('acctDrop').style.display='none';}

// ─────────────────────────────────────────────────────────────────────
// TOPBAR
// ─────────────────────────────────────────────────────────────────────
function renderTopbar(){
  const p=prices[curSym]||{};
  const dg=getDigits(curSym);
  const bid=p.bid||0, ask=p.ask||0;
  const chg=p.change_pct||0;
  const sp=getSpreadPips(curSym);
  const e=$('tbSymInfo');
  if(e)e.innerHTML=`<div style="display:flex;align-items:baseline;gap:5px"><span class="tb-bid">${Fp(bid,dg)}</span><span style="color:var(--t4);font-size:.6rem">/</span><span class="tb-ask">${Fp(ask,dg)}</span><span class="tb-spr" style="margin-left:3px">Spr:${sp}</span><span class="${chg>=0?'up':'dn'} tb-spr" style="margin-left:2px">${chg>=0?'+':''}${Fp(chg,2)}%</span><span class="tb-spr" style="color:var(--t4)">H:${Fp(p.high||0,dg)} L:${Fp(p.low||0,dg)}</span></div>`;
  // Update order panel prices
  const bpEl=$('bidPx'); if(bpEl)bpEl.textContent=Fp(bid,dg);
  const apEl=$('askPx'); if(apEl)apEl.textContent=Fp(ask,dg);
  const sprEl=$('sprInfo'); if(sprEl)sprEl.textContent=`Spread: ${sp} pts  ·  High: ${Fp(p.high||0,dg)}  ·  Low: ${Fp(p.low||0,dg)}`;
  const ds=$('dirSell'); if(ds){ds.querySelector('.dir-px').textContent=Fp(bid,dg);} 
  const db=$('dirBuy');  if(db){db.querySelector('.dir-px').textContent=Fp(ask,dg);}
  updatePlaceBtn();
  updateCalcRow();
  updateAcctBar();
}

function updateAcctBar(){
  if(!account)return;
  const floatPnL=positions.reduce((s,p)=>s+(p.profit||0),0);
  const eq=(account.current_balance||0)+floatPnL;
  const bal=account.current_balance||0;
  const mrgUsed=positions.reduce((s,p)=>s+(calcMargin(p.symbol,p.volume,p.direction)),0);
  const freeMrg=Math.max(0,bal-mrgUsed);
  const mrgLvl=mrgUsed>0?+(eq/mrgUsed*100).toFixed(1):0;
  const ab=$('acctBar');
  if(!ab)return;
  ab.innerHTML=`
<div class="ab-item"><span class="ab-lbl">Balance</span><span class="ab-val">${F(bal)}</span></div>
<div class="ab-item"><span class="ab-lbl">Equity</span><span class="ab-val ${eq>=bal?'ab-profit':'ab-loss'}">${F(eq)}</span></div>
<div class="ab-item"><span class="ab-lbl">P&L</span><span class="ab-val ${floatPnL>=0?'ab-profit':'ab-loss'}">${floatPnL>=0?'+':''}${F(floatPnL)}</span></div>
<div class="ab-item"><span class="ab-lbl">Used Margin</span><span class="ab-val">${F(mrgUsed)}</span></div>
<div class="ab-item"><span class="ab-lbl">Free Margin</span><span class="ab-val">${F(freeMrg)}</span></div>
<div class="ab-item"><span class="ab-lbl">Margin Level</span><span class="ab-val ${mrgLvl>200?'ab-profit':mrgLvl>100?'':'ab-loss'}">${mrgLvl?mrgLvl+'%':'N/A'}</span></div>
${account.profit_target_pct?`<div class="ab-item"><span class="ab-lbl">Target</span><span class="ab-val">${F(account.starting_balance*(1+account.profit_target_pct/100))}</span></div>`:''}
<div class="ab-item"><span class="ab-lbl">Max DD</span><span class="ab-val" style="color:var(--sell)">${F(account.starting_balance*(1-account.max_total_loss_pct/100))}</span></div>
<div style="margin-left:auto;display:flex;align-items:center;gap:6px;padding:0 8px;font-size:.62rem">
  <span class="tb-ws ${wsOk?'on':''}" id="wsIndicator"></span><span style="color:var(--t3)">${wsOk?'Live':'Offline'}</span>
  <span id="abClock" style="font-family:var(--fm);font-size:.62rem;color:var(--t3)"></span>
</div>`;
}

// ─────────────────────────────────────────────────────────────────────
// MARKET WATCH
// ─────────────────────────────────────────────────────────────────────
function renderMW(filter=''){
  const inst=instruments;
  const groups={};
  Object.entries(inst).forEach(([sym,info])=>{
    if(filter&&!sym.toLowerCase().includes(filter.toLowerCase())&&!(info.name||'').toLowerCase().includes(filter.toLowerCase()))return;
    const g=info.type||'forex';
    if(!groups[g])groups[g]=[];
    groups[g].push({sym,...info});
  });
  const order=['forex','metals','indices','energies','crypto'];
  const labels={forex:'Forex',metals:'Metals',indices:'Indices',energies:'Energy',crypto:'Crypto'};
  let html='';
  order.forEach(g=>{
    if(!groups[g]?.length)return;
    html+=`<div class="mw-grp">${labels[g]||g}</div>`;
    groups[g].forEach(({sym,name})=>{
      const p=prices[sym]||{}, dg=getDigits(sym), chg=p.change_pct||0;
      html+=`<div class="mw-row ${sym===curSym?'act':''}" id="mwr-${sym}" onclick="selectSym('${sym}')">
<div><div class="mw-sym">${sym}</div><div class="mw-name">${name||''}</div></div>
<div style="text-align:right"><div class="mw-bid" id="mwb-${sym}">${Fp(p.bid||0,dg)}</div><div class="mw-ask" id="mwa-${sym}">${Fp(p.ask||0,dg)}</div></div>
<div style="text-align:right"><div class="mw-chg ${chg>=0?'up':'dn'}" id="mwc-${sym}">${chg>=0?'+':''}${Fp(chg,2)}%</div></div>
<div class="mw-qt"><button class="qs" onclick="event.stopPropagation();quickTrade('${sym}','sell')">S</button><button class="qb" onclick="event.stopPropagation();quickTrade('${sym}','buy')">B</button></div>
</div>`;
    });
  });
  const el=$('mwList');if(el)el.innerHTML=html||'<div class="empty-bot">No results</div>';
}

function updateMWRow(sym,p){
  const prev=prices[sym]||{};
  prices[sym]={...prices[sym],...p};
  const dg=getDigits(sym);
  const b=$('mwb-'+sym),a=$('mwa-'+sym),c=$('mwc-'+sym),row=$('mwr-'+sym);
  if(b)b.textContent=Fp(p.bid||prices[sym].bid||0,dg);
  if(a)a.textContent=Fp(p.ask||prices[sym].ask||0,dg);
  if(c){const chg=p.change_pct||prices[sym].change_pct||0;c.textContent=(chg>=0?'+':'')+Fp(chg,2)+'%';c.className='mw-chg '+(chg>=0?'up':'dn');}
  if(row&&prev.bid){const dir=(p.bid||0)>(prev.bid||0)?'up':'dn';row.classList.add('flash-'+dir);setTimeout(()=>row.classList.remove('flash-up','flash-dn'),310);}
}

async function quickTrade(sym,dir){
  if(sym!==curSym)selectSym(sym);
  curDir=dir;
  // Use default vol 0.01
  const vol=parseFloat($('volInp')?.value)||0.01;
  const isFunded=account?.challenge_type==='funded';
  const body={symbol:sym,direction:dir,volume:vol,...(isFunded?{funded_account_id:account.id}:{challenge_id:account.id})};
  try{
    await api('/api/trading/order',{method:'POST',body:JSON.stringify(body)});
    toast(`${dir.toUpperCase()} ${vol} ${sym} placed`,'ok');
    await loadPositions();renderBotPanel();renderTopbar();
  }catch(e){toast(e.message,'err');}
}

function selectSym(sym){
  curSym=sym;
  closeAllDrops();
  document.querySelectorAll('.mw-row').forEach(r=>r.classList.remove('act'));
  const ar=$('mwr-'+sym);if(ar)ar.classList.add('act');
  const tsEl=$('tbSymName');if(tsEl)tsEl.textContent=sym;
  renderTopbar();
  updateOPHeader();
  loadCandles();
  reDrawCanvas();
}

// ─────────────────────────────────────────────────────────────────────
// CHART + DRAWING TOOLS
// ─────────────────────────────────────────────────────────────────────
const TF_MAP={'1m':'1min','3m':'3min','5m':'5min','15m':'15min','30m':'30min','1h':'1h','4h':'4h','1d':'1day','1w':'1week'};

function initChart(){
  const container=$('lwChart');
  if(!container)return;
  chart=LightweightCharts.createChart(container,{
    layout:{background:{type:LightweightCharts.ColorType.Solid,color:'#08070f'},textColor:'#5a5672'},
    grid:{vertLines:{color:showGrid?'rgba(255,255,255,.03)':'transparent'},horzLines:{color:showGrid?'rgba(255,255,255,.03)':'transparent'}},
    crosshair:{mode:LightweightCharts.CrosshairMode.Normal,vertLine:{color:'rgba(255,255,255,.2)'},horzLine:{color:'rgba(255,255,255,.2)'}},
    rightPriceScale:{borderColor:'rgba(255,255,255,.055)',textColor:'#5a5672'},
    timeScale:{borderColor:'rgba(255,255,255,.055)',timeVisible:true,secondsVisible:false},
    width:container.offsetWidth,height:container.offsetHeight,
  });
  candleSeries=chart.addCandlestickSeries({upColor:'#00c896',downColor:'#ff3b5c',borderUpColor:'#00c896',borderDownColor:'#ff3b5c',wickUpColor:'#00c896',wickDownColor:'#ff3b5c'});
  volSeries=chart.addHistogramSeries({color:'rgba(124,58,237,.25)',priceFormat:{type:'volume'},priceScaleId:'vol',scaleMargins:{top:.8,bottom:0}});
  chart.priceScale('vol').applyOptions({scaleMargins:{top:.8,bottom:0}});
  chart.subscribeCrosshairMove(param=>{
    if(!param.seriesData)return;
    const d=param.seriesData.get(candleSeries);
    if(!d)return;
    const el=$('ohlcInfo');
    if(el)el.innerHTML=`<span class="ohlc-o">O:${d.open}</span> <span class="ohlc-h">H:${d.high}</span> <span class="ohlc-l">L:${d.low}</span> <span class="ohlc-c">C:${d.close}</span>`;
  });
  const ro=new ResizeObserver(()=>{if(chart)chart.resize(container.offsetWidth,container.offsetHeight);});
  ro.observe(container);
  initDrawCanvas();
}

function toggleGrid(){
  showGrid=!showGrid;
  if(chart)chart.applyOptions({grid:{vertLines:{color:showGrid?'rgba(255,255,255,.03)':'transparent'},horzLines:{color:showGrid?'rgba(255,255,255,.03)':'transparent'}}});
  const btn=$('gridBtn');if(btn)btn.classList.toggle('act',showGrid);
}

async function loadCandles(){
  if(!chart)return;
  const tf=TF_MAP[curTF]||'5min';
  try{
    const data=await api(`/api/trading/candles?symbol=${curSym}&timeframe=${tf}&count=300`);
    if(!data?.length){$('noData')&&($('noData').style.display='flex');return;}
    $('noData')&&($('noData').style.display='none');
    candleData=data.map(c=>({time:Math.floor(new Date(c.time||c.t).getTime()/1000),open:+c.open,high:+c.high,low:+c.low,close:+c.close,volume:+c.volume||0})).sort((a,b)=>a.time-b.time);
    candleSeries.setData(candleData);
    volSeries.setData(candleData.map(c=>({time:c.time,value:c.volume||0,color:c.close>=c.open?'rgba(0,200,150,.2)':'rgba(255,59,92,.2)'})));
    chart.timeScale().fitContent();
    reDrawCanvas();
    renderPositionLines();
  }catch(e){console.warn('Candles:',e.message);}
}

function appendTick(sym,p){
  if(sym!==curSym||!candleSeries)return;
  const ms={'1min':60,'3min':180,'5min':300,'15min':900,'30min':1800,'1h':3600,'4h':14400,'1day':86400};
  const sec=ms[TF_MAP[curTF]]||300;
  const now=Math.floor(Date.now()/1000);
  const barT=now-(now%sec);
  const mid=(p.bid+p.ask)/2;
  const last=candleData[candleData.length-1];
  if(last&&last.time===barT){last.close=mid;last.high=Math.max(last.high,mid);last.low=Math.min(last.low,mid);candleSeries.update(last);volSeries.update({time:barT,value:(last.volume||0)+1,color:last.close>=last.open?'rgba(0,200,150,.2)':'rgba(255,59,92,.2)'});}
  else if(last&&barT>last.time){const nb={time:barT,open:mid,high:mid,low:mid,close:mid,volume:1};candleData.push(nb);if(candleData.length>500)candleData.shift();candleSeries.update(nb);volSeries.update({time:barT,value:1,color:'rgba(124,58,237,.2)'});}
}

function switchTF(tf){
  curTF=tf;
  document.querySelectorAll('.tf-btn').forEach(b=>{b.classList.toggle('act',b.dataset.tf===tf)});
  loadCandles();
}

function renderPositionLines(){
  if(!candleSeries)return;
  positions.filter(p=>p.symbol===curSym).forEach(p=>{
    try{
      chart.addPriceLine({price:p.open_price,color:'rgba(162,118,250,.6)',lineWidth:1,lineStyle:2,axisLabelVisible:true,title:`${p.direction.toUpperCase()} ${p.volume}`});
      if(p.stop_loss)chart.addPriceLine({price:p.stop_loss,color:'rgba(255,59,92,.6)',lineWidth:1,lineStyle:1,axisLabelVisible:true,title:'SL'});
      if(p.take_profit)chart.addPriceLine({price:p.take_profit,color:'rgba(0,200,150,.6)',lineWidth:1,lineStyle:1,axisLabelVisible:true,title:'TP'});
    }catch(_){}
  });
}

// ─── DRAWING CANVAS ───────────────────────────────────────────────────
function initDrawCanvas(){
  const canvas=$('drawCanvas');
  if(!canvas)return;
  canvas.addEventListener('mousedown',e=>{
    if(!drawTool)return;
    const rect=canvas.getBoundingClientRect();
    const x=e.clientX-rect.left,y=e.clientY-rect.top;
    if(drawTool==='hline'){
      const price=chart.priceScale('right').coordinateToPrice(y);
      drawings.push({type:'hline',price,color:'#a78bfa',width:1,sym:curSym});
      setDrawTool(null);reDrawCanvas();
    } else if(drawTool==='vline'){
      const price=chart.priceScale('right').coordinateToPrice(y);
      drawings.push({type:'vline',x,color:'#60a5fa',width:1,sym:curSym});
      setDrawTool(null);reDrawCanvas();
    } else {
      drawingInProgress={type:drawTool,x1:x,y1:y,x2:x,y2:y,sym:curSym};
    }
  });
  canvas.addEventListener('mousemove',e=>{
    if(!drawingInProgress)return;
    const rect=canvas.getBoundingClientRect();
    drawingInProgress.x2=e.clientX-rect.left;
    drawingInProgress.y2=e.clientY-rect.top;
    reDrawCanvas();
  });
  canvas.addEventListener('mouseup',e=>{
    if(!drawingInProgress)return;
    const rect=canvas.getBoundingClientRect();
    drawingInProgress.x2=e.clientX-rect.left;
    drawingInProgress.y2=e.clientY-rect.top;
    if(drawTool==='fib'){
      const p1=chart.priceScale('right').coordinateToPrice(drawingInProgress.y1);
      const p2=chart.priceScale('right').coordinateToPrice(drawingInProgress.y2);
      drawings.push({type:'fib',p1,p2,sym:curSym,color:'#fbbf24',width:1});
    } else if(drawTool==='trend'||drawTool==='line'){
      drawings.push({...drawingInProgress,color:'#a78bfa',width:1.5});
    } else if(drawTool==='rect'){
      drawings.push({...drawingInProgress,color:'rgba(162,118,250,.15)',borderColor:'#a78bfa',width:1});
    }
    drawingInProgress=null;
    setDrawTool(null);reDrawCanvas();
  });
}

function reDrawCanvas(){
  const canvas=$('drawCanvas');
  if(!canvas||!chart)return;
  const ctx=canvas.getContext('2d');
  const W=canvas.width=canvas.offsetWidth;
  const H=canvas.height=canvas.offsetHeight;
  ctx.clearRect(0,0,W,H);
  const allDrawings=[...drawings,...(drawingInProgress?[drawingInProgress]:[])];
  allDrawings.filter(d=>d.sym===curSym).forEach(d=>{
    ctx.save();
    if(d.type==='hline'){
      const y=chart.priceScale('right').priceToCoordinate(d.price);
      if(y===null)return ctx.restore();
      ctx.strokeStyle=d.color||'#a78bfa';ctx.lineWidth=d.width||1;ctx.setLineDash([6,3]);
      ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();
      ctx.setLineDash([]);ctx.fillStyle=d.color||'#a78bfa';ctx.font='10px JetBrains Mono';
      ctx.fillText(d.price?.toFixed(5)||'',W-70,y-3);
    } else if(d.type==='vline'){
      ctx.strokeStyle=d.color||'#60a5fa';ctx.lineWidth=d.width||1;ctx.setLineDash([4,3]);
      ctx.beginPath();ctx.moveTo(d.x,0);ctx.lineTo(d.x,H);ctx.stroke();ctx.setLineDash([]);
    } else if(d.type==='trend'||d.type==='line'){
      ctx.strokeStyle=d.color||'#a78bfa';ctx.lineWidth=d.width||1.5;
      ctx.beginPath();ctx.moveTo(d.x1,d.y1);ctx.lineTo(d.x2,d.y2);ctx.stroke();
      // extend as ray if ray type
      if(d.type==='ray'){const dx=d.x2-d.x1,dy=d.y2-d.y1,len=Math.sqrt(dx*dx+dy*dy)||1,scale=W*2/len;ctx.setLineDash([4,3]);ctx.beginPath();ctx.moveTo(d.x2,d.y2);ctx.lineTo(d.x2+dx*scale,d.y2+dy*scale);ctx.stroke();ctx.setLineDash([]);}
    } else if(d.type==='rect'){
      const x=Math.min(d.x1,d.x2),y=Math.min(d.y1,d.y2),w=Math.abs(d.x2-d.x1),h=Math.abs(d.y2-d.y1);
      ctx.fillStyle=d.color||'rgba(162,118,250,.1)';ctx.fillRect(x,y,w,h);
      ctx.strokeStyle=d.borderColor||'#a78bfa';ctx.lineWidth=1;ctx.strokeRect(x,y,w,h);
    } else if(d.type==='fib'){
      const fibs=[0,0.236,0.382,0.5,0.618,0.786,1];
      const colors=['#ff3b5c','#f59e0b','#60a5fa','#a78bfa','#00c896','#f59e0b','#ff3b5c'];
      const p1=d.p1||0,p2=d.p2||0;
      fibs.forEach((f,i)=>{
        const price=p2+(p1-p2)*f;
        const y=chart.priceScale('right').priceToCoordinate(price);
        if(y===null)return;
        ctx.strokeStyle=colors[i%colors.length];ctx.lineWidth=1;ctx.setLineDash([4,3]);ctx.globalAlpha=.7;
        ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();
        ctx.setLineDash([]);ctx.globalAlpha=1;ctx.fillStyle=colors[i%colors.length];ctx.font='9px JetBrains Mono';
        ctx.fillText(`${(f*100).toFixed(1)}% ${price.toFixed(5)}`,4,y-2);
      });
    }
    ctx.restore();
  });
}

function setDrawTool(tool){
  drawTool=tool;
  document.querySelectorAll('.dt-btn').forEach(b=>b.classList.toggle('act',b.dataset.tool===tool));
  const canvas=$('drawCanvas');

function updateCalcRow(){
  const vol=parseFloat($('volInp')?.value)||0.01;
  const mrg=calcMargin(curSym,vol,curDir);
  const pv=getPipVal(curSym,vol);
  const mEl=$('estMargin');if(mEl)mEl.textContent=F(mrg);
  const pEl=$('pipVal');if(pEl)pEl.textContent='$'+pv.toFixed(2);
  // RR calc
  const sl=parseFloat($('slInp')?.value)||0;
  const tp=parseFloat($('tpInp')?.value)||0;
  let risk=0,reward=0;
  if(slEnabled&&sl){const pips=sl;risk=+(pips*pv*getPip(curSym)).toFixed(2)||+(sl*pv).toFixed(2);}
  if(tpEnabled&&tp){const pips=tp;reward=+(pips*pv*getPip(curSym)).toFixed(2)||+(tp*pv).toFixed(2);}
  const rr=risk>0&&reward>0?+(reward/risk).toFixed(2):0;
  const rrEl=$('rrVal');if(rrEl)rrEl.textContent=rr?'1:'+rr:'—';
  const rrCol=rr>=2?'var(--buy)':rr>=1?'var(--am)':'var(--t3)';
  if(rrEl)rrEl.style.color=rrCol;
}

async function placeOrder(){
  if(!account)return toast('Select an account first','err');
  const vol=parseFloat($('volInp')?.value)||0;
  if(!vol||vol<0.01)return toast('Min volume 0.01 lots','err');
  const p=prices[curSym]||{};
  if(!p.bid||!p.ask)return toast('No price for '+curSym,'err');
  const sl=slEnabled&&parseFloat($('slInp')?.value)?slToPx(parseFloat($('slInp').value),slMode,curDir,curSym):null;
  const tp=tpEnabled&&parseFloat($('tpInp')?.value)?tpToPx(parseFloat($('tpInp').value),tpMode,curDir,curSym):null;
  const trail=trailEnabled&&parseFloat($('trailInp')?.value)?parseFloat($('trailInp').value):0;
  const comment=$('cmtInp')?.value||null;
  const isFunded=account.challenge_type==='funded';
  const base={symbol:curSym,direction:curDir,volume:vol,stop_loss:sl,take_profit:tp,trailing_stop_pips:trail,comment,...(isFunded?{funded_account_id:account.id}:{challenge_id:account.id})};
  const btn=$('placeBtn');btn.disabled=true;btn.textContent='Placing…';
  try{
    if(curOT==='market'){
      await api('/api/trading/order',{method:'POST',body:JSON.stringify(base)});
      toast(`${curDir.toUpperCase()} ${vol} ${curSym} placed`,'ok');
    } else {
      const ep=parseFloat($('entPxInp')?.value)||0;
      if(!ep)return toast('Enter entry price','err');
      const expiry=$('expiryInp')?.value||null;
      await api('/api/trading/pending-order',{method:'POST',body:JSON.stringify({...base,order_type:curOT,entry_price:ep,expiry})});
      toast(`${curOT.toUpperCase()} order: ${curDir.toUpperCase()} ${vol} ${curSym} @ ${ep}`,'inf');
    }
    if($('slInp'))$('slInp').value='';
    if($('tpInp'))$('tpInp').value='';
    await loadPositions();await loadPendingOrders();
    renderBotPanel();renderTopbar();renderPositionLines();
  }catch(e){toast(e.message,'err');}
  finally{updatePlaceBtn();}
}

function saveAlert(){
  const sym=$('alSym')?.value;const cond=$('alCond')?.value;const price=parseFloat($('alPx')?.value);const note=$('alNote')?.value||'';
  if(!sym||!cond||!price)return toast('Fill all fields','err');
  priceAlerts.push({sym,cond,price,note,active:true});
  toast(`Alert set: ${sym} ${cond} ${price}`,'ok');closeMod();
  if(botTab==='alerts')renderBotPanel();
}
function removeAlert(i){priceAlerts.splice(i,1);renderBotPanel();}
function checkAlerts(){
  priceAlerts.forEach(a=>{
    if(!a.active)return;
    const p=prices[a.sym];if(!p)return;
    const cur=(p.bid+p.ask)/2;
    if((a.cond==='above'&&cur>=a.price)||(a.cond==='below'&&cur<=a.price)){
      toast(`🔔 Alert: ${a.sym} ${a.cond==='above'?'≥':'≤'} ${a.price}`,'warn',6000);
      a.active=false;
    }
  });
}

// ─── Live P&L update ──────────────────────────────────────────────────
function livePnLUpdate(){
  positions.forEach(p=>{
    const el=$('pnl-'+p.id);if(!el)return;
    const px=prices[p.symbol];if(!px)return;
    const cur=p.direction==='buy'?px.bid:px.ask;
    const diff=p.direction==='buy'?cur-p.open_price:p.open_price-cur;
    const pnl=+(diff/getPip(p.symbol)*getPipVal(p.symbol,p.volume)*getPip(p.symbol)).toFixed(2);
    p.profit=pnl;
    el.textContent=(pnl>=0?'+':'')+F(pnl);
    el.style.color=pnl>=0?'var(--buy)':'var(--sell)';
  });
  updateAcctBar();
}

// ─────────────────────────────────────────────────────────────────────
let wsRecon=null;
function connectWS(){
  if(ws)try{ws.close()}catch(_){}
  ws=new WebSocket(WSU);
  ws.onopen=()=>{wsOk=true;const el=$('wsIndicator');if(el)el.className='tb-ws on';clearTimeout(wsRecon);};
  ws.onmessage=e=>{
    try{
      const msg=JSON.parse(e.data);
      if(msg.type==='prices'&&msg.data){
        Object.entries(msg.data).forEach(([sym,p])=>{
          updateMWRow(sym,p);
          appendTick(sym,p);
          if(sym===curSym)renderTopbar();
        });
        livePnLUpdate();
        checkAlerts();
      }
    }catch(_){}
  };
  ws.onclose=()=>{wsOk=false;const el=$('wsIndicator');if(el)el.className='tb-ws';wsRecon=setTimeout(connectWS,3000);};
  ws.onerror=()=>ws.close();
}

function showAcctDrop(e){
  e.stopPropagation();
  const dd=$('acctDrop');
  const rect=e.currentTarget.getBoundingClientRect();
  dd.style.top=(rect.bottom+4)+'px';
  dd.style.right=(window.innerWidth-rect.right)+'px';
  dd.style.left='auto';
  let html='';
  if(!accounts.length){html='<div style="padding:14px;font-size:.74rem;color:var(--t3);text-align:center">No active accounts<br><a href="/" style="color:var(--ac2)">Buy challenge →</a></div>';}
  else accounts.forEach(a=>{
    const floatPnL=positions.filter(p=>(p.challenge_id||p.funded_account_id)===a.id).reduce((s,p)=>s+(p.profit||0),0);
    const eq=(a.current_balance||0)+floatPnL;
    html+=`<div class="da-row ${a.id===account?.id?'act':''}" onclick="switchAcct('${a.id}')">
<div style="display:flex;justify-content:space-between;align-items:center">
  <div style="font-size:.75rem;font-weight:700">${F(a.account_size)} ${a.challenge_type==='funded'?'Funded':a.challenge_type==='two_step'?'2-Step':'1-Step'}</div>
  ${a.id===account?.id?`<span style="font-size:.6rem;color:var(--ac2);font-weight:700">● Active</span>`:''}
</div>
<div style="font-size:.65rem;color:var(--t3);margin-top:2px">${a.id.slice(0,8)} · ${a.status}</div>
<div style="display:flex;gap:10px;margin-top:4px;font-size:.62rem;font-family:var(--fm)">
  <span style="color:var(--t2)">Bal: <span style="color:var(--t1)">${F(a.current_balance)}</span></span>

</div></div>`;

  dd.innerHTML=html;dd.style.display='block';
}

async function switchAcct(id){
  closeAllDrops();
  const a=accounts.find(x=>x.id===id);if(!a)return;
  account=a;localStorage.setItem('pluto_last_account',id);
  updateOPHeader();updateAcctBar();

function showSymDrop(e){
  e.stopPropagation();
  const dd=$('symDrop');
  const rect=e.currentTarget.getBoundingClientRect();
  dd.style.top=(rect.bottom+4)+'px';dd.style.left=rect.left+'px';
  renderSymDrop('');dd.style.display='block';
  setTimeout(()=>dd.querySelector('.ds-si')?.focus(),30);
}
function renderSymDrop(q){
  const order=['forex','metals','indices','energies','crypto'];
  const labels={forex:'Forex',metals:'Metals',indices:'Indices',energies:'Energy',crypto:'Crypto'};
  const groups={};
  Object.entries(instruments).filter(([s,i])=>!q||s.toLowerCase().includes(q)||i.name?.toLowerCase().includes(q)).forEach(([s,i])=>{
    const g=i.type||'forex';if(!groups[g])groups[g]=[];groups[g].push([s,i]);
  });
  let html=`<div class="ds-search"><span style="color:var(--t3);font-size:.75rem">⌕</span><input class="ds-si" placeholder="Search symbol…" oninput="renderSymDrop(this.value.toLowerCase())" value="${q}"></div>`;
  order.forEach(g=>{
    if(!groups[g]?.length)return;
    html+=`<div class="ds-grp">${labels[g]||g}</div>`;
    groups[g].forEach(([s,i])=>{
      const p=prices[s]||{};const dg=getDigits(s);
      html+=`<div class="ds-row ${s===curSym?'act':''}" onclick="selectSym('${s}');$('symDrop').style.display='none'">
<div><div style="font-size:.74rem;font-weight:700">${s}</div><div style="font-size:.58rem;color:var(--t3)">${i.name||''}</div></div>
<div style="text-align:right"><div style="font-size:.7rem;font-family:var(--fm)">${Fp(p.bid||0,dg)}</div><div style="font-size:.6rem;color:var(--t3)">ASK ${Fp(p.ask||0,dg)}</div></div>
<div style="text-align:right"><div style="font-size:.62rem;font-family:var(--fm);color:${(p.change_pct||0)>=0?'var(--buy)':'var(--sell)'}">${(p.change_pct||0)>=0?'+':''}${Fp(p.change_pct||0,2)}%</div><div style="font-size:.58rem;color:var(--t3)">${getSpreadPips(s)} pts</div></div>
</div>`;
    });
  });
  $('symDrop').innerHTML=html;
}

            ${['pips','price'].map(m=>`<span class="sltp-mode ${tpMode===m?'act':''}" data-m="${m}" onclick="setTPMode('${m}')">${m}</span>`).join('')}
          </div>
        </div>
        <div class="sltp-row">
          <div class="sltp-field"><span class="sltp-fl" id="tpPipsLbl">${tpMode==='pips'?'Pips':'Price'}</span><input type="number" id="tpInp" class="sltp-inp" placeholder="0" step="1" oninput="updateCalcRow()" ${!tpEnabled?'disabled':''}></div>
          <div class="sltp-field"><span class="sltp-fl">R:R</span><span class="sltp-inp" id="rrVal" style="display:flex;align-items:center;font-family:var(--fm);font-size:.72rem;color:var(--t3)">—</span></div>
          <div class="sltp-field"><span class="sltp-fl">Est. Profit</span><input type="text" class="sltp-inp" id="tpProfEst" readonly placeholder="$0.00" style="color:var(--buy)"></div>
        </div>
      </div>

      <!-- Trailing stop -->
      <div class="tgl-row">
        <span class="tgl-lbl">Trailing Stop</span>
        <label class="tgl"><input type="checkbox" id="trailChk" onchange="toggleTrail(this.checked)"><span class="tgl-s"></span></label>
      </div>
      <div id="trailRow" style="display:none" class="fl">
        <span class="fl-lbl">Trail Distance (pips)</span>
        <input type="number" id="trailInp" class="fl-inp" value="10" step="1" min="1">
      </div>

      <!-- Expiry row (pending only) -->
      <div id="expiryRow" style="display:none" class="fl">
        <span class="fl-lbl">Expiry (optional)</span>
        <input type="datetime-local" id="expiryInp" class="fl-inp">
      </div>

      <!-- Comment -->
      <div class="fl">
        <span class="fl-lbl">Comment</span>
        <input type="text" id="cmtInp" class="fl-inp" placeholder="Note…" maxlength="50">
      </div>

      <!-- Calc row -->
      <div class="calc-row">
        <span class="cr-lbl">Est. Margin</span><span class="cr-val" id="estMargin">—</span>
        <span class="cr-lbl" style="margin-left:8px">Pip Value</span><span class="cr-val" id="pipVal">—</span>
      </div>

      <!-- Market closed -->
      <div class="mkt-closed" id="mktClosed" style="display:none">
        🔴 Market closed<br><span style="font-size:.64rem;opacity:.8">Pending orders accepted</span>
      </div>

      <button id="placeBtn" class="place-btn place-buy" onclick="placeOrder()" disabled>Loading…</button>
    </div>
  </div>
</div>

<!-- BOTTOM PANEL -->
<div class="bot-area">
  <div class="bot-tabs">
    <div class="bot-tab act" data-bt="positions" onclick="setBotTab('positions')">Positions <span class="bot-cnt red" id="posCount">0</span></div>
    <div class="bot-tab" data-bt="orders" onclick="setBotTab('orders')">Orders <span class="bot-cnt" id="ordCount">0</span></div>
    <div class="bot-tab" data-bt="history" onclick="setBotTab('history')">History <span class="bot-cnt" id="histCount">0</span></div>
    <div class="bot-tab" data-bt="alerts" onclick="setBotTab('alerts')">🔔 Alerts</div>
    <div class="bot-tab" data-bt="journal" onclick="setBotTab('journal')">📓 Journal</div>
  </div>
  <div id="botSummary" class="bot-summary"></div>
  <div id="botBody" class="bot-body"><div class="empty-bot">Loading…</div></div>
</div>

<!-- ACCOUNT BAR -->
<div class="acct-bar" id="acctBar"></div>`;

  // Init chart after render
  setTimeout(()=>{
    initChart();
    renderMW();
    updateOPHeader();
    updateCalcRow();
    selectSym(curSym);
    updateAcctDisplay();
    loadHistory().then(()=>renderBotPanel());
    refreshLoop();
  }, 60);
}

function updateAcctDisplay(){
  if(!account)return;
  const el=$('tbAcct');
  if(el)el.innerHTML=`<div style="text-align:right">
<div style="font-size:.65rem;font-weight:700">${F(account.account_size)} ${account.challenge_type==='funded'?'Funded':account.challenge_type==='two_step'?'2-Step':'1-Step'}</div>
<div style="font-size:.6rem;color:var(--t3)">${F(account.current_balance)}</div></div><span style="color:var(--t3);font-size:.6rem">▾</span>`;
  updateAcctBar();
}

// ─────────────────────────────────────────────────────────────────────
// LOGIN
// ─────────────────────────────────────────────────────────────────────
function showLogin(){
  $('app').innerHTML=`<div class="lp"><div class="lc">
<div style="display:flex;align-items:center;gap:10px;margin-bottom:22px">
  <div class="tb-logo-dot" style="width:40px;height:40px;font-size:16px">P</div>
  <div><div style="font-size:.95rem;font-weight:800">PlutoTrader</div><div style="font-size:.7rem;color:var(--t2)">Professional Trading Terminal</div></div>
</div>
<div class="le" id="lErr"></div>
<div style="margin-bottom:9px"><label style="display:block;font-size:.57rem;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.09em;margin-bottom:3px">Email</label><input type="email" id="lEm" class="fl-inp" placeholder="your@email.com" autofocus></div>
<div style="margin-bottom:16px"><label style="display:block;font-size:.57rem;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.09em;margin-bottom:3px">Password</label><input type="password" id="lPw" class="fl-inp" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"></div>
<button class="lb" onclick="doLogin()">Launch Terminal</button>
<div style="text-align:center;margin-top:12px;font-size:.7rem;color:var(--t3)">No account? <a href="/" style="color:var(--ac2)">Get Funded →</a></div>
</div></div>`;
}

async function doLogin(){
  const em=$('lEm')?.value.trim(),pw=$('lPw')?.value;
  const err=$('lErr');
  if(!em||!pw){err.style.display='block';err.textContent='Enter email and password';return;}
  const btn=document.querySelector('.lb');btn.textContent='Connecting…';btn.disabled=true;
  try{
    const r=await fetch(BE+'/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:em,password:pw})});
    const d=await r.json();
    if(!r.ok)throw new Error(d.error||'Login failed');
    localStorage.setItem('pcf_token',d.token);localStorage.setItem('pcf_user',JSON.stringify(d.user));
    token=d.token;boot();
  }catch(e){err.style.display='block';err.textContent=e.message;btn.textContent='Launch Terminal';btn.disabled=false;}
}

// ─────────────────────────────────────────────────────────────────────
// BOOT
// ─────────────────────────────────────────────────────────────────────
async function boot(){
  if(!token){showLogin();return;}
  try{
    const[instList,acctList]=await Promise.all([api('/api/trading/instruments'),api('/api/trading/accounts')]);
    instList.forEach(i=>{instruments[i.symbol]=i;prices[i.symbol]={bid:i.last_price||0,ask:(i.last_price||0)+(i.spread||0),change_pct:0,high:i.last_price||0,low:i.last_price||0};});
    accounts=acctList.filter(a=>a.status==='active'||a.challenge_type==='funded');
    const lastId=localStorage.getItem('pluto_last_account');
    account=accounts.find(a=>a.id===lastId)||accounts[0]||null;
    renderApp();
    connectWS();
    setInterval(updateClock,1000);
    setInterval(()=>{const d=new Date(),day=d.getUTCDay(),h=d.getUTCHours();const open=!(day===6||(day===0&&h<22)||(day===5&&h>=22));const dot=$('mktDotTb');if(dot)dot.className='tb-ws '+(open?'on':'');updatePlaceBtn();},30000);
    updateClock();
  }catch(e){
    if(e.message?.includes('401')){localStorage.removeItem('pcf_token');showLogin();}
    else{$('app').innerHTML=`<div class="lp"><div class="lc"><div style="color:var(--sell);margin-bottom:12px">⚠ ${e.message}</div><button class="lb" onclick="boot()">Retry</button></div></div>`;}
  }
}

boot();
</script>

</html>
