<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="pl" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9333ea"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <linearGradient id="ri" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0"/>
      <stop offset="40%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="cp"><circle cx="16" cy="16" r="10"/></clipPath>
  </defs>
  <!-- Planet body -->
  <circle cx="16" cy="16" r="10" fill="url(#pl)"/>
  <!-- Surface detail -->
  <g clip-path="url(#cp)" opacity=".25">
    <circle cx="12" cy="13" r="3.5" fill="#fff"/>
    <circle cx="20" cy="18" r="2" fill="#fff"/>
    <circle cx="14" cy="20" r="1.5" fill="#fff"/>
  </g>
  <!-- Light edge -->
  <circle cx="16" cy="16" r="10" fill="none" stroke="rgba(255,255,255,.15)" stroke-width=".5"/>
  <!-- Ring -->
  <ellipse cx="16" cy="16" rx="15" ry="4" fill="none" stroke="url(#ri)" stroke-width="1.5" transform="rotate(-20,16,16)"/>
</svg>
