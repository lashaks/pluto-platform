<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PlutoAdmin — Broker Dashboard</title>
<link rel="icon" type="image/svg+xml" href="/img/favicon.svg?v=44">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#06050a;--bg2:#0b0a12;--sf:#0f0e18;--sf2:#141320;--sf3:#1a1828;
  --brd:rgba(255,255,255,.055);--brd2:rgba(255,255,255,.09);
  --ac:#8b5cf6;--ac2:#a78bfa;--ac3:#7c3aed;
  --ac-bg:rgba(139,92,246,.08);--ac-gl:rgba(139,92,246,.22);
  --gr:#34d399;--gr2:#10b981;--gr-bg:rgba(52,211,153,.08);
  --rd:#f87171;--rd2:#ef4444;--rd-bg:rgba(248,113,113,.08);
  --am:#fbbf24;--am-bg:rgba(251,191,36,.08);
  --bl:#60a5fa;--bl-bg:rgba(96,165,250,.08);
  --t1:#eeedf4;--t2:#8b87a0;--t3:#5a5672;--t4:#3d3955;
  --ff:'Manrope',sans-serif;--fm:'JetBrains Mono',monospace;
  --r:6px;--r2:10px;--r3:14px;
}
html,body{height:100%;background:var(--bg);color:var(--t1);font-family:var(--ff);font-size:13px;-webkit-font-smoothing:antialiased;overflow:hidden}

/* ── Layout ── */
.layout{display:grid;grid-template-columns:220px 1fr;grid-template-rows:48px 1fr;height:100vh}
.topbar{grid-column:1/-1;display:flex;align-items:center;background:var(--sf);border-bottom:1px solid var(--brd);z-index:10;padding:0 16px;gap:12px}
.sidebar{grid-row:2;background:var(--sf2);border-right:1px solid var(--brd);overflow-y:auto;padding:8px 0}
.main{grid-row:2;overflow-y:auto;padding:24px}

/* ── Topbar ── */
.tb-logo{display:flex;align-items:center;gap:8px;margin-right:16px;padding-right:16px;border-right:1px solid var(--brd)}
.tb-logo img{width:22px;height:22px}
.tb-logo-text{font-size:.78rem;font-weight:800;letter-spacing:-.01em}
.tb-logo-text em{color:var(--ac2);font-style:normal}
.tb-badge{padding:3px 9px;border-radius:20px;font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em}
.tb-badge.admin{background:var(--rd-bg);color:var(--rd);border:1px solid rgba(248,113,113,.2)}
.tb-mkt{margin-left:auto;display:flex;align-items:center;gap:6px;font-size:.68rem;font-weight:700}
.tb-mkt .dot{width:7px;height:7px;border-radius:50%}
.tb-mkt .dot.open{background:var(--gr);box-shadow:0 0 6px rgba(52,211,153,.5)}
.tb-mkt .dot.closed{background:var(--rd)}
.tb-time{font-family:var(--fm);font-size:.7rem;color:var(--t3);margin-left:8px}
.tb-back{display:flex;align-items:center;gap:6px;padding:6px 12px;background:var(--ac-bg);border:1px solid var(--ac-gl);border-radius:var(--r);color:var(--ac2);font-size:.72rem;font-weight:700;text-decoration:none;margin-left:12px;transition:all .15s}
.tb-back:hover{background:var(--ac);color:#fff}

/* ── Sidebar nav ── */
.nav-section{padding:4px 12px 2px;font-size:.55rem;font-weight:800;color:var(--t4);text-transform:uppercase;letter-spacing:.15em;margin-top:8px}
.nav-item{display:flex;align-items:center;gap:9px;padding:7px 14px;cursor:pointer;border-radius:var(--r);margin:1px 6px;transition:all .12s;color:var(--t2);font-size:.74rem;font-weight:600}
.nav-item:hover{background:rgba(255,255,255,.04);color:var(--t1)}
.nav-item.active{background:var(--ac-bg);color:var(--ac2);border-right:2px solid var(--ac)}
.nav-item .icon{width:15px;text-align:center;font-size:.8rem;flex-shrink:0}
.nav-badge{margin-left:auto;background:var(--rd-bg);color:var(--rd);padding:1px 6px;border-radius:8px;font-size:.58rem;font-family:var(--fm);font-weight:700}

/* ── Page header ── */
.page-head{margin-bottom:20px}
.page-head h1{font-size:1.3rem;font-weight:800;letter-spacing:-.02em;margin-bottom:2px}
.page-head p{font-size:.76rem;color:var(--t3)}

/* ── Stat cards ── */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:24px}
.stat-card{background:var(--sf);border:1px solid var(--brd);border-radius:var(--r2);padding:16px;position:relative;overflow:hidden}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.stat-card.blue::before{background:var(--bl)}
.stat-card.green::before{background:var(--gr)}
.stat-card.red::before{background:var(--rd)}
.stat-card.purple::before{background:var(--ac)}
.stat-card.amber::before{background:var(--am)}
.stat-label{font-size:.6rem;color:var(--t3);font-weight:700;text-transform:uppercase;letter-spacing:.12em;margin-bottom:6px}
.stat-val{font-size:1.5rem;font-weight:800;font-family:var(--fm);letter-spacing:-.02em;color:var(--t1)}
.stat-sub{font-size:.66rem;color:var(--t3);margin-top:4px}

/* ── Cards ── */
.card{background:var(--sf);border:1px solid var(--brd);border-radius:var(--r2);overflow:hidden;margin-bottom:16px}
.card-head{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--brd)}
.card-title{font-size:.78rem;font-weight:700;color:var(--t1)}
.card-actions{display:flex;gap:6px}

/* ── Tables ── */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:.7rem}
th{padding:7px 12px;text-align:left;font-size:.58rem;text-transform:uppercase;letter-spacing:.1em;color:var(--t3);font-weight:700;border-bottom:1px solid var(--brd);background:var(--sf2);white-space:nowrap;position:sticky;top:0}
td{padding:7px 12px;border-bottom:1px solid rgba(255,255,255,.028);white-space:nowrap;font-family:var(--fm)}
tr:hover td{background:rgba(255,255,255,.02)}
.td-email{font-family:var(--ff);color:var(--t2);font-size:.68rem}

/* ── Badges ── */
.badge{padding:2px 8px;border-radius:12px;font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;font-family:var(--ff)}
.badge-active{background:var(--gr-bg);color:var(--gr);border:1px solid rgba(52,211,153,.2)}
.badge-failed{background:var(--rd-bg);color:var(--rd);border:1px solid rgba(248,113,113,.2)}
.badge-passed{background:var(--bl-bg);color:var(--bl);border:1px solid rgba(96,165,250,.2)}
.badge-funded{background:var(--ac-bg);color:var(--ac2);border:1px solid var(--ac-gl)}
.badge-pending{background:var(--am-bg);color:var(--am);border:1px solid rgba(251,191,36,.2)}
.badge-buy{color:var(--gr);font-weight:800}
.badge-sell{color:var(--rd);font-weight:800}

/* ── Risk level ── */
.risk-ok{color:var(--gr)}
.risk-warn{color:var(--am);font-weight:700}
.risk-crit{color:var(--rd);font-weight:800;animation:pulse .8s ease infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

/* ── Pnl colors ── */
.pnl-p{color:var(--gr);font-weight:700}
.pnl-n{color:var(--rd);font-weight:700}
.pnl-z{color:var(--t3)}

/* ── Buttons ── */
.btn{padding:5px 12px;border-radius:var(--r);border:none;cursor:pointer;font-family:var(--ff);font-size:.72rem;font-weight:700;transition:all .15s}
.btn-sm{padding:3px 9px;font-size:.65rem}
.btn-primary{background:var(--ac3);color:#fff}
.btn-primary:hover{background:var(--ac)}
.btn-danger{background:var(--rd-bg);color:var(--rd);border:1px solid rgba(248,113,113,.2)}
.btn-danger:hover{background:rgba(248,113,113,.2)}
.btn-outline{background:transparent;color:var(--t2);border:1px solid var(--brd2)}
.btn-outline:hover{color:var(--t1);border-color:var(--brd)}
.btn-green{background:var(--gr-bg);color:var(--gr);border:1px solid rgba(52,211,153,.2)}
.btn-green:hover{background:rgba(52,211,153,.2)}
.btn-amber{background:var(--am-bg);color:var(--am);border:1px solid rgba(251,191,36,.2)}

/* ── Modal ── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(8px);z-index:999;display:flex;align-items:center;justify-content:center}
.modal{background:var(--sf2);border:1px solid var(--brd2);border-radius:var(--r3);padding:24px;min-width:360px;max-width:520px;width:100%}
.modal h3{font-size:.95rem;font-weight:700;margin-bottom:16px}
.field{margin-bottom:12px}
.field label{display:block;font-size:.62rem;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px}
.field input,.field select{width:100%;background:var(--bg2);border:1.5px solid var(--brd2);border-radius:var(--r);padding:8px 10px;color:var(--t1);font-family:var(--fm);font-size:.8rem;outline:none;transition:border .15s}
.field input:focus,.field select:focus{border-color:var(--ac)}
.field select option{background:var(--bg2)}
.modal-btns{display:flex;gap:8px;margin-top:16px;justify-content:flex-end}

/* ── Progress bar ── */
.prog-bar{height:5px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden;margin-top:4px}
.prog-fill{height:100%;border-radius:3px;transition:width .5s}

/* ── Search ── */
.search-row{display:flex;gap:8px;margin-bottom:14px;align-items:center}
.search-input{flex:1;background:var(--sf2);border:1px solid var(--brd2);border-radius:var(--r);padding:7px 12px;color:var(--t1);font-family:var(--ff);font-size:.78rem;outline:none}
.search-input:focus{border-color:var(--ac)}
.filter-select{background:var(--sf2);border:1px solid var(--brd2);border-radius:var(--r);padding:7px 10px;color:var(--t2);font-family:var(--ff);font-size:.75rem;outline:none}

/* ── Alert box ── */
.alert{padding:10px 14px;border-radius:var(--r2);margin-bottom:12px;font-size:.75rem;font-weight:600;display:flex;align-items:center;gap:10px}
.alert-crit{background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.2);color:var(--rd)}
.alert-warn{background:var(--am-bg);border:1px solid rgba(251,191,36,.2);color:var(--am)}

/* ── Empty state ── */
.empty{padding:40px;text-align:center;color:var(--t3);font-size:.78rem}

/* ── Toast ── */
#toast{position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:6px}
.toast-item{padding:9px 16px;border-radius:var(--r2);font-size:.75rem;font-weight:600;border:1px solid;animation:tin .3s ease both}
.toast-item.ok{background:rgba(16,185,129,.12);border-color:rgba(52,211,153,.3);color:var(--gr)}
.toast-item.err{background:rgba(239,68,68,.12);border-color:rgba(248,113,113,.3);color:var(--rd)}
.toast-item.inf{background:rgba(139,92,246,.12);border-color:rgba(167,139,250,.3);color:var(--ac2)}
@keyframes tin{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:none}}

/* ── Detail panel ── */
.detail-panel{position:fixed;right:0;top:48px;bottom:0;width:480px;background:var(--sf2);border-left:1px solid var(--brd2);z-index:50;overflow-y:auto;padding:20px;transform:translateX(100%);transition:transform .25s cubic-bezier(.22,1,.36,1)}
.detail-panel.open{transform:none}
.dp-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.dp-close{background:rgba(255,255,255,.06);border:none;color:var(--t2);width:28px;height:28px;border-radius:50%;cursor:pointer;font-size:.9rem;display:flex;align-items:center;justify-content:center}
.dp-close:hover{background:rgba(255,255,255,.1);color:var(--t1)}
.dp-metric-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.dp-metric{background:var(--bg);border:1px solid var(--brd);border-radius:var(--r);padding:10px 12px}
.dp-metric-label{font-size:.58rem;color:var(--t3);text-transform:uppercase;letter-spacing:.1em;font-weight:700;margin-bottom:3px}
.dp-metric-val{font-size:.85rem;font-family:var(--fm);font-weight:700;color:var(--t1)}
</style>
</head>
<body>

<div id="toast"></div>

<div class="layout">
  <!-- Topbar -->
  <div class="topbar">
    <div class="tb-logo">
      <img src="/img/favicon.svg" alt="P">
      <div class="tb-logo-text">Pluto<em>Admin</em></div>
    </div>
    <div class="tb-badge admin">ADMIN</div>
    <div id="adminNameDisplay" style="font-size:.72rem;color:var(--t3);margin-left:2px"></div>
    <div id="riskAlertCount" style="display:none" class="tb-badge" style="background:var(--rd-bg);color:var(--rd)">0 ALERTS</div>
    <div class="tb-mkt">
      <div class="dot" id="mktDot"></div>
      <span id="mktLabel">—</span>
    </div>
    <div class="tb-time" id="tbTime">—</div>
    <a href="/" class="tb-back">← Prop Firm</a>
    <button onclick="logout()" style="margin-left:8px;padding:6px 12px;background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.2);border-radius:6px;color:#f87171;font-size:.72rem;font-weight:700;cursor:pointer">Sign Out</button>
  </div>

  <!-- Sidebar -->
  <div class="sidebar">
    <div style="padding:10px 14px 6px;font-size:.78rem;font-weight:700;color:var(--t1)">Broker Dashboard</div>
    <div class="nav-section">Monitor</div>
    <div class="nav-item active" onclick="navTo('overview')"><span class="icon">📊</span>Overview</div>
    <div class="nav-item" onclick="navTo('accounts')"><span class="icon">👥</span>Accounts</div>
    <div class="nav-item" onclick="navTo('positions')"><span class="icon">📈</span>Live Positions <span class="nav-badge" id="posCountNav">0</span></div>
    <div class="nav-item" onclick="navTo('risk')"><span class="icon">⚠️</span>Risk Alerts <span class="nav-badge" id="riskCountNav" style="display:none">0</span></div>
    <div class="nav-section">Configure</div>
    <div class="nav-item" onclick="navTo('symbols')"><span class="icon">💱</span>Spreads & Symbols</div>
    <div class="nav-item" onclick="navTo('sessions')"><span class="icon">🌐</span>Active Sessions</div>
    <div class="nav-section">Finance</div>
    <div class="nav-item" onclick="navTo('payouts')"><span class="icon">💸</span>Payouts</div>
    <div class="nav-item" onclick="navTo('users')"><span class="icon">🔑</span>Users</div>
  </div>

  <!-- Main content -->
  <div class="main" id="main">
    <div class="empty">Loading…</div>
  </div>
</div>

<!-- Account detail panel -->
<div class="detail-panel" id="detailPanel">
  <div class="dp-head">
    <strong id="dpTitle">Account Details</strong>
    <button class="dp-close" onclick="closeDetail()">✕</button>
  </div>
  <div id="dpContent"></div>
</div>

<!-- Generic modal -->
<div id="modalBg" style="display:none" class="modal-bg">
  <div class="modal" id="modalBox"></div>
</div>

<script>
const BACKEND = window.location.hostname==='localhost' ? '' : 'https://pluto-platform-production.up.railway.app';
let token = localStorage.getItem('pcf_token');

// ── Standalone login overlay ────────────────────────────────────────
if (!token) {
  document.body.innerHTML = `
    <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#06050a;font-family:'Manrope',sans-serif">
      <div style="background:#0f0e18;border:1px solid rgba(139,92,246,.3);border-radius:16px;padding:40px;width:360px;box-shadow:0 20px 60px rgba(0,0,0,.6)">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:28px">
          <div style="width:36px;height:36px;background:#7c3aed;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff;font-size:16px">P</div>
          <div>
            <div style="font-size:.85rem;font-weight:800;color:#fff;letter-spacing:-.01em">PlutoAdmin</div>
            <div style="font-size:.68rem;color:#8b87a0">Admin Access Only</div>
          </div>
        </div>
        <div id="loginErr" style="display:none;background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.25);border-radius:8px;padding:9px 12px;color:#f87171;font-size:.75rem;margin-bottom:14px"></div>
        <label style="display:block;font-size:.6rem;font-weight:700;color:#5a5672;text-transform:uppercase;letter-spacing:.12em;margin-bottom:5px">Email</label>
        <input id="loginEmail" type="email" placeholder="admin@plutocapitalfunding.com"
          style="width:100%;background:#0b0a12;border:1.5px solid rgba(255,255,255,.08);border-radius:8px;padding:10px 12px;color:#eeedf4;font-size:.85rem;outline:none;margin-bottom:14px;box-sizing:border-box"
          onfocus="this.style.borderColor='#7c3aed'" onblur="this.style.borderColor='rgba(255,255,255,.08)'" />
        <label style="display:block;font-size:.6rem;font-weight:700;color:#5a5672;text-transform:uppercase;letter-spacing:.12em;margin-bottom:5px">Password</label>
        <input id="loginPass" type="password" placeholder="••••••••"
          style="width:100%;background:#0b0a12;border:1.5px solid rgba(255,255,255,.08);border-radius:8px;padding:10px 12px;color:#eeedf4;font-size:.85rem;outline:none;margin-bottom:20px;box-sizing:border-box"
          onfocus="this.style.borderColor='#7c3aed'" onblur="this.style.borderColor='rgba(255,255,255,.08)'"
          onkeydown="if(event.key==='Enter')doLogin()" />
        <button onclick="doLogin()" id="loginBtn"
          style="width:100%;background:#7c3aed;border:none;border-radius:8px;padding:12px;color:#fff;font-size:.85rem;font-weight:700;cursor:pointer;transition:background .15s"
          onmouseover="this.style.background='#6d28d9'" onmouseout="this.style.background='#7c3aed'">
          Sign In to PlutoAdmin
        </button>
        <div style="text-align:center;margin-top:16px;font-size:.7rem;color:#5a5672">
          <a href="/" style="color:#8b87a0;text-decoration:none">← Back to Prop Firm Dashboard</a>
        </div>
      </div>
    </div>`;

  window.doLogin = async function() {
    const email = document.getElementById('loginEmail').value.trim();
    const pass  = document.getElementById('loginPass').value;
    const btn   = document.getElementById('loginBtn');
    const err   = document.getElementById('loginErr');
    if (!email || !pass) { err.style.display='block'; err.textContent='Enter email and password'; return; }
    btn.textContent = 'Signing in…'; btn.disabled = true;
    try {
      const r = await fetch(BACKEND+'/api/auth/login', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ email, password: pass })
      });
      const d = await r.json();
      if (!r.ok) throw new Error(d.error||'Login failed');
      if (d.user?.role !== 'admin') throw new Error('Admin access only. Your account does not have admin privileges.');
      localStorage.setItem('pcf_token', d.token);
      localStorage.setItem('pcf_user', JSON.stringify(d.user));
      location.reload();
    } catch(e) {
      err.style.display='block'; err.textContent=e.message;
      btn.textContent='Sign In to PlutoAdmin'; btn.disabled=false;
    }
  };
  // Stop rest of script from running
  throw new Error('LOGIN_REQUIRED');
}

const $ = id => document.getElementById(id);
let currentPage = 'overview';
let refreshTimer = null;
let accounts = [], allPositions = [], riskAlerts = [];

async function api(path, opts={}) {
  const r = await fetch(BACKEND+path, { ...opts, headers: { 'Content-Type':'application/json', 'Authorization':'Bearer '+token, ...(opts.headers||{}) } });
  const d = await r.json();
  if (!r.ok) throw new Error(d.error||'Error');
  return d;
}

function toast(msg, type='inf', ms=3000) {
  const el = document.createElement('div');
  el.className = 'toast-item '+type;
  el.textContent = msg;
  $('toast').appendChild(el);
  setTimeout(()=>{el.style.opacity='0';el.style.transition='opacity .3s';setTimeout(()=>el.remove(),300)}, ms);
}

const fmtU = n => '$'+Number(n||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtN = n => Number(n||0).toFixed(2);
const fmtP = n => (n>=0?'+':'')+fmtN(n);
const badge = (s) => `<span class="badge badge-${s}">${s}</span>`;

// ── Nav ────────────────────────────────────────────────────────────────────
function navTo(page) {
  currentPage = page;
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.querySelector(`.nav-item[onclick="navTo('${page}')"]`)?.classList.add('active');
  clearTimeout(refreshTimer);
  load(page);
}

async function load(page) {
  const main = $('main');
  main.innerHTML = '<div class="empty" style="padding:60px">Loading…</div>';
  try {
    switch(page) {
      case 'overview':  await loadOverview(); break;
      case 'accounts':  await loadAccounts(); break;
      case 'positions': await loadPositions(); break;
      case 'risk':      await loadRiskAlerts(); break;
      case 'symbols':   await loadSymbols(); break;
      case 'sessions':  await loadSessions(); break;
      case 'payouts':   await loadPayouts(); break;
      case 'users':     await loadUsers(); break;
    }
    // Auto-refresh active pages
    if (['overview','positions','risk'].includes(page)) {
      refreshTimer = setTimeout(()=>load(page), 5000);
    }
  } catch(e) {
    main.innerHTML = `<div class="alert alert-crit">Failed to load: ${e.message}</div>`;
  }
}

// ── Overview ──────────────────────────────────────────────────────────────
async function loadOverview() {
  const [overview, alerts] = await Promise.all([
    api('/api/pluto-admin/overview'),
    api('/api/pluto-admin/risk-alerts').catch(()=>[])
  ]);
  riskAlerts = alerts;

// ── Accounts ──────────────────────────────────────────────────────────────
async function loadAccounts(search='', status='') {
  let url = '/api/pluto-admin/accounts?limit=200';
  if (status) url += '&status='+status;
  if (search) url += '&search='+encodeURIComponent(search);
  accounts = await api(url);
  $('main').innerHTML = `
    <div class="page-head"><h1>Accounts</h1><p>${accounts.length} accounts loaded</p></div>
    <div class="search-row">
      <input class="search-input" placeholder="Search by email, name, ID…" id="acctSearch" value="${search}" oninput="debounceSearch(this.value)">
      <select class="filter-select" id="acctFilter" onchange="loadAccounts($('acctSearch').value, this.value)">
        <option value="">All Status</option>
        <option value="active" ${status==='active'?'selected':''}>Active</option>
        <option value="failed" ${status==='failed'?'selected':''}>Failed</option>
        <option value="passed" ${status==='passed'?'selected':''}>Passed</option>
      </select>
      <button class="btn btn-outline btn-sm" onclick="loadAccounts()">↻ Refresh</button>
    </div>
    <div class="card">
      <div class="tbl-wrap"><table>
        <thead><tr><th>ID</th><th>Trader</th><th>Country</th><th>Size</th><th>Balance</th><th>Equity</th><th>Drawdown</th><th>Daily</th><th>Trades</th><th>Status</th><th>Actions</th></tr></thead>
        <tbody>${accounts.map(a=>{
          const dd = a.starting_balance ? ((a.starting_balance-(a.current_equity||a.current_balance||a.starting_balance))/a.starting_balance*100) : 0;
          const ddCls = dd>a.max_total_loss_pct*.9?'pnl-n':dd>a.max_total_loss_pct*.7?'risk-warn':'risk-ok';
          const eq = (a.current_balance||a.starting_balance||0)+(a.floating_pnl||0);
          return `<tr>
            <td style="color:var(--ac2);cursor:pointer" onclick="openAccountDetail('${a.id}')">${a.id.slice(0,8)}</td>
            <td>
              <div style="font-weight:600;font-size:.74rem">${a.first_name||''} ${a.last_name||''}</div>
              <div class="td-email">${a.email}</div>
            </td>
            <td style="color:var(--t3)">${a.country||'—'}</td>
            <td>${fmtU(a.account_size)}</td>
            <td>${fmtU(a.current_balance||a.starting_balance)}</td>
            <td class="${(eq-(a.current_balance||a.starting_balance||0))>=0?'pnl-p':'pnl-n'}">${fmtU(eq)}</td>
            <td class="${ddCls}">${fmtN(dd)}%</td>
            <td>${a.open_positions>0?`<span style="color:var(--am)">${a.open_positions} open</span>`:'—'}</td>
            <td>${a.total_trades||0}</td>
            <td>${badge(a.status)}</td>
            <td style="display:flex;gap:4px">
              <button class="btn btn-sm btn-outline" onclick="openAccountDetail('${a.id}')">Detail</button>
              ${a.status==='active'?`<button class="btn btn-sm btn-danger" onclick="confirmForceClose('${a.id}')">⛔</button>`:''}
            </td>
          </tr>`;
        }).join('')}
        ${!accounts.length?'<tr><td colspan="11" class="empty">No accounts found</td></tr>':''}</tbody>
      </table></div>
    </div>`;
}

let searchTimer;
function debounceSearch(v) { clearTimeout(searchTimer); searchTimer = setTimeout(()=>loadAccounts(v,$('acctFilter')?.value||''),350); }

function editSymbol(symbol, markup, commission, enabled) {
  showModal(`
    <h3>Edit ${symbol}</h3>
    <div class="field"><label>Spread Markup (added to base spread)</label><input type="number" id="editMarkup" value="${markup}" step="0.00001" min="0"></div>
    <div class="field"><label>Commission per Lot (USD)</label><input type="number" id="editComm" value="${commission}" step="0.1" min="0"></div>
    <div class="field"><label>Trading</label>
      <select id="editEnabled"><option value="1" ${enabled?'selected':''}>Enabled</option><option value="0" ${!enabled?'selected':''}>Disabled</option></select>
    </div>
    <div class="modal-btns">
      <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveSymbol('${symbol}')">Save</button>
    </div>
  `);
}

async function saveSymbol(symbol) {
  try {
    await api('/api/pluto-admin/symbols/'+symbol, {
      method:'PUT',
      body: JSON.stringify({
        spread_markup:      parseFloat($('editMarkup').value)||0,
        commission_per_lot: parseFloat($('editComm').value)||3.5,
        trading_enabled:    parseInt($('editEnabled').value),
      })
    });
    toast('Symbol settings saved','ok');
    closeModal();
    loadSymbols();
  } catch(e) { toast(e.message,'err'); }
}

async function openAccountDetail(id) {

  const panel = $('detailPanel');
  $('dpContent').innerHTML = '<div class="empty">Loading…</div>';
  panel.classList.add('open');
  try {
    const a = await api('/api/pluto-admin/accounts/'+id);
    const eq = (a.current_balance||a.starting_balance||0) + (a.floating_pnl||0);
    const dd = a.starting_balance ? ((a.starting_balance-eq)/a.starting_balance*100) : 0;
    $('dpTitle').textContent = `${a.first_name||''} ${a.last_name||''} — ${id.slice(0,8)}`;
    $('dpContent').innerHTML = `
      <div style="margin-bottom:12px;font-size:.72rem;color:var(--t2)">${a.email} · ${a.country||'N/A'} · KYC: <strong style="color:${a.kyc_status==='approved'?'var(--gr)':'var(--am)'}">${a.kyc_status||'none'}</strong></div>
      ${badge(a.status)}
      <div class="dp-metric-grid" style="margin-top:12px">
        <div class="dp-metric"><div class="dp-metric-label">Account Size</div><div class="dp-metric-val">${fmtU(a.account_size)}</div></div>
        <div class="dp-metric"><div class="dp-metric-label">Balance</div><div class="dp-metric-val">${fmtU(a.current_balance||a.starting_balance)}</div></div>
        <div class="dp-metric"><div class="dp-metric-label">Equity</div><div class="dp-metric-val" style="color:${eq>=(a.current_balance||a.starting_balance||0)?'var(--gr)':'var(--rd)'}">${fmtU(eq)}</div></div>
        <div class="dp-metric"><div class="dp-metric-label">Float P&L</div><div class="dp-metric-val" style="color:${(a.floating_pnl||0)>=0?'var(--gr)':'var(--rd)'}">${fmtP(a.floating_pnl||0)}</div></div>
        <div class="dp-metric"><div class="dp-metric-label">Total Drawdown</div><div class="dp-metric-val" style="color:${dd>a.max_total_loss_pct*.9?'var(--rd)':'var(--am)'}">${fmtN(dd)}%</div></div>
        <div class="dp-metric"><div class="dp-metric-label">Max DD</div><div class="dp-metric-val">${a.max_total_loss_pct||8}%</div></div>
        <div class="dp-metric"><div class="dp-metric-label">Profit Target</div><div class="dp-metric-val">${a.profit_target_pct||10}%</div></div>
        <div class="dp-metric"><div class="dp-metric-label">Total Trades</div><div class="dp-metric-val">${a.total_trades||0}</div></div>
      </div>
      <!-- Risk bar -->
      <div style="margin-bottom:14px">
        <div style="display:flex;justify-content:space-between;font-size:.6rem;color:var(--t3);margin-bottom:3px"><span>Drawdown Used</span><span>${fmtN(dd)}% of ${a.max_total_loss_pct}%</span></div>
        <div class="prog-bar" style="height:7px"><div class="prog-fill" style="width:${Math.min(100,dd/a.max_total_loss_pct*100).toFixed(0)}%;background:${dd/a.max_total_loss_pct>0.9?'var(--rd)':dd/a.max_total_loss_pct>0.7?'var(--am)':'var(--gr)'}"></div></div>
      </div>
      <!-- Actions -->
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px">
        ${a.status==='active'?`
          <button class="btn btn-sm btn-danger" onclick="confirmForceClose('${id}')">⛔ Force Close All</button>
          <button class="btn btn-sm btn-amber" onclick="showBreachModal('${id}')">Breach Account</button>
          <button class="btn btn-sm btn-green" onclick="showBalanceModal('${id}','credit')">+ Credit</button>
          <button class="btn btn-sm btn-outline" onclick="showBalanceModal('${id}','debit')">− Debit</button>
          <button class="btn btn-sm btn-outline" onclick="showSettingsModal('${id}',${JSON.stringify(a).replace(/'/g,"\\'")}})">⚙ Settings</button>
        `:''}
      </div>
      <!-- Open positions -->
      ${a.positions?.length ? `
        <div style="font-size:.72rem;font-weight:700;color:var(--t2);margin-bottom:6px">Open Positions (${a.positions.length})</div>
        <table style="font-size:.68rem;width:100%;border-collapse:collapse">
          <thead><tr><th style="padding:4px 6px;text-align:left;color:var(--t3)">Symbol</th><th>Dir</th><th>Vol</th><th>P&L</th><th></th></tr></thead>
          <tbody>${a.positions.map(p=>`<tr>
            <td style="padding:4px 6px;font-weight:700">${p.symbol}</td>
            <td class="badge-${p.direction}">${p.direction.toUpperCase()}</td>
            <td>${p.volume}</td>
            <td class="${p.profit>0?'pnl-p':p.profit<0?'pnl-n':'pnl-z'}">${fmtP(p.profit)}</td>
            <td><button class="btn btn-sm btn-danger" onclick="adminClosePos('${id}','${p.id}')">✕</button></td>
          </tr>`).join('')}</tbody>
        </table>
      ` : '<div style="font-size:.72rem;color:var(--t3)">No open positions</div>'}
    `;
  } catch(e) {
    $('dpContent').innerHTML = `<div class="alert alert-crit">${e.message}</div>`;
  }
}

function closeDetail() { $('detailPanel').classList.remove('open'); }

// ── Modals ────────────────────────────────────────────────────────────────
function showModal(html) { $('modalBg').style.display='flex'; $('modalBox').innerHTML=html; }
function closeModal() { $('modalBg').style.display='none'; }

function confirmForceClose(id) {
  showModal(`
    <h3>⛔ Force Close All Positions</h3>
    <p style="color:var(--t2);font-size:.8rem;margin-bottom:16px">This will immediately close all open positions on account <strong style="color:var(--ac2)">${id.slice(0,8)}</strong> at current market prices. This cannot be undone.</p>
    <div class="modal-btns">
      <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
      <button class="btn btn-danger" onclick="doForceClose('${id}')">Force Close</button>
    </div>
  `);
}

async function doForceClose(id) {
  try {
    await api('/api/pluto-admin/accounts/'+id+'/force-close', { method:'POST' });
    toast('All positions closed','ok');
    closeModal();
    openAccountDetail(id);
  } catch(e) { toast(e.message,'err'); }
}

async function adminClosePos(accountId, posId) {
  if (!confirm('Close this position?')) return;
  try {
    // Force close via challenge route
    await api('/api/pluto-admin/accounts/'+accountId+'/force-close', { method:'POST' });
    toast('Position closed','ok');
    loadPositions();
  } catch(e) { toast(e.message,'err'); }
}

function showBreachModal(id) {
  showModal(`
    <h3>Breach Account</h3>
    <div class="field"><label>Breach Reason</label>
      <select id="breachReason">
        <option>MAX_TOTAL_DRAWDOWN</option>
        <option>MAX_DAILY_LOSS</option>
        <option>RULE_VIOLATION</option>
        <option>ADMIN_ACTION</option>
      </select>
    </div>
    <div class="modal-btns">
      <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
      <button class="btn btn-danger" onclick="doBreach('${id}')">Breach Account</button>
    </div>
  `);
}

async function doBreach(id) {
  try {
    await api('/api/pluto-admin/accounts/'+id+'/breach', { method:'POST', body: JSON.stringify({ reason: $('breachReason').value }) });
    toast('Account breached','ok');
    closeModal(); closeDetail();
    loadAccounts();
  } catch(e) { toast(e.message,'err'); }
}

function showBalanceModal(id, op) {
  showModal(`
    <h3>${op==='credit'?'Credit Balance':'Debit Balance'}</h3>
    <div class="field"><label>Amount (USD)</label><input type="number" id="balAmt" min="1" step="1" placeholder="0.00"></div>
    <div class="field"><label>Reason</label><input type="text" id="balReason" placeholder="e.g. Bonus credit, fee refund…"></div>
    <div class="modal-btns">
      <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="doBalance('${id}','${op}')">Confirm</button>
    </div>
  `);
}

async function doBalance(id, op) {
  try {
    const amt = parseFloat($('balAmt').value);
    if (!amt||amt<=0) { toast('Enter a valid amount','err'); return; }
    const r = await api('/api/pluto-admin/accounts/'+id+'/balance', { method:'POST', body: JSON.stringify({ operation:op, amount:amt, reason:$('balReason').value }) });
    toast(`${op==='credit'?'Credited':'Debited'} $${amt} — new balance: ${fmtU(r.new_balance)}`,'ok');
    closeModal(); openAccountDetail(id);
  } catch(e) { toast(e.message,'err'); }
}

function showSettingsModal(id) {
  showModal(`
    <h3>Account Settings</h3>
    <div class="field"><label>Leverage</label>
      <select id="setLev"><option>1:10</option><option>1:20</option><option selected>1:30</option><option>1:50</option><option>1:100</option></select>
    </div>
    <div class="field"><label>Max Daily Loss %</label><input type="number" id="setDaily" value="5" step="0.5" min="1" max="20"></div>
    <div class="field"><label>Max Total Drawdown %</label><input type="number" id="setDD" value="8" step="0.5" min="1" max="30"></div>
    <div class="field"><label>Profit Target %</label><input type="number" id="setTarget" value="10" step="0.5" min="1"></div>
    <div class="field"><label>Profit Split %</label><input type="number" id="setSplit" value="80" step="5" min="50" max="100"></div>
    <div class="modal-btns">
      <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="doSettings('${id}')">Save Settings</button>
    </div>
  `);
}

async function doSettings(id) {
  try {
    await api('/api/pluto-admin/accounts/'+id+'/settings', {
      method:'PUT',
      body: JSON.stringify({
        leverage:           $('setLev').value,
        max_daily_loss_pct: parseFloat($('setDaily').value),
        max_total_loss_pct: parseFloat($('setDD').value),
        profit_target_pct:  parseFloat($('setTarget').value),
        profit_split_pct:   parseFloat($('setSplit').value),
      })
    });
    toast('Settings saved','ok');
    closeModal(); openAccountDetail(id);
  } catch(e) { toast(e.message,'err'); }
}

// ── Clock + market status ─────────────────────────────────────────────────
function updateClock() {
  const now = new Date();
  $('tbTime').textContent = now.toUTCString().slice(17,25)+' UTC';
  const day=now.getUTCDay(), h=now.getUTCHours();
  const open = !(day===6||(day===0&&h<22)||(day===5&&h>=22));
  $('mktDot').className = 'dot '+(open?'open':'closed');
  $('mktLabel').textContent = open ? 'Market Open' : 'Market Closed';
}
setInterval(updateClock, 1000);
updateClock();

// ── Init ──────────────────────────────────────────────────────────────────
function logout() {
  localStorage.removeItem('pcf_token');
  localStorage.removeItem('pcf_user');
  location.href = '/pluto-admin.html';
}

// Show admin name in topbar
try {
  const u = JSON.parse(localStorage.getItem('pcf_user')||'{}');
  if (u.first_name) document.getElementById('adminNameDisplay').textContent = u.first_name + ' ' + (u.last_name||'');
} catch(_) {}

navTo('overview');
// Refresh positions count periodically
setInterval(async()=>{
  try {
    const p = await api('/api/pluto-admin/positions/all');
    $('posCountNav').textContent = p.length;
  } catch(_) {}
}, 10000);
</script>
</body>
</html>
