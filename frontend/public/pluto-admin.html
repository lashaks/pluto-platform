<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>PlutoAdmin</title>
<link rel="icon" type="image/svg+xml" href="/img/favicon.svg?v=47">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#06050a;--bg2:#0b0a12;--sf:#0f0e18;--sf2:#141320;--sf3:#1a1828;--sf4:#1f1d2e;
  --brd:rgba(255,255,255,.055);--brd2:rgba(255,255,255,.09);
  --ac:#7c3aed;--ac2:#a78bfa;--ac3:#6d28d9;--acbg:rgba(124,58,237,.08);--acgl:rgba(124,58,237,.22);
  --gr:#34d399;--gr2:#10b981;--grbg:rgba(52,211,153,.08);
  --rd:#f87171;--rd2:#ef4444;--rdbg:rgba(248,113,113,.08);
  --am:#fbbf24;--ambg:rgba(251,191,36,.08);
  --bl:#60a5fa;--blbg:rgba(96,165,250,.08);
  --tl:#2dd4bf;--tlbg:rgba(45,212,191,.08);
  --t1:#eeedf4;--t2:#8b87a0;--t3:#5a5672;--t4:#3d3955;
  --ff:'Manrope',sans-serif;--fm:'JetBrains Mono',monospace;
  --r:6px;--r2:10px;--r3:14px;
}
html,body{height:100%;background:var(--bg);color:var(--t1);font-family:var(--ff);font-size:13px;-webkit-font-smoothing:antialiased;overflow:hidden}
input,select,textarea,button{font-family:inherit;font-size:inherit}
.layout{display:grid;grid-template-columns:220px 1fr;grid-template-rows:50px 1fr;height:100vh}
.topbar{grid-column:1/-1;display:flex;align-items:center;background:var(--sf);border-bottom:1px solid var(--brd);z-index:20;padding:0 16px;gap:10px}
.sidebar{grid-row:2;background:var(--sf2);border-right:1px solid var(--brd);overflow-y:auto;display:flex;flex-direction:column}
.main{grid-row:2;overflow-y:auto;padding:20px 24px}
.logo-wrap{display:flex;align-items:center;gap:8px;padding-right:14px;border-right:1px solid var(--brd)}
.logo-c{width:26px;height:26px;background:var(--ac);border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:900;color:#fff;font-size:12px;flex-shrink:0}
.logo-t{font-size:.78rem;font-weight:800}
.logo-t span{color:var(--ac2)}
.tb-badge{padding:2px 7px;border-radius:10px;font-size:.58rem;font-weight:800;text-transform:uppercase;letter-spacing:.1em;border:1px solid;background:var(--rdbg);color:var(--rd);border-color:rgba(248,113,113,.2)}
.tb-r{margin-left:auto;display:flex;align-items:center;gap:8px}
.mkt-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.mkt-dot.open{background:var(--gr);box-shadow:0 0 6px rgba(52,211,153,.5)}
.mkt-dot.closed{background:var(--rd)}
.nav-sec{padding:5px 14px 2px;font-size:.54rem;font-weight:800;color:var(--t4);text-transform:uppercase;letter-spacing:.15em;margin-top:5px}
.nav-i{display:flex;align-items:center;gap:8px;padding:7px 14px;cursor:pointer;border-radius:var(--r);margin:1px 6px;transition:.12s;color:var(--t2);font-size:.74rem;font-weight:600}
.nav-i:hover{background:rgba(255,255,255,.04);color:var(--t1)}
.nav-i.active{background:var(--acbg);color:var(--ac2);border-left:3px solid var(--ac);padding-left:11px}
.nav-badge{margin-left:auto;background:var(--rdbg);color:var(--rd);padding:1px 5px;border-radius:8px;font-size:.58rem;font-weight:800;display:none}
.page-head{margin-bottom:18px}
.page-head h1{font-size:1.2rem;font-weight:800;letter-spacing:-.02em;margin-bottom:2px}
.page-head p{font-size:.74rem;color:var(--t3)}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:18px}
.stat-card{background:var(--sf);border:1px solid var(--brd);border-radius:var(--r2);padding:14px;position:relative;overflow:hidden}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.sc-p::before{background:var(--ac)}.sc-g::before{background:var(--gr)}.sc-r::before{background:var(--rd)}.sc-a::before{background:var(--am)}.sc-b::before{background:var(--bl)}.sc-t::before{background:var(--tl)}
.stat-lbl{font-size:.58rem;color:var(--t3);font-weight:700;text-transform:uppercase;letter-spacing:.1em;margin-bottom:5px}
.stat-val{font-size:1.35rem;font-weight:800;font-family:var(--fm)}
.stat-sub{font-size:.62rem;color:var(--t3);margin-top:2px}
.card{background:var(--sf);border:1px solid var(--brd);border-radius:var(--r2);overflow:hidden;margin-bottom:14px}
.ch{display:flex;align-items:center;justify-content:space-between;padding:11px 16px;border-bottom:1px solid var(--brd);gap:8px;flex-wrap:wrap}
.ct{font-size:.78rem;font-weight:700}
.cs{font-size:.65rem;color:var(--t3);margin-top:1px}
.ca{display:flex;gap:5px;align-items:center;flex-wrap:wrap}
.cb{padding:13px 16px}
.tw{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:.7rem}
th{padding:6px 10px;text-align:left;font-size:.57rem;text-transform:uppercase;letter-spacing:.1em;color:var(--t3);font-weight:700;background:var(--sf2);border-bottom:1px solid var(--brd);white-space:nowrap;position:sticky;top:0;z-index:1}
td{padding:6px 10px;border-bottom:1px solid rgba(255,255,255,.025);font-family:var(--fm);font-size:.71rem;white-space:nowrap}
tr:hover td{background:rgba(255,255,255,.018)}
.tn{font-family:var(--ff);font-weight:600;font-size:.75rem;color:var(--t1)}
.te{font-family:var(--ff);font-size:.67rem;color:var(--t2)}
.empty{padding:36px;text-align:center;color:var(--t3);font-size:.78rem}
.bdg{padding:2px 7px;border-radius:10px;font-size:.57rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;font-family:var(--ff);border:1px solid;display:inline-block}
.b-active{background:var(--grbg);color:var(--gr);border-color:rgba(52,211,153,.2)}
.b-failed,.b-breached{background:var(--rdbg);color:var(--rd);border-color:rgba(248,113,113,.2)}
.b-passed{background:var(--blbg);color:var(--bl);border-color:rgba(96,165,250,.2)}
.b-funded{background:var(--acbg);color:var(--ac2);border-color:var(--acgl)}
.b-pending,.b-pending_payment{background:var(--ambg);color:var(--am);border-color:rgba(251,191,36,.2)}
.pos{color:var(--gr);font-weight:700}.neg{color:var(--rd);font-weight:700}
.prog{height:4px;background:rgba(255,255,255,.05);border-radius:2px;overflow:hidden}
.pf{height:100%;border-radius:2px;transition:width .4s}
.btn{padding:5px 11px;border-radius:var(--r);border:none;cursor:pointer;font-size:.72rem;font-weight:700;transition:.15s;display:inline-flex;align-items:center;gap:4px}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-sm{padding:3px 8px;font-size:.65rem}.btn-xs{padding:2px 6px;font-size:.6rem}
.btn-p{background:var(--ac3);color:#fff}.btn-p:hover{background:var(--ac)}
.btn-d{background:var(--rdbg);color:var(--rd);border:1px solid rgba(248,113,113,.18)}.btn-d:hover{background:rgba(248,113,113,.2)}
.btn-g{background:var(--grbg);color:var(--gr);border:1px solid rgba(52,211,153,.18)}.btn-g:hover{background:rgba(52,211,153,.2)}
.btn-a{background:var(--ambg);color:var(--am);border:1px solid rgba(251,191,36,.18)}.btn-a:hover{background:rgba(251,191,36,.2)}
.btn-o{background:transparent;color:var(--t2);border:1px solid var(--brd2)}.btn-o:hover{color:var(--t1);border-color:var(--brd)}
.btn-b{background:var(--blbg);color:var(--bl);border:1px solid rgba(96,165,250,.18)}.btn-b:hover{background:rgba(96,165,250,.2)}
.field{margin-bottom:10px}
.field label,.flbl{display:block;font-size:.58rem;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px}
.inp{width:100%;background:var(--bg2);border:1.5px solid var(--brd2);border-radius:var(--r);padding:8px 10px;color:var(--t1);font-family:var(--fm);font-size:.8rem;outline:none;transition:border .15s}
.inp:focus{border-color:var(--ac)}
.sel{width:100%;background:var(--bg2);border:1.5px solid var(--brd2);border-radius:var(--r);padding:8px 10px;color:var(--t1);font-size:.78rem;outline:none;cursor:pointer}
.sel:focus{border-color:var(--ac)}
.sel option{background:var(--bg2)}
.si{flex:1;background:var(--sf2);border:1px solid var(--brd2);border-radius:var(--r);padding:7px 11px;color:var(--t1);font-size:.78rem;outline:none}
.si:focus{border-color:var(--ac)}
.fs{background:var(--sf2);border:1px solid var(--brd2);border-radius:var(--r);padding:7px 9px;color:var(--t2);font-size:.73rem;outline:none;cursor:pointer}
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.72);backdrop-filter:blur(8px);z-index:1000;display:flex;align-items:center;justify-content:center}
.mbox{background:var(--sf2);border:1px solid var(--brd2);border-radius:var(--r3);padding:22px;min-width:320px;max-width:520px;width:calc(100% - 32px);max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.mbox h3{font-size:.88rem;font-weight:700;margin-bottom:12px}
.mbtns{display:flex;gap:8px;margin-top:14px;justify-content:flex-end}
.dp{position:fixed;right:0;top:50px;bottom:0;width:420px;background:var(--sf2);border-left:1px solid var(--brd2);z-index:50;overflow-y:auto;padding:16px;transform:translateX(100%);transition:transform .25s cubic-bezier(.22,1,.36,1)}
.dp.open{transform:none}
.dph{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.dpx{background:rgba(255,255,255,.06);border:none;color:var(--t2);width:26px;height:26px;border-radius:50%;cursor:pointer;font-size:.8rem;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.dpx:hover{background:rgba(255,255,255,.12);color:var(--t1)}
.dpg{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px}
.dpm{background:var(--bg);border:1px solid var(--brd);border-radius:var(--r);padding:7px 9px}
.dpml{font-size:.54rem;color:var(--t3);text-transform:uppercase;letter-spacing:.1em;font-weight:700;margin-bottom:2px}
.dpmv{font-size:.8rem;font-family:var(--fm);font-weight:700}
.alert{padding:8px 12px;border-radius:var(--r2);margin-bottom:10px;font-size:.74rem;font-weight:600;display:flex;align-items:center;gap:8px;border:1px solid}
.a-r{background:var(--rdbg);border-color:rgba(248,113,113,.2);color:var(--rd)}
.a-a{background:var(--ambg);border-color:rgba(251,191,36,.2);color:var(--am)}
.a-g{background:var(--grbg);border-color:rgba(52,211,153,.2);color:var(--gr)}
.a-b{background:var(--blbg);border-color:rgba(96,165,250,.2);color:var(--bl)}
#toasts{position:fixed;bottom:18px;right:18px;z-index:9999;display:flex;flex-direction:column;gap:5px;pointer-events:none}
.ti{padding:8px 14px;border-radius:var(--r2);font-size:.74rem;font-weight:600;border:1px solid;animation:tin .25s ease}
.t-ok{background:rgba(16,185,129,.12);border-color:rgba(52,211,153,.3);color:var(--gr)}
.t-err{background:rgba(239,68,68,.12);border-color:rgba(248,113,113,.3);color:var(--rd)}
.t-inf{background:rgba(124,58,237,.12);border-color:var(--acgl);color:var(--ac2)}
@keyframes tin{from{opacity:0;transform:translateX(14px)}to{opacity:1;transform:none}}
.tc{display:flex;gap:2px;background:var(--sf2);border:1px solid var(--brd);border-radius:var(--r2);padding:3px;margin-bottom:13px}
.tabi{padding:5px 11px;border-radius:6px;cursor:pointer;font-size:.72rem;font-weight:600;color:var(--t2);transition:.15s}
.tabi.active{background:var(--ac);color:#fff}
.tabi:hover:not(.active){background:rgba(255,255,255,.05);color:var(--t1)}
.tgl{position:relative;display:inline-block;width:36px;height:20px;flex-shrink:0}
.tgl input{opacity:0;width:0;height:0}
.tgl-s{position:absolute;cursor:pointer;inset:0;background:var(--sf3);border-radius:10px;transition:.2s}
.tgl-s::before{content:'';position:absolute;width:14px;height:14px;left:3px;bottom:3px;background:var(--t3);border-radius:50%;transition:.2s}
.tgl input:checked+.tgl-s{background:var(--ac)}
.tgl input:checked+.tgl-s::before{transform:translateX(16px);background:#fff}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.lp{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg)}
.lc{background:var(--sf);border:1px solid var(--brd2);border-radius:var(--r3);padding:34px;width:355px;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.le{display:none;background:var(--rdbg);border:1px solid rgba(248,113,113,.2);border-radius:var(--r);padding:8px 12px;color:var(--rd);font-size:.73rem;margin-bottom:11px}
.lb{width:100%;background:var(--ac);border:none;border-radius:var(--r2);padding:11px;color:#fff;font-size:.85rem;font-weight:700;cursor:pointer;transition:.15s}
.lb:hover{background:var(--ac3)}
.nav-foot{margin-top:auto;padding:10px 14px;border-top:1px solid var(--brd);font-size:.64rem;color:var(--t3)}
</style>
</head>
<body>
<div id="toasts"></div>
<div id="dp" class="dp"><div class="dph"><span id="dpTitle" style="font-size:.85rem;font-weight:700;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"></span><button class="dpx" onclick="closeDP()">✕</button></div><div id="dpContent"></div></div>
<div id="mbg" style="display:none" class="mbg" onclick="if(event.target===this)closeModal()"><div class="mbox" id="mbox"></div></div>
<div id="app"></div>
<script>
const BE = location.hostname==='localhost'?'':'https://pluto-platform-production.up.railway.app';
let token = localStorage.getItem('pcf_token');
let adminUser = null;
try{adminUser=JSON.parse(localStorage.getItem('pcf_user')||'null')}catch(_){}

async function api(path, opts={}) {
  const r = await fetch(BE+path, {...opts, headers:{'Content-Type':'application/json','Authorization':'Bearer '+(token||''),...(opts.headers||{})}});
  const d = await r.json().catch(()=>({}));
  if (r.status===401){logout();return;}
  if (!r.ok) throw new Error(d.error||`HTTP ${r.status}`);
  return d;
}
function toast(msg, type='inf', ms=3500) {
  const el = Object.assign(document.createElement('div'),{className:`ti t-${type}`,textContent:msg});
  document.getElementById('toasts').appendChild(el);
  setTimeout(()=>{el.style.opacity='0';el.style.transition='opacity .3s';setTimeout(()=>el.remove(),300)},ms);
}
const F = n => '$'+Number(n||0).toLocaleString('en',{minimumFractionDigits:2,maximumFractionDigits:2});
const N2 = n => Number(n||0).toFixed(2);
const $ = id => document.getElementById(id);
function bdg(s){const m={active:'b-active',failed:'b-failed',passed:'b-passed',funded:'b-funded',pending_payment:'b-pending_payment',pending:'b-pending',breached:'b-breached'};return`<span class="bdg ${m[s]||'b-pending'}">${(s||'').replace(/_/g,' ')}</span>`}
function showModal(h){$('mbg').style.display='flex';$('mbox').innerHTML=h}
function closeModal(){$('mbg').style.display='none'}
function openDP(t,h){$('dpTitle').textContent=t;$('dpContent').innerHTML=h;$('dp').classList.add('open')}
function closeDP(){$('dp').classList.remove('open')}

let curPage='overview', refreshT=null;
function navTo(p){
  curPage=p;
  document.querySelectorAll('.nav-i').forEach(n=>n.classList.remove('active'));
  const el=document.querySelector(`.nav-i[data-pg="${p}"]`);
  if(el)el.classList.add('active');
  clearTimeout(refreshT);
  closeDP();
  doRender(p);
}
async function doRender(p){
  const m=$('mc');if(!m)return;
  m.innerHTML='<div class="empty">Loading…</div>';
  try{
    switch(p){
      case 'overview': await rOverview(m); break;
      case 'accounts': await rAccounts(m); break;
      case 'positions': await rPositions(m); break;
      case 'alerts': await rAlerts(m); break;
      case 'risk': await rRisk(m); break;
      case 'symbols': await rSymbols(m); break;
      case 'sessions': await rSessions(m); break;
      case 'payouts': await rPayouts(m); break;
      case 'audit': await rAudit(m); break;
      case 'users': await rUsers(m); break;
    }
    if(['overview','positions','alerts'].includes(p)) refreshT=setTimeout(()=>doRender(p),6000);
  }catch(e){m.innerHTML=`<div class="alert a-r">⚠ ${e.message}</div>`}
}

// OVERVIEW
async function rOverview(el) {
  const [ov, alerts] = await Promise.all([api('/api/pluto-admin/overview'), api('/api/pluto-admin/risk-alerts').catch(()=>[])]);
  updateRBadge(alerts.length);
  el.innerHTML=`
<div class="page-head"><h1>Overview</h1><p>Live platform snapshot • ${ov.market_open?'<span style="color:var(--gr)">Markets Open</span>':'<span style="color:var(--rd)">Markets Closed</span>'}</p></div>
<div class="stat-grid">
  <div class="stat-card sc-b"><div class="stat-lbl">Traders</div><div class="stat-val">${ov.total_users||0}</div></div>
  <div class="stat-card sc-g"><div class="stat-lbl">Active Challenges</div><div class="stat-val">${ov.active_challenges||0}</div><div class="stat-sub">${ov.passed_challenges||0} passed</div></div>
  <div class="stat-card sc-r"><div class="stat-lbl">Failed</div><div class="stat-val">${ov.failed_challenges||0}</div></div>
  <div class="stat-card sc-p"><div class="stat-lbl">Funded</div><div class="stat-val">${ov.funded_accounts||0}</div></div>
  <div class="stat-card sc-a"><div class="stat-lbl">Payout Queue</div><div class="stat-val">${ov.pending_payouts||0}</div></div>
  <div class="stat-card sc-g"><div class="stat-lbl">Revenue</div><div class="stat-val" style="font-size:.95rem">${F(ov.total_revenue)}</div></div>
  <div class="stat-card sc-t"><div class="stat-lbl">Open Positions</div><div class="stat-val">${ov.open_positions||0}</div></div>
  <div class="stat-card sc-p"><div class="stat-lbl">Risk Engine</div><div class="stat-val" style="font-size:.82rem;color:${ov.risk_engine_running?'var(--gr)':'var(--rd)'}">${ov.risk_engine_running?'RUNNING':'STOPPED'}</div></div>
</div>
<div class="g2">
<div>
${alerts.length?`<div class="card" style="border-color:rgba(248,113,113,.3)"><div class="ch"><div class="ct" style="color:var(--rd)">⚠ Risk Alerts (${alerts.length})</div><button class="btn btn-sm btn-d" onclick="navTo('alerts')">View All</button></div>
<table><thead><tr><th>Trader</th><th>DD Used</th><th>Daily</th><th>Level</th><th></th></tr></thead><tbody>${alerts.slice(0,5).map(a=>`<tr>
<td><div class="te">${a.email}</div></td>
<td class="${a.risk_level==='critical'?'neg':''}"><span style="font-weight:700">${N2(a.drawdown_pct)}%</span> / ${a.max_total_loss_pct}%<div class="prog" style="margin-top:3px"><div class="pf" style="width:${Math.min(100,a.drawdown_pct/a.max_total_loss_pct*100).toFixed(0)}%;background:${a.risk_level==='critical'?'var(--rd)':'var(--am)'}"></div></div></td>
<td class="${a.risk_level==='critical'?'neg':''}"><span style="font-weight:700">${N2(a.daily_loss_pct)}%</span> / ${a.max_daily_loss_pct}%</td>
<td><span class="bdg ${a.risk_level==='critical'?'b-failed':'b-pending'}">${a.risk_level}</span></td>
<td><button class="btn btn-xs btn-d" onclick="openAccDetail('${a.id}')">Inspect</button></td>
</tr>`).join('')}</tbody></table></div>`:
`<div class="alert a-g">✓ No risk alerts — all accounts within safe parameters</div>`}
<div class="card"><div class="ch"><div class="ct">Quick Actions</div></div><div class="cb" style="display:flex;flex-direction:column;gap:5px">
${[['accounts','👥 All Accounts'],['positions','📈 Live Positions'],['risk','⚙ Risk Engine'],['payouts','💸 Payouts'],['symbols','💱 Spreads']].map(([p,l])=>`<button class="btn btn-o" onclick="navTo('${p}')" style="justify-content:flex-start">${l}</button>`).join('')}
<div style="display:flex;align-items:center;justify-content:space-between;padding:5px 0;border-top:1px solid var(--brd);margin-top:4px">
<span style="font-size:.75rem;font-weight:600">Demo Mode</span>
<label class="tgl"><input type="checkbox" id="demoTgl" ${ov.demo_mode?'checked':''} onchange="toggleDemo(this.checked)"><span class="tgl-s"></span></label>
</div></div></div>
</div>
<div>
<div class="card"><div class="ch"><div class="ct">Platform Status</div></div><div class="cb" style="font-size:.78rem;display:flex;flex-direction:column;gap:8px">
${[['Risk Engine',ov.risk_engine_running?'Running ✓':'Stopped ✗',ov.risk_engine_running?'var(--gr)':'var(--rd)'],['Market',ov.market_open?'Open':'Closed',ov.market_open?'var(--gr)':'var(--rd)'],['Demo Mode',ov.demo_mode?'ENABLED':'Off',ov.demo_mode?'var(--am)':'var(--gr)']].map(([l,v,c])=>`<div style="display:flex;justify-content:space-between"><span style="color:var(--t2)">${l}</span><strong style="color:${c}">${v}</strong></div>`).join('')}
</div></div>

async function saveDefaults() {
  const g=id=>{const el=$(id);return el?el.value:undefined};
  const body={
    one_step:{profit_target_pct:+g('o_pt'),max_daily_loss_pct:+g('o_dl'),max_total_loss_pct:+g('o_dd'),profit_split_pct:+g('o_sp'),leverage:g('o_lv'),min_trading_days:+g('o_md'),consistency_rule_pct:+g('o_cn'),inactivity_days:+g('o_ia')},
    two_step_p1:{profit_target_pct:+g('t1_pt'),max_daily_loss_pct:+g('t1_dl'),max_total_loss_pct:+g('t1_dd'),profit_split_pct:+g('t1_sp')},
    two_step_p2:{profit_target_pct:+g('t2_pt'),max_daily_loss_pct:+g('t2_dl'),max_total_loss_pct:+g('t2_dd')},
    funded:{max_daily_loss_pct:+g('f_dl'),max_total_loss_pct:+g('f_dd'),profit_split_pct:+g('f_sp')},
  };
  try{await api('/api/pluto-admin/risk-engine/defaults',{method:'PUT',body:JSON.stringify(body)});toast('Global defaults saved — active within 5s','ok')}catch(e){toast(e.message,'err')}

async function doSettings(id,isFunded){
  const g=eid=>{const el=$(eid);return el?el.value:undefined};
  const body={max_daily_loss_pct:+g('s_dl'),max_total_loss_pct:+g('s_dd'),profit_split_pct:+g('s_sp')};
  if(!isFunded){body.profit_target_pct=+g('s_pt');body.leverage=g('s_lv');}
  if(g('s_st'))body.status=g('s_st');
  if(g('s_nt'))body.note=g('s_nt');
  if(isNaN(body.max_daily_loss_pct)||isNaN(body.max_total_loss_pct))return toast('Invalid values','err');
  try{const r=await api('/api/pluto-admin/accounts/'+id+'/settings',{method:'PUT',body:JSON.stringify(body)});toast(`Saved: ${r.updated?.join(', ')||'settings'} — active <5s`,'ok');closeModal();openAccDetail(id)}catch(e){toast(e.message,'err')}
}

async function doLogin(){
  const em=$('lEm')?.value.trim(),pw=$('lPw')?.value;
  const err=$('lErr');
  if(!em||!pw){err.style.display='block';err.textContent='Enter email and password';return}
  const btn=document.querySelector('.lb');btn.textContent='Signing in…';btn.disabled=true;
  try{
    const r=await fetch(BE+'/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:em,password:pw})});
    const d=await r.json();
    if(!r.ok)throw new Error(d.error||'Login failed');
    if(!['admin','super_admin'].includes(d.user?.role))throw new Error('Admin access only — your account does not have admin privileges');
    localStorage.setItem('pcf_token',d.token);localStorage.setItem('pcf_user',JSON.stringify(d.user));
    token=d.token;adminUser=d.user;
    initApp();
  }catch(e){err.style.display='block';err.textContent=e.message;btn.textContent='Sign In to PlutoAdmin';btn.disabled=false}
}
